services:
  paperclip-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu

        HBA_FILE=/tmp/pg_hba.conf

        cat > "$$HBA_FILE" <<'EOF'
        local all all trust
        host  all all 0.0.0.0/0 reject
        host  all all ::0/0     reject
        EOF

        docker-entrypoint.sh postgres -c hba_file="$$HBA_FILE" &
        PG_PID=$$!

        for i in $$(seq 1 60); do
          if pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -h /var/run/postgresql >/dev/null 2>&1; then
            break
          fi
          if ! kill -0 "$$PG_PID" 2>/dev/null; then
            echo "postgres exited during bootstrap" >&2
            wait "$$PG_PID"
            exit 1
          fi
          sleep 1
        done

        if ! pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -h /var/run/postgresql >/dev/null 2>&1; then
          echo "postgres did not become ready in time" >&2
          kill "$$PG_PID" 2>/dev/null || true
          wait "$$PG_PID" 2>/dev/null || true
          exit 1
        fi

        PGPASSWORD="" psql -v ON_ERROR_STOP=1 \
          -U "$$POSTGRES_USER" \
          -d "$$POSTGRES_DB" \
          -h /var/run/postgresql \
          --set=user="$$POSTGRES_USER" \
          --set=pw="$$POSTGRES_PASSWORD" <<'SQL'
        SET password_encryption = 'scram-sha-256';
        ALTER USER :"user" WITH PASSWORD :'pw';
        SQL

        cat > "$$HBA_FILE" <<'EOF'
        local all all trust
        host  all all 0.0.0.0/0 scram-sha-256
        host  all all ::0/0     scram-sha-256
        EOF

        PGPASSWORD="" psql -v ON_ERROR_STOP=1 \
          -U "$$POSTGRES_USER" \
          -d "$$POSTGRES_DB" \
          -h /var/run/postgresql \
          -c "SELECT pg_reload_conf();"

        echo "postgres: pg_hba hardened, scram-sha-256 enforced for host connections"

        wait "$$PG_PID"

  # Dev-only: one-shot sidecar that inserts a bootstrap CEO invite so
  # we can claim the first admin without shell access on the host.
  # Idempotent — skips if an instance_admin already exists or an active
  # bootstrap invite is already outstanding. Remove this service once
  # we have a reliable exec-into-container path.
  bootstrap-invite:
    image: postgres:17-alpine
    restart: "no"
    depends_on:
      paperclip-db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      BOOTSTRAP_TOKEN_HASH: ${BOOTSTRAP_TOKEN_HASH:?BOOTSTRAP_TOKEN_HASH must be set}
    command:
      - sh
      - -c
      - |
        psql -h paperclip-db -U paperclip -d paperclip -v ON_ERROR_STOP=1 <<SQL
        INSERT INTO invites (invite_type, token_hash, allowed_join_types, expires_at, invited_by_user_id)
        SELECT 'bootstrap_ceo', '$$BOOTSTRAP_TOKEN_HASH', 'human',
               NOW() + INTERVAL '72 hours', 'system'
        WHERE NOT EXISTS (
          SELECT 1 FROM instance_user_roles WHERE role = 'instance_admin'
        ) AND NOT EXISTS (
          SELECT 1 FROM invites
          WHERE invite_type = 'bootstrap_ceo'
            AND revoked_at IS NULL
            AND accepted_at IS NULL
            AND expires_at > NOW()
        );
        SQL

  server:
    build: .
    restart: unless-stopped
    labels:
      paperclip.dev.deployment_generation: "2026-06-17-clean-server-dist"
    expose:
      - "3100"
    environment:
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL must be set}"
      PAPERCLIP_RUNTIME_DB_PASSWORD: "${PAPERCLIP_RUNTIME_DB_PASSWORD:?PAPERCLIP_RUNTIME_DB_PASSWORD must be set}"
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_MIGRATION_AUTO_APPLY: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "${PAPERCLIP_DEPLOYMENT_EXPOSURE:-private}"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-https://paper-dev.zenova.id}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      BETTER_AUTH_TRUSTED_ORIGINS: "${BETTER_AUTH_TRUSTED_ORIGINS:-}"
      PAPERCLIP_AGENT_JWT_SECRET: "${PAPERCLIP_AGENT_JWT_SECRET:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      TELEGRAM_WEBHOOK_SECRET: "${TELEGRAM_WEBHOOK_SECRET:-}"
    volumes:
      - paperclip-data-dev:/paperclip
    depends_on:
      paperclip-db:
        condition: service_healthy

volumes:
  pgdata-dev:
  paperclip-data-dev:
