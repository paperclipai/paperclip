packages:
  - packages/*
  - packages/adapters/*
  - packages/plugins/*
  # Keep sandbox-provider plugins installable as standalone packages without
  # forcing root pnpm-lock.yaml churn for their third-party deps.
  - "!packages/plugins/sandbox-providers/**"
  - packages/plugins/examples/*
  # Keep this smoke fixture installable as a local plugin example without
  # forcing PRs to commit pnpm-lock.yaml for a new workspace importer.
  - "!packages/plugins/examples/plugin-orchestration-smoke-example"
  - server
  - ui
  - cli

# ARES supply-chain policy enforcement candidate.
# Branch: ares-pnpm-policy
# Guardrail: do not merge until build/test verification passes under the repo's
# pinned package manager and lifecycle-script allowlist is reviewed.
minimumReleaseAge: 43200
trustPolicy: no-downgrade
strictDepBuilds: true
allowBuilds:
  "@paperclipai/plugin-cloudflare-sandbox": true
  "@paperclipai/plugin-daytona": true
  "@paperclipai/plugin-e2b": true
  "@paperclipai/plugin-exe-dev": true
  "@paperclipai/plugin-modal": true
  "@paperclipai/plugin-workspace-diff": true
