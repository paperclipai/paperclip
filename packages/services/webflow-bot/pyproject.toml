[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "webflow-bot"
version = "0.1.0"
description = "Long-running Camoufox session that holds an authenticated Webflow Designer + Bridge App for paperclip agents to drive."
requires-python = ">=3.10"
license = { text = "Proprietary" }
authors = [{ name = "Blockcast" }]
dependencies = [
  # Pinned to match the versions installed in the Dockerfile (which is the
  # source of truth for runtime). Listed here so editors / type checkers
  # resolve the imports during local dev.
  "camoufox[geoip]==0.4.11",
  "playwright==1.59.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-cov>=4.0",
  "ruff>=0.4",
  "mypy>=1.10",
]

[project.scripts]
webflow-bot = "webflow_bot.__main__:main"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
filterwarnings = ["error"]
# Add src/ to sys.path so `from webflow_bot import …` works without an
# editable install. CI's test step only `pip install pytest` etc. — it
# doesn't `pip install -e .` because that would pull in the
# Camoufox+Playwright runtime stack which the Docker layer owns.
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
# E = pycodestyle errors, F = pyflakes, I = isort, UP = pyupgrade
select = ["E", "F", "I", "UP", "B"]
# E501: line-too-long handled by the formatter; long lines mainly land in
# embedded JS strings inside page.evaluate() calls.
# B904: missing `raise ... from err` chaining — the underlying exception is
# already serialized into the RuntimeError message, so `from None`-style
# suppression is the right intent. Leave noisy.
ignore = ["E501", "B904"]

[tool.mypy]
python_version = "3.10"
strict = false
# Camoufox / Playwright don't ship type stubs for every surface.
ignore_missing_imports = true
