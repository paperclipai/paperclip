# fly.toml app configuration file generated for paperclip-iv5dca on 2026-06-29T01:16:58Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'paperclip-iv5dca'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[env]
  HOST = "0.0.0.0"
  PORT = "3100"
  PAPERCLIP_HOME = "/data"
  PAPERCLIP_DEPLOYMENT_MODE = "authenticated"
  PAPERCLIP_PUBLIC_URL = "https://paperclip-iv5dca.fly.dev/"
  PAPERCLIP_ALLOWED_HOSTNAMES = "paperclip-iv5dca.fly.dev/"
  PAPERCLIP_STORAGE_PROVIDER = "local_disk"
