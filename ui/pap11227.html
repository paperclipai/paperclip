<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<title>PAP-11227 ReviewQueueCard harness</title>
<style>html,body,#root{height:100%;margin:0;background:#0b0b0c;color:#fff;font-family:system-ui;}</style>
</head>
<body>
<div id="root" style="padding:24px;max-width:720px;margin:0 auto;"></div>
<pre id="boot-errors" style="color:#f88;font-size:11px;padding:8px;border:1px dashed #444"></pre>
<script>
window.__bootErrs = [];
window.addEventListener('error', e => {
  window.__bootErrs.push(['err', String(e.error||e.message), e.filename||'', e.lineno||0]);
  const out = document.getElementById('boot-errors');
  if (out) out.textContent = JSON.stringify(window.__bootErrs, null, 2);
});
window.addEventListener('unhandledrejection', e => {
  window.__bootErrs.push(['rej', String(e.reason && (e.reason.stack || e.reason.message || e.reason))]);
  const out = document.getElementById('boot-errors');
  if (out) out.textContent = JSON.stringify(window.__bootErrs, null, 2);
});
const _origErr = console.error;
console.error = (...args) => { window.__bootErrs.push(['cerr', args.map(a => (a && a.message) || String(a)).join(' ')]); const out = document.getElementById('boot-errors'); if (out) out.textContent = JSON.stringify(window.__bootErrs, null, 2); _origErr.apply(console, args); };
</script>
<script type="module" src="/src/pap11227-harness.tsx"></script>
</body>
</html>
