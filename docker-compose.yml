services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "ns707Bg8fLg8nzLUTL1e4nN9cEu+jywxX7UkcJcWZH0="
    volumes:
      - paperclip-data:/paperclip
      - ./bootstrap-output:/bootstrap-output 
    depends_on:
      db:
        condition: service_healthy
    command: >-
      sh -c "
      rm -f /paperclip/instances/default/config.json || true;
      pnpm paperclipai onboard --yes;
      pnpm --filter @paperclipai/server dev &
      until curl -sf http://localhost:3100/health > /dev/null 2>&1; do
        echo 'Waiting for server...';
        sleep 2;
      done;
      echo '=== BOOTSTRAPPING ADMIN ===';
      pnpm paperclipai auth bootstrap-ceo --data-dir /paperclip --base-url \"http://localhost:3100\";
      echo '=== DONE ===';
      wait
      "
volumes:
  pgdata:
  paperclip-data: