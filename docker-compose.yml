services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - sh
      - -c
      - |
        echo 'local all all trust' > /tmp/pg_hba.conf
        echo 'host all all 0.0.0.0/0 trust' >> /tmp/pg_hba.conf
        echo 'host all all ::0/0 trust' >> /tmp/pg_hba.conf
        exec postgres -c hba_file=/tmp/pg_hba.conf

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://paperclip@db:5432/paperclip}
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_MIGRATION_AUTO_APPLY: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  paperclip-data:
