services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      BETTER_AUTH_SECRET: "15c1dd915ba98e6aca4ae189a21c15530d418b39763189e56b99ca0c8928ebed"
      BETTER_AUTH_URL: "http://localhost:3100"
      BOOTSTRAP_CEO_BASE_URL: "http://localhost:3100"
      ANTHROPIC_SETUP_TOKEN: "${ANTHROPIC_SETUP_TOKEN:-}"
    volumes:
      - paperclip_data:/paperclip
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  paperclip_data:
