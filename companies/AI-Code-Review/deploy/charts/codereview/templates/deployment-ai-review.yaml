apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codereview.fullname" . }}-ai-review
  labels:
    {{- include "codereview.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-review
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "codereview.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ai-review
  template:
    metadata:
      labels:
        {{- include "codereview.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ai-review
    spec:
      serviceAccountName: {{ include "codereview.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: ai-review
          image: "{{ .Values.image.repository }}/ai-review:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: PYTHON_ENV
              value: {{ .Values.environment }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: url
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "codereview.fullname" . }}-ai-secrets
                  key: openai-api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "codereview.fullname" . }}-ai-secrets
                  key: anthropic-api-key
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.ai-review | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "codereview.fullname" . }}-ai-review
  labels:
    {{- include "codereview.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-review
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    {{- include "codereview.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ai-review
---
{{- if .Values.autoscaling.ai-review.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "codereview.fullname" . }}-ai-review
  labels:
    {{- include "codereview.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-review
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "codereview.fullname" . }}-ai-review
  minReplicas: {{ .Values.autoscaling.ai-review.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.ai-review.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.ai-review.targetCPUUtilizationPercentage }}
{{- end }}
