apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codereview.fullname" . }}-webhook
  labels:
    {{- include "codereview.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "codereview.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: webhook
  template:
    metadata:
      labels:
        {{- include "codereview.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: webhook
    spec:
      serviceAccountName: {{ include "codereview.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: webhook
          image: "{{ .Values.image.repository }}/webhook:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.environment }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: url
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "codereview.fullname" . }}-webhook-secrets
                  key: github-app-id
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "codereview.fullname" . }}-webhook-secrets
                  key: github-app-private-key
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.webhook | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "codereview.fullname" . }}-webhook
  labels:
    {{- include "codereview.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3001
      protocol: TCP
      name: http
  selector:
    {{- include "codereview.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
---
{{- if .Values.autoscaling.webhook.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "codereview.fullname" . }}-webhook
  labels:
    {{- include "codereview.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "codereview.fullname" . }}-webhook
  minReplicas: {{ .Values.autoscaling.webhook.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.webhook.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.webhook.targetCPUUtilizationPercentage }}
{{- end }}
