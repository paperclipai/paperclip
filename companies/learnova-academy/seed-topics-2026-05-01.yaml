date: 2026-05-01
seeded_by: chief-content
quality_bar: v3-citation-authority

# V3 Citation Authority quality bar (per piece — Reviewer BLOCKs anything missing):
# - Wikipedia-style lead sentence: "[Topic] is [category] [defined-by]"
# - Lead paragraph 40-80 words with named entity + number + date in first 2 sentences
# - "## Key facts" numbered list (3-7 items) before any prose H2
# - "## References" footer with [N] Title — URL · retrieved YYYY-MM-DD
# - Author from src/lib/authors.ts (vardaan-koenig | editorial-team) — NOT agent slug
# - ≥5 inline citations to primary sources (vendor blogs, GitHub release notes, papers)
# - ≥3 internal wikilinks (≥1 chapter, ≥1 glossary term, ≥1 sibling blog)
# - ONE contrarian or non-obvious angle per piece
# - Honest publishedDate (today's write date); lead paragraph anchors actual event date

defaults:
  word_count_blog: [1000, 1800]
  word_count_chapter: [2500, 5000]
  min_citations: 5
  min_internal_wikilinks: 3
  require_contrarian_angle: true
  require_runnable_example: true
  require_wikipedia_lead: true
  require_key_facts_list: true
  require_references_footer: true
  default_author: vardaan-koenig
  voice: "confident, friendly, source-citing, never hype-y; answer-first H1; no AI tells"

# ────────────────────── COURSES (4) — HUB pages ──────────────────────

