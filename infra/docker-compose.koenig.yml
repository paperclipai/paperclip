# Koenig docker-compose — production-grade, VPS-portable Paperclip stack
#
# Two services: postgres:18 (durable data in named volume) + paperclip-server.
# Named volumes for state make this directly portable to a VPS (Hetzner, Fly.io)
# with `docker compose up -d` — no host-path rewrites.
#
# Sources (vault, companies, skills, scripts) bind-mounted from this repo so
# agents read/write live files. On VPS, swap bind-mounts for git-clone in the
# image build, OR mount via a shared persistent volume.
#
# Migration from prior embedded-Postgres dev mode: one-time clean import via
# `pnpm paperclipai company import --collision overwrite`. Vault content (the
# 13 blog drafts + 4 course folders) is preserved on disk — just gets re-tied
# to fresh tickets.

services:
  db:
    image: postgres:18-alpine
    container_name: paperclip-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 5s
      timeout: 3s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      # PG 18+ requires mount at /var/lib/postgresql (parent), not /data subdir.
      # See https://github.com/docker-library/postgres/pull/1259
      - paperclip-pgdata:/var/lib/postgresql
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  paperclip:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        USER_UID: "${USER_UID:-501}"
        USER_GID: "${USER_GID:-20}"
    image: koenig/paperclip-server:dev
    container_name: paperclip-server
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      HOST: "0.0.0.0"
      PORT: "3100"
      SERVE_UI: "true"
      DATABASE_URL: "postgres://paperclip:paperclip@db:5432/paperclip"
      PAPERCLIP_HOME: "/paperclip"
      PAPERCLIP_INSTANCE_ID: "default"
      # authenticated mode is required when bind=0.0.0.0 (which Docker port-forwarding needs).
      # local_trusted demands loopback-only bind, incompatible with cross-container access.
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      PAPERCLIP_SPEND_LOG: "1"          # Phase J — restore spend tracking
      PAPERCLIP_MIGRATION_PROMPT: "never"
      PAPERCLIP_MIGRATION_AUTO_APPLY: "true"
      OPENCODE_ALLOW_ALL_MODELS: "true"
      # Hermes adapter dashboard model list (locked 2026-05-01).
      # Hermes CLI has no non-interactive `model list`, so the adapter's
      # discoverHermesModels() reads this CSV first; static fallback is the
      # 8-model list shipped in packages/adapters/hermes-local/src/index.ts.
      # Free-form model strings are still acceptable at PATCH time —
      # this just populates the dashboard dropdown for known-good slugs.
      PAPERCLIP_HERMES_MODELS: "anthropic/claude-sonnet-4.6,anthropic/claude-opus-4.7,anthropic/claude-haiku-4.5,x-ai/grok-4.1-fast,x-ai/grok-4.20,x-ai/grok-4.3,google/gemini-3.1-flash-lite-preview,google/gemini-3-flash-preview,google/gemini-3-pro-preview,openai/gpt-5.4,openai/gpt-5.4-mini,deepseek/deepseek-v4-pro,nvidia/deepseek-ai/deepseek-v4-flash"
      USER_UID: "${USER_UID:-501}"
      USER_GID: "${USER_GID:-20}"
      # HOME inside container = /paperclip so adapter CLIs (claude/codex/opencode) find their auth at $HOME/.claude etc.
      HOME: "/paperclip"
      # Force claude_local agents to use subscription OAuth (~/.claude/.credentials.json)
      # NOT metered API. Empty = unset for the claude CLI inside the container.
      # Vardaan extracted Keychain → file 2026-05-01.
      ANTHROPIC_API_KEY: ""
      # Disable startup productivity-review reconciliation — was generating
      # 13 "Review productivity for KOEA-XXX" tickets per restart, dumping on CEO.
      # Other startup reconciliations (stranded-assigned, issue-graph-liveness,
      # silent-active-runs) remain enabled — they're useful state consistency.
      PAPERCLIP_DISABLE_PRODUCTIVITY_REVIEWS: "1"
      # Give V8 a 4GB heap so that OOM is diagnostic (visible in node logs)
      # instead of silent SIGKILL. Default V8 cap is ~1.7GB, was likely the
      # actual cause of the SIGKILL crash loop on 2026-05-01 03:00 UTC peak.
      # V4.1 (2026-05-02): bumped 3072 → 4096 to match the 4g → 6g cgroup bump.
      NODE_OPTIONS: "--max-old-space-size=4096"
    env_file:
      - ../.env.koenig
    volumes:
      # Paperclip durable state (config, instances, spend.jsonl, logs) — named volume for VPS portability
      - paperclip-data:/paperclip
      # Adapter CLI auth credentials — bind-mount from host so claude_local / codex_local / opencode_local / hermes_local work
      - /Users/vardaankoenig/.claude:/paperclip/.claude:rw
      - /Users/vardaankoenig/.codex:/paperclip/.codex:rw
      # OpenCode stores creds at ~/.local/share/opencode/auth.json (xdg-data, not xdg-config)
      - /Users/vardaankoenig/.local/share/opencode:/paperclip/.local/share/opencode:rw
      - /Users/vardaankoenig/.config/opencode:/paperclip/.config/opencode:rw
      # Hermes Agent: ~/.hermes holds auth.json + .env + config.yaml + sessions/state.db.
      # The hermes binary itself is a venv-launcher Python script; mounting it
      # read-only into /usr/local/bin/hermes assumes Python 3.11+ is present in
      # the image. If hermes_local agents are activated and the binary fails to
      # launch, install the Python deps in the Dockerfile or run hermes_local on
      # the host only (do not mount).
      - /Users/vardaankoenig/.hermes:/paperclip/.hermes:rw
      - /Users/vardaankoenig/.local/bin/hermes:/usr/local/bin/hermes:ro
      # Cursor CLI: bind-mount the JS bundle + auth state. cursor-agent is a
      # bash wrapper that exec's a bundled Mac arm64 `node` — won't run as-is
      # in the Linux container. The Dockerfile installs a wrapper at
      # /usr/local/bin/cursor-agent that uses the container's system node
      # (v24+) against the bundled index.js.
      - /Users/vardaankoenig/.local/share/cursor-agent:/paperclip/.local/share/cursor-agent:ro
      - /Users/vardaankoenig/.cursor:/paperclip/.cursor:rw
      # Koenig project sources (live mount — agents read+write here)
      - /Users/vardaankoenig/Documents/Paperclip/koenig-ai-org:/Users/vardaankoenig/Documents/Paperclip/koenig-ai-org:rw
      # Sibling repo for skills referenced by absolute path
      - /Users/vardaankoenig/Documents/Paperclip/learnovaBeast:/Users/vardaankoenig/Documents/Paperclip/learnovaBeast:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3100/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    # Memory limit + Node V8 heap headroom — fix for SIGKILL crash loop
    # (monitor 2026-05-01 confirmed exit 137 even with cron-driver stopped;
    #  Docker Desktop allots 7.65GiB total; spend-tail + cron-driver use some;
    #  give paperclip the lion's share with a hard ceiling so OOMs are diagnostic).
    # V4.1 (2026-05-02): bumped 4g → 6g. Multiple Sonnet/Grok subprocesses per
    # agent + ~7 active agents at peak put 4 GB cgroup under pressure → SIGKILL
    # → process_lost cascade. 6 GB gives breathing room. Also bumps Node heap
    # 3072 → 4096 above. Requires `docker compose up -d --force-recreate paperclip`
    # to take effect.
    mem_limit: 6g
    mem_reservation: 1g
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  cron-driver:
    # Pokes Chief Engineering every 5 min so the agent dispatch cascade keeps flowing.
    # Replaces the launchd plist that fails under macOS Sequoia TCC, and survives Mac reboots
    # because compose has restart: unless-stopped.
    image: python:3.12-slim
    container_name: koenig-cron-driver
    restart: unless-stopped
    environment:
      # 600s tick (was 300s) — combined with smart-skip in koenig-cron-driver.py
      # this cuts active invocations by ~75% vs the original 5min cadence while
      # still firing at least every 60min (force-tick every 6th cycle) for periodic tasks.
      KOENIG_CRON_TICK_S: "600"
      PAPERCLIP_HOST: "http://paperclip:3100"
    env_file:
      - ../.env.koenig
    volumes:
      - /Users/vardaankoenig/Documents/Paperclip/koenig-ai-org/scripts:/scripts:ro
    command: ["python3", "/scripts/koenig-cron-driver.py"]
    depends_on:
      paperclip:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  notifier:
    # Telegram bridge — polls Paperclip + accepts /meeting <URL>, /status, /done commands.
    # User authorized 2026-05-01.
    image: python:3.12-slim
    container_name: koenig-notifier
    restart: unless-stopped
    environment:
      PAPERCLIP_BASE_URL: "http://host.docker.internal:3100"
      KOENIG_COMPANY_ID: "2a77f89b-33f0-4133-a20c-77ddaac5e744"
      MEETING_ATTENDEE_URL: "http://host.docker.internal:8200"
    env_file:
      - ../.env.koenig
    volumes:
      - /Users/vardaankoenig/Documents/Paperclip/koenig-ai-org/services/notifier:/app:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["sh", "-c", "pip install --quiet -r /app/requirements.txt && python3 /app/main.py"]
    depends_on:
      paperclip:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  spend-tail:
    # Phase J workaround: tails postgres cost_events to /paperclip/spend.jsonl
    # so spend tracking is durable + greppable while the cost-events API endpoint
    # is missing from this Paperclip build.
    image: python:3.12-slim
    container_name: koenig-spend-tail
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://paperclip:paperclip@db:5432/paperclip"
      KOENIG_SPEND_JSONL: "/paperclip/spend.jsonl"
      KOENIG_SPEND_POLL_S: "60"
    volumes:
      - /Users/vardaankoenig/Documents/Paperclip/koenig-ai-org/scripts:/scripts:ro
      - paperclip-data:/paperclip
    command: ["sh", "-c", "pip install --quiet psycopg2-binary && python3 /scripts/koenig-spend-tail.py"]
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  paperclip-pgdata:
    name: paperclip-pgdata
  paperclip-data:
    name: paperclip-data
