services:
  vault:
    image: hashicorp/vault:1.17
    container_name: paperclip-vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: paperclip-dev-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "sh", "-c", "vault status -address=http://127.0.0.1:8200 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    entrypoint: >
      sh -c "
        vault server -dev &
        sleep 3 &&
        export VAULT_ADDR=http://127.0.0.1:8200 &&
        export VAULT_TOKEN=paperclip-dev-token &&
        vault secrets enable -path=companies -version=2 kv 2>/dev/null || true &&
        vault secrets enable -path=paperclip -version=2 kv 2>/dev/null || true &&
        wait
      "

  paperclip:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      PAPERCLIP_HOME: "/paperclip"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "paperclip-dev-token"
    volumes:
      - "${PAPERCLIP_DATA_DIR:-./data/docker-paperclip}:/paperclip"
    depends_on:
      vault:
        condition: service_healthy
