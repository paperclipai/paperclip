# OpenTelemetry Collector configuration for Paperclip
# Receives OTLP from the observability plugin and collects host metrics,
# then exports everything to Dynatrace.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      disk: {}
      network: {}
      filesystem:
        metrics:
          system.filesystem.utilization:
            enabled: true
      load: {}
      process:
        mute_process_exe_error: true
        mute_process_io_error: true
        mute_process_user_error: true

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

  resource/hostmetrics:
    attributes:
      - key: host.name
        value: paperclip
        action: upsert

  resourcedetection:
    detectors: [system]
    system:
      hostname_sources: ["os"]

exporters:
  otlphttp/dynatrace:
    endpoint: ${env:DT_OTLP_ENDPOINT}
    headers:
      Authorization: "Api-Token ${env:DT_API_TOKEN}"

  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/dynatrace]

    metrics/app:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/dynatrace]

    metrics/host:
      receivers: [hostmetrics]
      processors: [resourcedetection, resource/hostmetrics, batch]
      exporters: [otlphttp/dynatrace]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/dynatrace]

  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
