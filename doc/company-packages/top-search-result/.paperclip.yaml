schema: paperclip/v1
company:
  requireBoardApprovalForNewAgents: true
agents:
  tsr-ceo:
    role: ceo
    adapter:
      type: codex_local
      config:
        cwd: /Users/robertdawson/AI
        command: codex
        model: gpt-5.4
        modelReasoningEffort: xhigh
        search: false
        timeoutSec: 900
        dangerouslyBypassApprovalsAndSandbox: true
    runtime:
      heartbeat:
        enabled: false
        cooldownSec: 10
        intervalSec: 0
        wakeOnDemand: true
        wakeOnOnDemand: true
        wakeOnAssignment: true
        wakeOnAutomation: false
        maxConcurrentRuns: 1
    permissions:
      canCreateAgents: true
    budgetMonthlyCents: 1000
  growth-strategist:
