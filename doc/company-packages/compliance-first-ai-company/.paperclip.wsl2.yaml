# WSL2 / Linux variant of .paperclip.yaml.
#
# This file is the Linux/WSL2 equivalent of the Windows-rooted .paperclip.yaml.
# Use this variant when paperclip itself runs inside WSL2 (Ubuntu) and the
# djcowork2.0 checkout lives on the WSL ext4 filesystem.
#
# Why a separate file: company-portability strips `cwd` on export/import
# (server/src/services/company-portability.ts:1700), so cwd is local-instance
# state. Keeping a Linux variant on disk lets you flip between the two without
# rewriting agent config in the UI.
#
# Switching procedure (when paperclip runtime moves to WSL2):
#   cp .paperclip.wsl2.yaml .paperclip.yaml
#   paperclipai company import .
#
# Path assumption: djcowork2.0 is cloned at $HOME/work/djcowork2.0 inside WSL2.
# If your layout differs, sed-replace below before importing:
#   sed -i 's|/home/dev/work/djcowork2.0|/your/path|g' .paperclip.wsl2.yaml
#
# Worktree note: every engineer agent's effective cwd is rewritten by
# Workspace Operator at dispatch time to $HOME/work/djcowork2.0-wt/<branch>.
# The cwd here is only the *seed* path used by governance agents (CEO, CTO,
# Audit Lead, etc.) that do not write code.

schema: "paperclip/v1"
agents:
  ceo:
    role: "ceo"
    adapter:
      type: "codex_local"
      config:
        cwd: "/home/dev/work/djcowork2.0"
        model: "gpt-5.5"
        modelReasoningEffort: "xhigh"
        dangerouslyBypassApprovalsAndSandbox: true
    runtimeConfig:
      heartbeat:
        enabled: false
        wakeOnDemand: true
      modelProfiles:
        cheap:
          enabled: true
          adapterConfig:
            model: "gpt-5.5"
            modelReasoningEffort: "xhigh"
