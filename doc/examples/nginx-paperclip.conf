# Example: Paperclip behind nginx + TLS (Let’s Encrypt).
# Copy to e.g. /etc/nginx/sites-available/paperclip, edit server_name, then:
#   sudo ln -s /etc/nginx/sites-available/paperclip /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d your-domain.example
#
# Upstream: Paperclip with HOST=127.0.0.1 and PAPERCLIP_PORT=3100
#
# Note: `map` must appear before any `server` that uses $connection_upgrade.
# If your distro includes site files inside `http {}`, this is valid. If you merge
# snippets, place `map` in http context once globally.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream paperclip_app {
    server 127.0.0.1:3100;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.example;

    # Certbot will add redirect to HTTPS and ssl_* directives after:
    #   sudo certbot --nginx -d your-domain.example

    location / {
        proxy_pass http://paperclip_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSockets (live events)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# After certbot, you typically get a second server { listen 443 ssl; ... } block
# with ssl_certificate and ssl_certificate_key. The same location / block should
# appear there (certbot usually duplicates or includes snippets).
