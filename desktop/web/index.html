<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paperclip</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0b18;
      --surface: #13112a;
      --border: #2d2860;
      --accent: #6d28d9;
      --accent-light: #7c3aed;
      --accent-glow: rgba(109, 40, 217, 0.25);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --error: #f87171;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      /* drag window from anywhere */
      -webkit-app-region: drag;
    }

    /* Disable drag on interactive elements */
    input, button, a { -webkit-app-region: no-drag; }

    /* ── Shared card ── */
    .card {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 380px;
      padding: 48px 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 0 60px rgba(109, 40, 217, 0.12), 0 24px 48px rgba(0,0,0,0.4);
    }

    .card.visible { display: flex; }

    /* ── Logo ── */
    .logo {
      width: 72px;
      height: 72px;
    }

    /* Animated draw-on effect */
    .logo-path {
      stroke: white;
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
    }

    #loading .logo-path {
      animation: draw 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards,
                 pulse 2.4s 1.8s ease-in-out infinite;
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.55; }
    }

    /* ── Text ── */
    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .subtitle {
      font-size: 13.5px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    /* ── Status text ── */
    .status {
      font-size: 13px;
      color: var(--muted);
      animation: fade-in 0.5s ease;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Input ── */
    .input-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 13px;
      font-family: "SF Mono", "Fira Code", monospace;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus {
      border-color: var(--accent-light);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* ── Button ── */
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 100%);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(109, 40, 217, 0.35);
    }

    button:hover  { opacity: 0.92; box-shadow: 0 6px 24px rgba(109,40,217,0.45); }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Error ── */
    .error {
      font-size: 12.5px;
      color: var(--error);
      text-align: center;
      min-height: 18px;
    }

    /* ── Dots spinner (loading fallback) ── */
    .dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-light);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0);    opacity: 0.4; }
      40%            { transform: translateY(-6px); opacity: 1;   }
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    .hint {
      font-size: 11.5px;
      color: var(--muted);
      opacity: 0.6;
      text-align: center;
    }

    .log-line {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.5;
      font-family: "SF Mono", monospace;
      text-align: center;
      max-width: 340px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-height: 16px;
    }
  </style>
</head>
<body>

  <!-- ── Loading screen ── -->
  <div id="loading" class="card">
    <svg class="logo" viewBox="0 0 24 24" fill="none"
         stroke-linecap="round" stroke-linejoin="round">
      <path class="logo-path" stroke="white" stroke-width="1.8"
        d="m16 6-8.414 8.586a2 2 0 0 0 2.829 2.829l8.414-8.586a4 4 0 1 0-5.657-5.657l-8.379 8.551a6 6 0 1 0 8.485 8.485l8.379-8.551"/>
    </svg>
    <h1>Paperclip</h1>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <p class="status" id="loading-status">Starting server…</p>
    <p class="log-line" id="log-line"></p>
  </div>

  <!-- ── Setup screen (first run) ── -->
  <div id="setup" class="card">
    <svg class="logo" viewBox="0 0 24 24" fill="none"
         stroke="white" stroke-width="1.8"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="m16 6-8.414 8.586a2 2 0 0 0 2.829 2.829l8.414-8.586a4 4 0 1 0-5.657-5.657l-8.379 8.551a6 6 0 1 0 8.485 8.485l8.379-8.551"/>
    </svg>

    <div style="text-align:center">
      <h1>Welcome to Paperclip</h1>
      <p class="subtitle" style="margin-top:8px">
        Point to your project folder to launch<br>the server and open the app.
      </p>
    </div>

    <div class="divider"></div>

    <div class="input-group">
      <label for="path-input">Project directory</label>
      <input
        type="text"
        id="path-input"
        spellcheck="false"
        placeholder="/path/to/paperclip"
        autocomplete="off"
      />
    </div>

    <button id="launch-btn" onclick="handleLaunch()">
      Launch Paperclip
    </button>

    <p class="error" id="error-msg"></p>

    <p class="hint">Path is saved — next launch opens automatically</p>
  </div>

  <script>
    const invoke = window.__TAURI__?.core?.invoke;
    const listen  = window.__TAURI__?.event?.listen;

    if (listen) {
      listen('server-log', ({ payload }) => {
        const el = document.getElementById('log-line');
        if (el) el.textContent = payload;
      });

      listen('server-error', ({ payload }) => {
        document.getElementById('loading').classList.remove('visible');
        document.getElementById('error-msg').textContent = payload;
        const btn = document.getElementById('launch-btn');
        btn.disabled = false;
        btn.textContent = 'Launch Paperclip';
        show('setup');
      });
    }

    async function init() {
      if (!invoke) {
        show('setup');
        return;
      }

      try {
        const status = await invoke('get_status');

        if (status.has_config) {
          show('loading');
        } else {
          if (status.default_path) {
            document.getElementById('path-input').value = status.default_path;
          }
          show('setup');
        }
      } catch (e) {
        console.error('get_status failed:', e);
        show('setup');
      }
    }

    function show(id) {
      document.getElementById(id).classList.add('visible');
    }

    async function handleLaunch() {
      const path = document.getElementById('path-input').value.trim();
      const errEl = document.getElementById('error-msg');
      const btn = document.getElementById('launch-btn');

      errEl.textContent = '';
      if (!path) {
        errEl.textContent = 'Please enter the project directory path.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Launching…';

      try {
        await invoke('launch', { path });
        // Switch to loading screen
        document.getElementById('setup').classList.remove('visible');
        show('loading');
      } catch (e) {
        errEl.textContent = String(e);
        btn.disabled = false;
        btn.textContent = 'Launch Paperclip';
      }
    }

    // Enter key submits
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLaunch();
    });

    init();
  </script>
</body>
</html>
