# Production overrides for the paperclip.blockcast.net deployment.
#
# Pass to helm with `--values deploy/helm/paperclip/values.blockcast.yaml` so
# the values persist across helm upgrades instead of relying on stored release
# state and `--set` flags.
#
# Do not commit secrets here — `paperclip-credentials` and
# `paperclip-database-url` Secrets are pre-created out of band.

image:
  repository: harbor.blockcast.net/paperclip/paperclip
  tag: sha-43832ee-k8s-vendored
  pullPolicy: Always
  # Bump this to the kkroo image tag built from this repo when deploying.

imagePullSecrets:
  - name: registry-blockcast-net-pull

# paperclip.blockcast.net is now served via Cilium Gateway API + HTTPRoute
# (see onprem-k8s commit 9712d49: gateway-api/httproutes/paperclip.yaml,
# shared-gateway listener `https-paperclip`, ReferenceGrant in this ns).
# Public DNS A=69.25.95.135 / AAAA=2602:f74d:1::206 (Azure DNS, TTL 300).
# The Ingress block below is kept commented for the migration audit trail
# but disabled — ingress.enabled=false means the chart's templates/ingress.yaml
# renders nothing and helm upgrade reaps the prior live Ingress.
ingress:
  enabled: false
  # className: nginx
  # annotations:
  #   cert-manager.io/cluster-issuer: letsencrypt-blockcast-net
  #   nginx.ingress.kubernetes.io/proxy-body-size: 50m
  #   nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  #   nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  # hosts:
  #   - host: paperclip.blockcast.net
  #     paths:
  #       - path: /
  #         pathType: Prefix
  # tls:
  #   - hosts:
  #       - paperclip.blockcast.net
  #     secretName: paperclip-tls

env:
  host: "0.0.0.0"
  port: 3100
  serveUi: true
  instanceId: default
  extra:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: paperclip-database-url
          key: url
    # Shared bearer token so paperclip-plugin-alertmanager auto-config matches
    # the cluster's monitoring/alertmanager-receivers Secret. Same value, two
    # namespaces. Bootstrap reads this at startup via
    # autoConfigureAlertmanagerFromEnv. Rotate by updating both Secrets in
    # lockstep + restarting paperclip-0 + restarting alertmanager-0.
    - name: PAPERCLIP_ALERTMANAGER_WEBHOOK_TOKEN
      valueFrom:
        secretKeyRef:
          name: paperclip-alertmanager-webhook-token
          key: bearer-token
    # ccrotate-serve verifier bearer for the heartbeat tier-gate active-verify
    # path. heartbeat.ts builds the CcrotateServeVerifier from
    # CCROTATE_SERVE_BASE_URL (or auto-injected CCROTATE_SERVE_SERVICE_HOST +
    # _PORT_SERVE from the ccrotate-serve Service) + this token. When the env
    # is missing the gate logs ccrotate.verifier_disabled and falls back to
    # the pre-T6 deny behavior. The Secret is the same one ccrotate-serve
    # reads on its end (single source of truth for the bearer).
    # See [[ccrotate-active-verify-tier-gate]] + spec
    # .planning/2026-05-17-active-verify-tier-gate-design.md §3.
    - name: CCROTATE_SERVE_TOKEN
      valueFrom:
        secretKeyRef:
          name: paperclip-ccrotate-serve-secrets
          key: serveToken
    # PAPERCLIP_PUBLIC_URL pins the auth base so plugin UIs do not fall back
    # to window.location.origin (which would break behind cloudflared / when
    # iframed). PAPERCLIP_AUTH_BASE_URL_MODE=explicit makes the server treat
    # PAPERCLIP_PUBLIC_URL as authoritative.
    - name: PAPERCLIP_PUBLIC_URL
      value: https://paperclip.blockcast.net
    - name: PAPERCLIP_AUTH_BASE_URL_MODE
      value: explicit
    # Disable self-serve email+password registration. Stops the
    # unauthenticated `POST /api/auth/sign-up/email` exploitation chain
    # documented in BLO-* (filed 2026-05-20): anonymous user → signup →
    # cli-auth challenge → self-approve → `pcp_board_*` bearer that the
    # paperclip-public-tools auth-proxy at `/ccrotate`, `/linear`, `/figma`,
    # `/webflow`, `/tempo`, `/gbrain` accepts wholesale (the proxy validates
    # via `/api/cli-auth/me` and does not check company-membership). Verified
    # end-to-end against production 2026-05-20T20:14Z with synthetic users
    # since cleaned up. Proper fix is OIDC + auth-proxy membership check
    # (PCL-1879); this is the stopgap.
    - name: PAPERCLIP_AUTH_DISABLE_SIGN_UP
      value: "true"
    # Microsoft Entra OIDC for SSO. The Entra app `paperclip-prod`
    # (appId 6c125fa4-deda-43c9-8475-f9c15d0f2976) is registered in the
    # blockcast.net tenant with redirect URI
    # https://paperclip.blockcast.net/api/auth/callback/microsoft. The
    # better-auth instance reads these env vars and enables
    # socialProviders.microsoft when all three are present
    # (server/src/auth/better-auth.ts). 24-month client secret rotation:
    # `az ad app credential reset --id 6c125fa4-... --display-name <name>`,
    # then `kubectl create secret … --dry-run=client -o yaml | kubectl apply -f -`
    # to replace the K8s Secret in-place.
    - name: MICROSOFT_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: paperclip-microsoft-oidc
          key: MICROSOFT_CLIENT_ID
    - name: MICROSOFT_TENANT_ID
      valueFrom:
        secretKeyRef:
          name: paperclip-microsoft-oidc
          key: MICROSOFT_TENANT_ID
    - name: MICROSOFT_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: paperclip-microsoft-oidc
          key: MICROSOFT_CLIENT_SECRET
    # BLO-6295 piece D — daily Entra group reconciler. Loops every
    # MICROSOFT_GROUP_RECONCILE_INTERVAL_HOURS (default 24h) over every
    # paperclip user with a linked Microsoft account, queries Graph
    # for current group memberships, and applies the same reconcile
    # logic as the signin-time better-auth hook
    # (server/src/auth/microsoft-rbac.ts): ssh-users → Blockcast
    # operator membership, AdminAgents → pending admin-elevation
    # approval (NOT auto-grant). Catches off-boarding from AdminAgents
    # even when the affected user doesn't sign in. The paperclip-prod
    # Entra app has Group.Read.All app-permission granted with admin
    # consent so the client_credentials grant against Microsoft Graph
    # works.
    - name: MICROSOFT_GROUP_RECONCILE_ENABLED
      value: "true"
    - name: PAPERCLIP_DEPLOYMENT_MODE
      value: authenticated
    - name: PAPERCLIP_DEPLOYMENT_EXPOSURE
      value: private
    - name: PAPERCLIP_UI_DEV_MIDDLEWARE
      value: "false"
    - name: PAPERCLIP_CODEX_USE_HOST_HOME
      value: "true"
    - name: PAPERCLIP_RUNTIME_API_CANDIDATES_JSON
      value: '["https://paperclip.blockcast.net"]'
    # Designated PR reviewer agent (Ally). The github-webhook route fires
    # an additional wake here on `pull_request.opened`,
    # `pull_request.ready_for_review`, and `pull_request_review.submitted`
    # so PRs without a paperclip identifier still get reviewed. Ally runs
    # both `/pr-review-toolkit:review-pr` and `/gstack:codex review` per
    # wake and posts one consolidated comment. The webhook coalesces by
    # repo+pr+reason so burst events don't queue redundant reviews.
    - name: PAPERCLIP_PR_REVIEWER_AGENT_ID
      value: "e0a5011d-5c94-4801-be52-64c14f98ac26"
    # GitHub PAT for the in-image github-mcp-server (stdio mode). The
    # claude_k8s adapter reads this StatefulSet pod's env spec and copies
    # any valueFrom entry — incl. secretKeyRef — onto every agent Job pod
    # it creates (paperclip-adapter-claude-k8s job-manifest.ts:
    # inheritedEnvValueFrom). The bundled github-mcp-server reads
    # GITHUB_PERSONAL_ACCESS_TOKEN from process env at startup, so each
    # agent's spawned stdio MCP picks up the PAT without any per-request
    # auth-header dance. Secret pre-created out of band.
    - name: GITHUB_PERSONAL_ACCESS_TOKEN
      valueFrom:
        secretKeyRef:
          name: paperclip-github-mcp-token
          key: token
    # Same token, exposed under GH_TOKEN so the `gh` CLI inside agent pods
    # picks it up. Without this, gh falls back to ~/.config/gh/hosts.yml on
    # the per-agent PVC — which holds whatever stale PAT was cached when an
    # agent ran `gh auth login` weeks ago, and the github-app-refresh
    # CronJob's hourly token rotation never reaches gh. With GH_TOKEN set,
    # gh ignores hosts.yml and uses the env var directly, so agents always
    # have a fresh installation token without needing to re-run
    # `gh auth login` on every rotation.
    - name: GH_TOKEN
      valueFrom:
        secretKeyRef:
          name: paperclip-github-mcp-token
          key: token
    # HMAC verification key for the /api/webhooks/github route added in
    # paperclip#118 Phase D. The route reads appConfig.githubWebhookSecret
    # at startup and refuses every request (503) when it is unset, so the
    # env must be live in the pod before any GitHub webhook is registered
    # against the Blockcast repos. The same secret value is configured on
    # the GitHub-side webhook config as the X-Hub-Signature-256 signing
    # key. Rotate by updating both the k8s Secret and the GitHub webhook
    # config in lockstep. Secret pre-created out of band:
    #   kubectl -n paperclip create secret generic paperclip-github-webhook-secret \
    #     --from-literal=secret=<openssl rand -hex 32>
    - name: GITHUB_WEBHOOK_SECRET
      valueFrom:
        secretKeyRef:
          name: paperclip-github-webhook-secret
          key: secret
    # V8 default heap ceiling is ~2.18 GiB regardless of cgroup limits, so a
    # Node process inside a 4 GiB container hits the heap ceiling well before
    # the cgroup OOM and spends CPU on Scavenger/ConcurrentMarking/Sweeper
    # cycles instead of work (verified via pyroscope eBPF profile of paperclip-0
    # on 2026-05-01: top frames were V8 GC). Raise the limit so V8 can use most
    # of the container budget while leaving ~1 GiB for libuv / native deps /
    # binary code / stack / fs cache. Tune up further if the heap-used metric
    # gets close to this ceiling under load.
    #
    # 2026-05-29: paperclip-0 was cgroup-OOMKilled (exitCode 137) — off-heap
    # native-Buffer growth (NOT the V8 object heap; --max-old-space-size caps
    # that separately). #216 added stdin backpressure to the plugin-worker
    # fan-out, which removed the *unbounded* climb but left a *bounded* burst
    # envelope. 2026-05-30: that envelope was measured over a 27h+ window —
    # off-heap RSS bursts to ~5Gi under heavy agent-log load and breached 6Gi
    # once (one OOMKilled at 05:17Z). So 6Gi is genuinely too tight; 10Gi is
    # the correct steady-state limit (observed peak ~5Gi → ~2x headroom), not a
    # band-aid. (An earlier 8h verdict under-sampled the bursts and led to a
    # premature revert to 6Gi in #220 — re-raised here.) Follow-up: tighten the
    # #216 per-worker backlog cap to shrink the burst envelope further.
    - name: NODE_OPTIONS
      value: "--max-old-space-size=6144"
    # Anthropic routing for paperclip-spawned agent Job pods. Agents reach
    # Anthropic through paperclip-public-tools → ccrotate-serve using the
    # pcp_board_* bearer, so they don't need /paperclip/.ccrotate/ on disk.
    # The claude_k8s adapter copies these valueFrom entries onto every Job
    # pod it creates (inheritedEnvValueFrom). ANTHROPIC_AUTH_TOKEN is the
    # Bearer-style var preferred by Claude Code / Anthropic SDK >=0.30;
    # ANTHROPIC_API_KEY mirrors it for older SDK paths. Secret
    # paperclip-ccrotate-board-token is pre-created out of band.
    - name: ANTHROPIC_BASE_URL
      value: "https://paperclip.blockcast.net/ccrotate"
    - name: ANTHROPIC_AUTH_TOKEN
      valueFrom:
        secretKeyRef:
          name: paperclip-ccrotate-board-token
          key: token
    - name: ANTHROPIC_API_KEY
      valueFrom:
        secretKeyRef:
          name: paperclip-ccrotate-board-token
          key: token

# Worker tier also runs plugin workers and scheduled plugin jobs. Linear's
# periodic sync can transiently burn CPU over large BLO backlogs; keep enough
# headroom for Alertmanager webhooks and health probes to complete.
resources:
  requests:
    cpu: 1500m
    memory: 2Gi
  limits:
    cpu: "4"
    # 10Gi steady-state limit: off-heap bursts measured up to ~5Gi (and a 6Gi
    # breach/OOM on 2026-05-30) under heavy plugin-worker fan-out even with
    # #216's backpressure in place. ~2x headroom over the observed peak. Paired
    # with NODE_OPTIONS --max-old-space-size=6144 above. Node k8s-paperclip-2
    # has ~188Gi allocatable — ample. Revisit downward only after the #216 cap
    # tightening demonstrably shrinks the burst envelope.
    memory: 10Gi

persistence:
  enabled: true
  # storageClassName / accessMode / size are ignored when existingClaim is set —
  # paperclip-data is a 200Gi RWX cephfs PVC managed from onprem-k8s
  # paperclip/paperclip-data-pvc.yaml. Kept here
  # for documentation only.
  storageClassName: cephfs
  accessMode: ReadWriteMany
  size: 50Gi
  mountPath: /paperclip
  # The k8s-Job adapters (paperclip-adapter-claude-k8s + paperclip-adapter-opencode-k8s)
  # require the paperclip pod and every spawned Job pod to mount the same PVC at
  # /paperclip. StatefulSet volumeClaimTemplates can't be reused by Job pods, so we
  # bind to a standalone PVC by name.
  existingClaim: paperclip-data

# Clear the chart's default pod.securityContext.fsGroup (1000). paperclip-data
# is a 50Gi RWX cephfs PVC with ~2M inodes; with fsGroup set, kubelet runs a
# recursive chown over the whole volume on every pod mount (cephfs +
# fsGroupChangePolicy=OnRootMismatch does not reliably short-circuit), so each
# rollout grinds 30-45 min and helm `--wait` exits "context deadline exceeded"
# (onprem-k8s #225). The seed initContainer already does targeted chowns of the
# paths it writes, so a volume-wide fsGroup walk is pure overhead. Explicit
# null overrides the chart default instead of merging with it.
pod:
  securityContext:
    fsGroup: null
    fsGroupChangePolicy: null

# HA API/worker split (§2 — Phase 1 server + Phase 2 chart shipped via
# Blockcast/paperclip#73, image sha-f324704). The chart splits the single-pod
# StatefulSet into a multi-replica HTTP API Deployment plus a singleton worker
# StatefulSet. The worker owns heartbeat scheduler + plugin workers + Linear
# tunnel + DB backup; the API tier serves HTTP traffic with
# `PAPERCLIP_NODE_ROLE=api` and reverse-proxies the worker-dependent plugin
# routes (lifecycle / bridge / webhooks / scoped-api) to the worker tier's
# internal Service (Blockcast/paperclip#84, #89, #279), so they no longer 503
# on the API tier.
#
# Two-step rollout — Phase B is the CURRENT live state (api.enabled=true below):
#   Phase A (done): api.enabled=false — new image with NODE_ROLE code rolled
#     onto paperclip-0 as before; no topology change. paperclip-0 verified
#     healthy.
#   Phase B (current): api.enabled=true — chart creates Deployment/paperclip-api
#     (2 replicas, RollingUpdate maxSurge=1 maxUnavailable=0). Service selector
#     switches to component=api. Workers stay on the StatefulSet, mount same
#     paperclip-data PVC (RWX cephfs).
#
# Rollback: flip api.enabled back to false + helm upgrade. Service selector
# reverts; Deployment is reaped; StatefulSet stays.
api:
  enabled: true
  replicas: 2
  maxSurge: 1
  maxUnavailable: 0
  spreadAcrossNodes: true

# Service account must mount its bearer token so the k8s-Job adapters can
# create Jobs / read Pod logs / patch Secrets via the in-cluster kubeconfig.
serviceAccount:
  automountToken: true

# Render Role + RoleBinding + ClusterRole + ClusterRoleBinding for the k8s-Job
# adapters. Verbs derived from each adapter's SelfSubjectAccessReview self-test
# plus runtime patch calls (see deploy/helm/paperclip/templates/role.yaml).
rbac:
  create: true

nodeSelector:
  workload: paperclip

tolerations:
  - key: dedicated
    operator: Equal
    value: paperclip
    effect: NoSchedule

secret:
  existingSecret: paperclip-credentials

# paperclip-plugin-gbrain (Blockcast/paperclip#25, wave 2.1) reads
# per-agent OAuth client credentials from /etc/paperclip-plugin-gbrain/clients.json
# to route gbrain MCP calls through admin-ui:3130/mcp (Bearer-authed, leak-free)
# instead of the supergateway-bridge at :3131. The Secret was seeded
# 2026-05-15 via the gbrain admin API. Chart support for these knobs
# landed in #26.
extraVolumes:
  - name: gbrain-oauth-secrets
    secret:
      secretName: paperclip-plugin-gbrain-oauth-secrets
      defaultMode: 0444
extraVolumeMounts:
  - name: gbrain-oauth-secrets
    mountPath: /etc/paperclip-plugin-gbrain
    readOnly: true

networkPolicy:
  enabled: true
  allowFromNamespaces:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: paperclip
    # Alertmanager webhook deliveries from monitoring/alertmanager-0 to
    # paperclip-plugin-alertmanager. Auth on the plugin side is a static
    # bearer token (see monitoring/alertmanager-receivers Secret); this
    # rule is the network-layer prerequisite, not the security boundary.
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring

pdb:
  enabled: true
  maxUnavailable: 1
