suite: secret
templates:
  - templates/secret.yaml
tests:
  - it: generates an agentJwtSecret when none is provided
    asserts:
      - isKind:
          of: Secret
      - isNotEmpty:
          path: data.agentJwtSecret

  - it: keeps the Secret across upgrades so the JWT secret is preserved
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep

  - it: uses the provided agentJwtSecret value when set
    set:
      secret.agentJwtSecret: my-explicit-token
    asserts:
      # base64("my-explicit-token") == bXktZXhwbGljaXQtdG9rZW4=
      - equal:
          path: data.agentJwtSecret
          value: bXktZXhwbGljaXQtdG9rZW4=

  - it: does not emit a masterKey when none is supplied
    asserts:
      - notExists:
          path: data.masterKey

  - it: emits a masterKey only when one is supplied
    set:
      secret.masterKey: abc123
    asserts:
      - equal:
          path: data.masterKey
          value: YWJjMTIz

  - it: renders no Secret when an existingSecret is referenced
    set:
      secret.existingSecret: paperclip-credentials
    asserts:
      - hasDocuments:
          count: 0
