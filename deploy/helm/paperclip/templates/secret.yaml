{{- if not .Values.secret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "paperclip.secretName" . }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  agentJwtSecret: {{ .Values.secret.agentJwtSecret | default (randAlphaNum 48) | b64enc | quote }}
  {{- if .Values.secret.masterKey }}
  masterKey: {{ .Values.secret.masterKey | quote }}
  {{- end }}
{{- end }}
