{{- if not .Values.secret.existingSecret }}
{{- $secretName := include "paperclip.secretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $existingJwt := "" }}
{{- if and $existing $existing.data (hasKey $existing.data "agentJwtSecret") }}
{{- $existingJwt = index $existing.data "agentJwtSecret" | b64dec }}
{{- end }}
{{- $jwt := .Values.secret.agentJwtSecret | default $existingJwt | default (randAlphaNum 48) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  agentJwtSecret: {{ $jwt | b64enc | quote }}
  {{- if .Values.secret.masterKey }}
  masterKey: {{ .Values.secret.masterKey | b64enc | quote }}
  {{- end }}
{{- end }}
