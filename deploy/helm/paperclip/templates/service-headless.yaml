apiVersion: v1
kind: Service
metadata:
  name: {{ include "paperclip.headlessServiceName" . }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "paperclip.selectorLabels" . | nindent 4 }}
