apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "paperclip.fullname" . }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "paperclip.fullname" . }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "paperclip.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "paperclip.selectorLabels" . | nindent 8 }}
        {{- if .Values.api.enabled }}
        # Additive (not in selector — StatefulSet selectors are immutable).
        # Distinguishes worker-tier pods from API-tier pods for Service routing.
        app.kubernetes.io/component: worker
        {{- end }}
        {{- with .Values.pod.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.pod.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "paperclip.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      shareProcessNamespace: {{ .Values.pod.shareProcessNamespace }}
      securityContext:
        {{- toYaml .Values.pod.securityContext | nindent 8 }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      initContainers:
        - name: seed
          image: {{ include "paperclip.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.pod.containerSecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              BASE={{ .Values.persistence.mountPath | quote }}
              INST="${BASE}/instances/{{ .Values.env.instanceId }}"
              mkdir -p "${INST}/secrets"
              if [ -n "${PAPERCLIP_MASTER_KEY_SEED:-}" ] && [ ! -f "${INST}/secrets/master.key" ]; then
                printf '%s' "${PAPERCLIP_MASTER_KEY_SEED}" | base64 -d > "${INST}/secrets/master.key"
                chmod 0600 "${INST}/secrets/master.key"
              fi
              # The chat plugin (@lucitra/paperclip-plugin-chat) hard-spawns
              # `${HOME}/.local/bin/<binary>` for both claude and codex agents.
              # The image bakes these symlinks at /usr/local/bin/, but the PVC
              # mount at ${BASE} hides anything baked under it, so we must
              # recreate the symlinks on every pod boot. The container
              # deployment overrides the image entrypoint to run `node`
              # directly, which means docker-entrypoint.sh never runs — the
              # seed init container is the right place to do this once before
              # the main container starts.
              mkdir -p "${BASE}/.local/bin"
              for bin in claude codex; do
                if [ ! -e "${BASE}/.local/bin/${bin}" ] && [ -e "/usr/local/bin/${bin}" ]; then
                  ln -sf "/usr/local/bin/${bin}" "${BASE}/.local/bin/${bin}"
                fi
              done
              chown 1000:1000 "${BASE}/.local" "${BASE}/.local/bin" "${BASE}/.local/bin/claude" "${BASE}/.local/bin/codex" 2>/dev/null || true
              # Private kkroo plugins and k8s adapters are image-owned now.
              # Older PVCs may still have package.json/package-lock.json entries
              # pointing at deleted /tmp tarballs or adapter packages; npm install
              # in the plugin store will fail until those stale entries are gone.
              PLUGIN_STORE="${BASE}/.paperclip/plugins"
              if [ -d "${PLUGIN_STORE}" ]; then
                python3 - "${PLUGIN_STORE}" <<'PY' || echo "seed: plugin store cleanup failed (non-fatal)"
              import json
              import os
              import shutil
              import sys

              store = sys.argv[1]
              remove_names = {
                  "@kkroo/paperclip-plugin-ccrotate",
                  "@kkroo/paperclip-plugin-linear",
                  "@lucitra/paperclip-plugin-linear",
                  "paperclip-plugin-alertmanager",
                  "paperclip-adapter-claude-k8s",
                  "paperclip-adapter-opencode-k8s",
              }
              dep_sections = ("dependencies", "devDependencies", "optionalDependencies", "peerDependencies")


              def read_json(path):
                  try:
                      with open(path) as f:
                          return json.load(f)
                  except Exception:
                      return None


              def write_json(path, value):
                  with open(path, "w") as f:
                      json.dump(value, f, indent=2)
                      f.write("\n")


              def remove_deps(mapping):
                  changed = False
                  if not isinstance(mapping, dict):
                      return changed
                  for section in dep_sections:
                      deps = mapping.get(section)
                      if not isinstance(deps, dict):
                          continue
                      for name in sorted(remove_names):
                          if name in deps:
                              print(f"seed: removing stale PVC plugin dependency {name} from {section}")
                              deps.pop(name, None)
                              changed = True
                      if not deps:
                          mapping.pop(section, None)
                  return changed


              pkg_path = os.path.join(store, "package.json")
              pkg = read_json(pkg_path)
              if isinstance(pkg, dict) and remove_deps(pkg):
                  write_json(pkg_path, pkg)

              lock_path = os.path.join(store, "package-lock.json")
              lock = read_json(lock_path)
              if isinstance(lock, dict):
                  changed = False
                  root_pkg = lock.get("packages", {}).get("") if isinstance(lock.get("packages"), dict) else None
                  changed = remove_deps(root_pkg) or changed

                  packages = lock.get("packages")
                  if isinstance(packages, dict):
                      remove_prefixes = tuple(f"node_modules/{name}" for name in remove_names)
                      for key in list(packages):
                          if any(key == prefix or key.startswith(prefix + "/") for prefix in remove_prefixes):
                              print(f"seed: removing stale PVC package-lock entry {key}")
                              packages.pop(key, None)
                              changed = True

                  deps = lock.get("dependencies")
                  if isinstance(deps, dict):
                      for name in sorted(remove_names):
                          if name in deps:
                              print(f"seed: removing stale PVC package-lock dependency {name}")
                              deps.pop(name, None)
                              changed = True

                  if changed:
                      write_json(lock_path, lock)

              for name in sorted(remove_names):
                  module_path = os.path.join(store, "node_modules", *name.split("/"))
                  if os.path.exists(module_path):
                      print(f"seed: removing stale PVC module {module_path}")
                      shutil.rmtree(module_path, ignore_errors=True)
              PY
                chown 1000:1000 "${PLUGIN_STORE}/package.json" "${PLUGIN_STORE}/package-lock.json" 2>/dev/null || true
              fi
              # Register k8s adapters installed in the image at build time.
              # Adapter code and dependencies stay in /opt, so a fresh PVC only
              # needs adapter-plugins.json state, not package contents.
              if [ -d /opt/paperclip-bundled-adapters/node_modules ]; then
                for pkg_json in /opt/paperclip-bundled-adapters/node_modules/paperclip-adapter-*/package.json; do
                  [ -f "${pkg_json}" ] || continue
                  pkg_dir=$(dirname "${pkg_json}")
                  pkg_name=$(sed -n 's/.*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "${pkg_json}" | head -1)
                  pkg_ver=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "${pkg_json}" | head -1)
                  case "${pkg_name}" in
                    paperclip-adapter-claude-k8s) adapter_type="claude_k8s" ;;
                    paperclip-adapter-opencode-k8s) adapter_type="opencode_k8s" ;;
                    *) echo "seed: skipping unknown bundled adapter ${pkg_name:-unknown}"; continue ;;
                  esac
                  echo "seed: registering bundled adapter ${pkg_name}@${pkg_ver} as ${adapter_type}"
                  python3 - "${BASE}/adapter-plugins.json" "${pkg_name}" "${pkg_ver}" "${adapter_type}" "${pkg_dir}" <<'PY' || echo "seed: registry update for ${pkg_name} failed (non-fatal)"
              import datetime, json, os, sys
              path, name, ver, adapter_type, local_path = sys.argv[1:6]
              records = []
              if os.path.exists(path):
                  try:
                      with open(path) as f:
                          parsed = json.load(f)
                      records = parsed if isinstance(parsed, list) else []
                  except Exception:
                      records = []
              existing = next(
                  (
                      r for r in records
                      if isinstance(r, dict)
                      and (r.get("type") == adapter_type or r.get("packageName") == name or r.get("localPath") == local_path)
                  ),
                  {},
              )
              installed_at = existing.get("installedAt") or datetime.datetime.utcnow().isoformat(timespec="milliseconds") + "Z"
              next_records = [
                  r for r in records
                  if not (
                      isinstance(r, dict)
                      and (r.get("type") == adapter_type or r.get("packageName") == name or r.get("localPath") == local_path)
                  )
              ]
              next_records.append({
                  "packageName": name,
                  "version": ver,
                  "type": adapter_type,
                  "localPath": local_path,
                  "installedAt": installed_at,
              })
              with open(path, "w") as f:
                  json.dump(next_records, f, indent=2)
              PY
                done
                if [ -f "${BASE}/adapter-plugins.json" ]; then
                  chown 1000:1000 "${BASE}/adapter-plugins.json" 2>/dev/null || true
                fi
              fi
              # Install ccrotate's claude-code hooks into /paperclip/.claude/hooks
              # and register them in /paperclip/.claude/settings.json. claude-code
              # only loads hooks declared in $HOME/.claude/settings.json, and on a
              # k8s Job pod $HOME=/paperclip — so without this step a long-running
              # claude session inside a Job pod can't refresh OAuth mid-run, and
              # the spawn-time `ccrotate next` prepend is the only refresh point.
              # See ccrotate README §Claude Code Hook Integration.
              CCROTATE_PKG_DIR="/usr/local/lib/node_modules/ccrotate"
              if [ -d "${CCROTATE_PKG_DIR}/claude-hooks" ]; then
                CLAUDE_DIR="${BASE}/.claude"
                HOOKS_DIR="${CLAUDE_DIR}/hooks"
                SETTINGS="${CLAUDE_DIR}/settings.json"
                mkdir -p "${HOOKS_DIR}"
                for src in "${CCROTATE_PKG_DIR}/claude-hooks/"*.sh; do
                  [ -f "${src}" ] || continue
                  dst="${HOOKS_DIR}/$(basename "${src}")"
                  if [ ! -f "${dst}" ] || [ "${src}" -nt "${dst}" ]; then
                    cp "${src}" "${dst}"
                    chmod +x "${dst}"
                    echo "seed: installed claude-code hook $(basename ${src})"
                  fi
                done
                # Merge ccrotate hook entries into settings.json without clobbering
                # operator-set hooks. Idempotent: skips re-inserting an entry whose
                # command already matches one of ccrotate's hook scripts.
                python3 - "${SETTINGS}" "${HOOKS_DIR}" <<'PY' || echo "seed: claude settings hooks merge failed (non-fatal)"
              import json, os, sys
              settings_path, hooks_dir = sys.argv[1], sys.argv[2]
              # claude-code settings.json schema: top-level "hooks" is an object
              # whose keys are hook event names; each value is an array of {hooks:
              # [{type, command, timeout, statusMessage}]} groups.
              desired = {
                  "Stop": {
                      "command": f"bash {hooks_dir}/ccrotate-on-limit.sh",
                      "timeout": 15,
                      "statusMessage": "Checking rate limits...",
                  },
                  "SessionStart": {
                      "command": f"bash {hooks_dir}/ccrotate-check-tier.sh",
                      "timeout": 45,
                      "statusMessage": "Checking usage tier...",
                  },
                  "UserPromptSubmit": {
                      "command": f"bash {hooks_dir}/ccrotate-preemptive.sh",
                      "timeout": 10,
                  },
              }
              try:
                  with open(settings_path) as f:
                      doc = json.load(f) or {}
              except (FileNotFoundError, ValueError):
                  doc = {}
              if not isinstance(doc, dict):
                  doc = {}
              hooks = doc.setdefault("hooks", {})
              if not isinstance(hooks, dict):
                  hooks = {}
                  doc["hooks"] = hooks
              changed = False
              for event, entry in desired.items():
                  groups = hooks.setdefault(event, [])
                  if not isinstance(groups, list):
                      groups = []
                      hooks[event] = groups
                  # Already installed? Match by command path so re-running upgrades
                  # the timeout/statusMessage if ccrotate's defaults change.
                  found_idx = None
                  for i, group in enumerate(groups):
                      if not isinstance(group, dict): continue
                      for h in group.get("hooks", []):
                          if isinstance(h, dict) and h.get("command") == entry["command"]:
                              found_idx = i
                              break
                      if found_idx is not None: break
                  payload = {"hooks": [{"type": "command", **entry}]}
                  if found_idx is None:
                      groups.append(payload)
                      changed = True
                  elif groups[found_idx] != payload:
                      groups[found_idx] = payload
                      changed = True
              if changed or not os.path.exists(settings_path):
                  os.makedirs(os.path.dirname(settings_path), exist_ok=True)
                  with open(settings_path, "w") as f:
                      json.dump(doc, f, indent=2)
                  print(f"seed: updated {settings_path} with ccrotate hooks")
              else:
                  print("seed: ccrotate hooks already registered in settings.json")
              PY
                chown 1000:1000 "${CLAUDE_DIR}" "${HOOKS_DIR}" "${SETTINGS}" "${HOOKS_DIR}"/*.sh 2>/dev/null || true
              fi

              # Install GitHub command wrappers into the shared Paperclip home.
              # Agent Job pods mount the same PVC and inherit the Secret volume
              # from this pod, so gh/git/github-mcp-server read the current
              # App installation token file at process start instead of carrying
              # the env snapshot from Job creation time.
              LOCAL_BIN="${BASE}/.local/bin"
              mkdir -p "${LOCAL_BIN}"
              cat > "${LOCAL_BIN}/paperclip-github-token-env" <<'EOF'
              #!/bin/sh
              set -eu
              TOKEN_FILE="${PAPERCLIP_GITHUB_TOKEN_FILE:-/paperclip/.secrets/github-token/token}"
              if [ ! -r "${TOKEN_FILE}" ]; then
                echo "paperclip github token file not readable: ${TOKEN_FILE}" >&2
                exit 1
              fi
              TOKEN="$(tr -d '\r\n' < "${TOKEN_FILE}")"
              if [ -z "${TOKEN}" ]; then
                echo "paperclip github token file is empty: ${TOKEN_FILE}" >&2
                exit 1
              fi
              export GH_TOKEN="${TOKEN}"
              export GITHUB_TOKEN="${TOKEN}"
              export GITHUB_PERSONAL_ACCESS_TOKEN="${TOKEN}"
              exec "$@"
              EOF
              cat > "${LOCAL_BIN}/github-token-credential-helper" <<'EOF'
              #!/bin/sh
              [ "${1:-get}" = "get" ] || exit 0
              INPUT="$(cat)"
              case "${INPUT}" in
                *"host=github.com"*) ;;
                *) exit 0 ;;
              esac
              TOKEN_FILE="${PAPERCLIP_GITHUB_TOKEN_FILE:-/paperclip/.secrets/github-token/token}"
              [ -r "${TOKEN_FILE}" ] || exit 0
              TOKEN="$(tr -d '\r\n' < "${TOKEN_FILE}")"
              [ -n "${TOKEN}" ] || exit 0
              printf 'username=x-access-token\npassword=%s\n\n' "${TOKEN}"
              EOF
              cat > "${LOCAL_BIN}/gh" <<'EOF'
              #!/bin/sh
              exec /paperclip/.local/bin/paperclip-github-token-env /usr/bin/gh "$@"
              EOF
              cat > "${LOCAL_BIN}/github-mcp-server" <<'EOF'
              #!/bin/sh
              exec /paperclip/.local/bin/paperclip-github-token-env /usr/local/bin/github-mcp-server "$@"
              EOF
              cat > "${LOCAL_BIN}/git" <<'EOF'
              #!/bin/sh
              exec /paperclip/.local/bin/paperclip-github-token-env /usr/bin/git \
                -c credential.https://github.com.helper= \
                -c credential.https://github.com.helper=/paperclip/.local/bin/github-token-credential-helper \
                "$@"
              EOF
              chmod 0755 \
                "${LOCAL_BIN}/paperclip-github-token-env" \
                "${LOCAL_BIN}/github-token-credential-helper" \
                "${LOCAL_BIN}/gh" \
                "${LOCAL_BIN}/github-mcp-server" \
                "${LOCAL_BIN}/git"
              chown 1000:1000 "${LOCAL_BIN}" "${LOCAL_BIN}"/* 2>/dev/null || true
              echo "seed: installed fresh-read GitHub token wrappers in ${LOCAL_BIN}"

              # Seed a project-scope .mcp.json at $HOME (CWD for k8s Job pods is
              # /paperclip by default — matches PAPERCLIP_HOME) so every claude
              # session in a Job pod auto-loads the bundled paperclip MCP
              # bridge (`@paperclipai/mcp-server`). The bridge exposes:
              #   - paperclip's first-class entity tools (issues, agents, ...)
              #   - all live plugin tools (Linear, Slack, Alertmanager, future
              #     paperclip-plugin-github/figma) via /api/plugins/tools/execute
              # Per-run isolation comes from PAPERCLIP_AGENT_ID / RUN_ID /
              # COMPANY_ID / API_KEY which the adapter injects as Job env.
              # Safe to overwrite each pod start: it's pure config, no runtime
              # state. We deliberately don't merge with an existing file —
              # operators add per-agent MCP servers via adapterConfig in
              # paperclip-server, not by hand-editing this file.
              MCP_FILE="${BASE}/.mcp.json"
              MCP_BRIDGE_JS="/app/packages/mcp-server/dist/stdio.js"

              # gbrain endpoint selection. Two paths exist:
              #   1. admin-ui:3130/mcp   — OAuth Bearer, scales independently
              #   2. gbrain-mcp-internal:3131/gbrain — bridge (unauthed),
              #      same gbrain backend but OOMs ~3/hr under aggregate load.
              # We pick #1 by minting a Bearer here against the CEO agent's
              # OAuth client at boot. Per-agent identity at the paperclip
              # plugin layer is preserved via adapter_config.mcpServers.gbrain
              # (refreshed by the gbrain-oauth-refresher CronJob in
              # onprem-k8s/paperclip/). All 7 agents have equivalent /mcp
              # access; using CEO's client for the shared claude-direct
              # path is operationally neutral.
              # Falls back to the bridge if minting fails so claude_k8s still
              # has a working gbrain MCP path on first deploy / outage.
              GBRAIN_ENTRY='{"type":"http","url":"http://gbrain-mcp-internal.paperclip.svc.cluster.local:3131/gbrain"}'
              if [ -r /etc/paperclip-plugin-gbrain/clients.json ]; then
                CEO_ID=$(jq -r '."4eca1725-632f-45fa-97a2-8cf7e0430958".client_id // empty' /etc/paperclip-plugin-gbrain/clients.json 2>/dev/null || true)
                CEO_SEC=$(jq -r '."4eca1725-632f-45fa-97a2-8cf7e0430958".client_secret // empty' /etc/paperclip-plugin-gbrain/clients.json 2>/dev/null || true)
                if [ -n "${CEO_ID}" ] && [ -n "${CEO_SEC}" ]; then
                  GBRAIN_BEARER=$(curl -sf --max-time 5 -X POST \
                    http://gbrain-mcp-admin.paperclip.svc.cluster.local:3130/token \
                    --data-urlencode "grant_type=client_credentials" \
                    --data-urlencode "client_id=${CEO_ID}" \
                    --data-urlencode "client_secret=${CEO_SEC}" 2>/dev/null \
                    | jq -r '.access_token // empty' 2>/dev/null || true)
                  if [ -n "${GBRAIN_BEARER}" ]; then
                    GBRAIN_ENTRY=$(jq -nc \
                      --arg url "http://gbrain-mcp-admin.paperclip.svc.cluster.local:3130/mcp" \
                      --arg auth "Bearer ${GBRAIN_BEARER}" \
                      '{type:"http", url:$url, headers:{Authorization:$auth}}')
                    echo "seed: minted gbrain Bearer; routing claude direct MCP at admin-ui:3130/mcp"
                  else
                    echo "seed: gbrain /token call failed; falling back to bridge:3131/gbrain"
                  fi
                fi
              fi

              if [ -f "${MCP_BRIDGE_JS}" ]; then
                # Cluster-internal MCP servers (deployed via kubectl in the
                # paperclip ns; see .planning/mcp-servers.yaml). All agents
                # in this instance get the same baseline set:
                #   - paperclip   — stdio bridge to /api/plugins/tools/* and
                #                    paperclip's first-class entity tools.
                #   - prometheus  — pab1it0/prometheus-mcp-server, pointed at
                #                    in-cluster prometheus.monitoring.
                #   - tempo       — Tempo 2.10's built-in MCP at /api/mcp.
                #   - k8s-ro      — containers/kubernetes-mcp-server, READONLY
                #                    tier (cluster-wide get/list/watch, no
                #                    secrets). Direct in-cluster reach via the
                #                    `-readonly` Service; bypasses the public
                #                    paperclip-mcp-gateway hop. Named to match
                #                    the public path convention (/k8s-ro/mcp,
                #                    /k8s-rw/mcp, /k8s-admin/mcp) so escalations
                #                    layered in by claude_k8s adapterConfig
                #                    (k8s-rw, k8s-admin) read consistently.
                #   - github      — wrapper around github/github-mcp-server
                #                    bundled in this image (see Dockerfile
                #                    github-mcp stage). The wrapper reads the
                #                    mounted paperclip-github-mcp-token Secret
                #                    file at process start.
                # Per-agent escalations (k8s-mcp ns-rw, admin, figma) are
                # layered in later by the claude_k8s adapter from
                # adapterConfig.mcpServers — this seed only writes the shared
                # baseline. Re-runs overwrite to keep the file in sync with
                # what's deployed.
                cat > "${MCP_FILE}" <<EOF
              {
                "mcpServers": {
                  "paperclip": {
                    "command": "node",
                    "args": ["--import", "/app/server/node_modules/tsx/dist/loader.mjs", "${MCP_BRIDGE_JS}"]
                  },
                  "prometheus": {
                    "type": "http",
                    "url": "http://prometheus-mcp-server.paperclip.svc.cluster.local:8080/mcp"
                  },
                  "tempo": {
                    "type": "http",
                    "url": "http://tempo.monitoring.svc.cluster.local:3200/api/mcp"
                  },
                  "k8s-ro": {
                    "type": "sse",
                    "url": "http://kubernetes-mcp-server-readonly.paperclip.svc.cluster.local:8080/sse"
                  },
                  "github": {
                    "command": "/paperclip/.local/bin/github-mcp-server",
                    "args": ["stdio"]
                  },
                  "linear": {
                    "type": "http",
                    "url": "http://linear-mcp-server.paperclip.svc.cluster.local:8000/mcp"
                  },
                  "gbrain": ${GBRAIN_ENTRY}
                }
              }
              EOF
                chown 1000:1000 "${MCP_FILE}" 2>/dev/null || true
                echo "seed: wrote ${MCP_FILE} with paperclip + prometheus + tempo + k8s-ro + github + linear + gbrain MCP servers"
              else
                echo "seed: skipping mcp.json — bridge stdio.js not found at ${MCP_BRIDGE_JS}"
              fi

              # Install Claude Code plugins from claude-plugins-official +
              # Blockcast/hindsight marketplaces. The image bakes
              # @anthropic-ai/claude-code but no plugins; the PVC at /paperclip
              # masks anything baked under HOME, so plugins must be installed
              # at pod boot (idempotent — `claude plugin install` no-ops if
              # already present). Marketplaces only need to be added once but
              # `marketplace add` is also idempotent. All inputs are static so
              # this runs in ~30s on a fresh PVC and a few seconds on warm.
              #
              # Plugins land in /paperclip/.claude/plugins/, visible to both
              # the server pod's claude sessions AND to any claude_k8s Job pod
              # that mounts the same PVC.
              #
              # If `claude` is unavailable for any reason the block is
              # non-fatal — agents that don't need these plugins continue to
              # work, and the next seed run will retry.
              CLAUDE_BIN="/usr/local/bin/claude"
              if [ -x "${CLAUDE_BIN}" ]; then
                # claude expects $HOME to point at the user's claude dir for
                # plugin scope=user installs (default scope).
                export HOME="${BASE}"
                run_claude_plugin_seed() {
                  label="$1"
                  shift
                  if ! timeout 45s "$@" 2>&1; then
                    echo "seed: ${label} failed or timed out (non-fatal)"
                  fi
                }
                echo "seed: registering Claude Code plugin marketplaces"
                run_claude_plugin_seed "marketplace add claude-plugins-official" "${CLAUDE_BIN}" plugin marketplace add anthropics/claude-plugins-official | grep -v "already" || true
                if jq -e '.hindsight.source.repo == "vectorize-io/hindsight"' "${BASE}/.claude/plugins/known_marketplaces.json" >/dev/null 2>&1; then
                  echo "seed: replacing hindsight marketplace with Blockcast fork"
                  run_claude_plugin_seed "marketplace remove old hindsight" "${CLAUDE_BIN}" plugin marketplace remove hindsight | grep -v "not found" || true
                fi
                run_claude_plugin_seed "marketplace add Blockcast/hindsight" "${CLAUDE_BIN}" plugin marketplace add Blockcast/hindsight | grep -v "already" || true
                echo "seed: installing Claude Code plugins (idempotent)"
                for plugin in \
                  pr-review-toolkit@claude-plugins-official \
                  code-review@claude-plugins-official \
                  commit-commands@claude-plugins-official \
                  mcp-server-dev@claude-plugins-official \
                  claude-md-management@claude-plugins-official \
                  feature-dev@claude-plugins-official \
                  agent-sdk-dev@claude-plugins-official \
                  plugin-dev@claude-plugins-official \
                  frontend-design@claude-plugins-official \
                  hindsight-memory@hindsight \
                ; do
                  run_claude_plugin_seed "plugin install ${plugin}" "${CLAUDE_BIN}" plugin install "${plugin}" | tail -2 || true
                done
                chown -R 1000:1000 "${BASE}/.claude" 2>/dev/null || true
              else
                echo "seed: skipping plugin install — claude not at ${CLAUDE_BIN}"
              fi

              # Hindsight-memory plugin config. The plugin installs above as
              # a Claude Code plugin, but it only activates on UserPromptSubmit
              # /Stop hooks when ${HOME}/.hindsight/claude-code.json exists
              # with a bankId. Without this, the plugin loads silently and
              # never recalls or retains.
              #
              # Bank choice: the shared "agent-memories" bank (cross-agent
              # conversational memory). The existing in-cluster
              # paperclip-plugin-hindsight already writes per-agent
              # structured memory to `paperclip::<companyId>::<agentId>`
              # banks via the paperclip event bus; the CC plugin here
              # captures the orthogonal layer (intra-session learnings,
              # UserPromptSubmit context) and shares it across agents.
              # /paperclip is the PVC mount and ${HOME}=/paperclip for all
              # claude_k8s Job pods, so a single config here is visible to
              # every agent. Re-writes each pod start to stay in sync if
              # the API endpoint or bank changes.
              HS_CONFIG="${BASE}/.hindsight/claude-code.json"
              mkdir -p "$(dirname "${HS_CONFIG}")"
              cat > "${HS_CONFIG}" <<'EOF'
              {
                "hindsightApiUrl": "http://hindsight-api.hindsight.svc.cluster.local:8888",
                "bankId": "agent-memories",
                "bankMission": "",
                "enableKnowledgeTools": true,
                "retainMode": "chunked",
                "retainEveryNTurns": 5,
                "retainOverlapTurns": 1,
                "retainMaxChars": 30000,
                "retainToolCalls": false,
                "requestTimeoutSeconds": 30
              }
              EOF
              chmod 0600 "${HS_CONFIG}"
              chown 1000:1000 "${BASE}/.hindsight" "${HS_CONFIG}" 2>/dev/null || true
              echo "seed: wrote ${HS_CONFIG} pinning hindsight-memory CC plugin to agent-memories bank"
          env:
            {{- if .Values.secret.masterKey }}
            - name: PAPERCLIP_MASTER_KEY_SEED
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperclip.secretName" . }}
                  key: masterKey
            {{- end }}
            {{- if .Values.runtimeCache.enabled }}
            - name: XDG_CACHE_HOME
              value: {{ printf "%s/xdg" .Values.runtimeCache.mountPath | quote }}
            - name: GOCACHE
              value: {{ printf "%s/go-build" .Values.runtimeCache.mountPath | quote }}
            - name: GOMODCACHE
              value: {{ printf "%s/gomod" .Values.runtimeCache.mountPath | quote }}
            - name: npm_config_cache
              value: {{ printf "%s/npm" .Values.runtimeCache.mountPath | quote }}
            - name: BUN_INSTALL_CACHE
              value: {{ printf "%s/bun" .Values.runtimeCache.mountPath | quote }}
            - name: PIP_CACHE_DIR
              value: {{ printf "%s/pip" .Values.runtimeCache.mountPath | quote }}
            - name: PLAYWRIGHT_BROWSERS_PATH
              value: {{ printf "%s/ms-playwright" .Values.runtimeCache.mountPath | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- if .Values.runtimeCache.enabled }}
            - name: runtime-cache
              mountPath: {{ .Values.runtimeCache.mountPath | quote }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      containers:
        - name: paperclip
          image: {{ include "paperclip.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.pod.containerSecurityContext | nindent 12 }}
          workingDir: /app
          command: ["node"]
          args:
            - --import
            - ./server/node_modules/tsx/dist/loader.mjs
            - server/dist/index.js
          ports:
            - name: http
              containerPort: {{ .Values.env.port }}
              protocol: TCP
          env:
            {{- if .Values.api.enabled }}
            # HA split: this is the workers tier. Heartbeat scheduler + plugin
            # workers + Linear tunnel + database backup all live here.
            - name: PAPERCLIP_NODE_ROLE
              value: worker
            {{- end }}
            - name: HOST
              value: {{ .Values.env.host | quote }}
            - name: PORT
              value: {{ .Values.env.port | quote }}
            - name: SERVE_UI
              value: {{ .Values.env.serveUi | quote }}
            - name: PAPERCLIP_HOME
              value: {{ .Values.persistence.mountPath | quote }}
            - name: PAPERCLIP_INSTANCE_ID
              value: {{ .Values.env.instanceId | quote }}
            {{- if .Values.runtimeCache.enabled }}
            - name: XDG_CACHE_HOME
              value: {{ printf "%s/xdg" .Values.runtimeCache.mountPath | quote }}
            - name: GOCACHE
              value: {{ printf "%s/go-build" .Values.runtimeCache.mountPath | quote }}
            - name: GOMODCACHE
              value: {{ printf "%s/gomod" .Values.runtimeCache.mountPath | quote }}
            - name: npm_config_cache
              value: {{ printf "%s/npm" .Values.runtimeCache.mountPath | quote }}
            - name: BUN_INSTALL_CACHE
              value: {{ printf "%s/bun" .Values.runtimeCache.mountPath | quote }}
            - name: PIP_CACHE_DIR
              value: {{ printf "%s/pip" .Values.runtimeCache.mountPath | quote }}
            - name: PLAYWRIGHT_BROWSERS_PATH
              value: {{ printf "%s/ms-playwright" .Values.runtimeCache.mountPath | quote }}
            {{- end }}
            - name: PAPERCLIP_AGENT_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperclip.secretName" . }}
                  key: agentJwtSecret
            {{- if ((.Values.githubApp).enabled) }}
            # GitHub App creds for server-side installation-token minting, used to
            # authoritatively verify a posted PR review before flagging a run
            # pr_review_output_missing (BLO-10448). This (workers) tier runs the
            # heartbeat `executeRun` finalization where the verification fires.
            # Reuses the existing paperclip-github-app-creds secret (keys: app_id,
            # installation_id, private_key.pem). Inert when githubApp.enabled is false.
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ ((.Values.githubApp).secretName) | default "paperclip-github-app-creds" | quote }}
                  key: {{ ((.Values.githubApp).appIdKey) | default "app_id" | quote }}
            - name: GITHUB_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: {{ ((.Values.githubApp).secretName) | default "paperclip-github-app-creds" | quote }}
                  key: {{ ((.Values.githubApp).installationIdKey) | default "installation_id" | quote }}
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ ((.Values.githubApp).secretName) | default "paperclip-github-app-creds" | quote }}
                  key: {{ ((.Values.githubApp).privateKeyKey) | default "private_key.pem" | quote }}
            {{- with ((.Values.githubApp).reviewerBotLogin) }}
            - name: PAPERCLIP_PR_REVIEWER_BOT_LOGIN
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.env.extra }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.probes.startup | nindent 12 }}
          lifecycle:
            preStop:
              exec:
                # Sleep so the Service endpoint removal propagates to kube-proxy /
                # Cilium before SIGTERM hits the process. The Node SIGTERM handler
                # then has the full terminationGracePeriodSeconds (default 30s) to
                # drain SSE connections via sseRegistry.drain(timeoutMs: 25_000).
                command: ["sh", "-c", "sleep 5"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- if .Values.runtimeCache.enabled }}
            - name: runtime-cache
              mountPath: {{ .Values.runtimeCache.mountPath | quote }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or (and .Values.persistence.enabled .Values.persistence.existingClaim) .Values.runtimeCache.enabled .Values.extraVolumes }}
      volumes:
        {{- if and .Values.persistence.enabled .Values.persistence.existingClaim }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | quote }}
        {{- end }}
        {{- if .Values.runtimeCache.enabled }}
        - name: runtime-cache
          {{- if .Values.runtimeCache.sizeLimit }}
          emptyDir:
            sizeLimit: {{ .Values.runtimeCache.sizeLimit | quote }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
  {{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "paperclip.labels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- with .Values.persistence.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
