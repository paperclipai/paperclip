apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "paperclip.fullname" . }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "paperclip.fullname" . }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "paperclip.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "paperclip.selectorLabels" . | nindent 8 }}
        {{- with .Values.pod.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.pod.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "paperclip.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      shareProcessNamespace: {{ .Values.pod.shareProcessNamespace }}
      securityContext:
        {{- toYaml .Values.pod.securityContext | nindent 8 }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      initContainers:
        - name: seed
          image: {{ include "paperclip.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.pod.containerSecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              BASE={{ .Values.persistence.mountPath | quote }}
              INST="${BASE}/instances/{{ .Values.env.instanceId }}"
              mkdir -p "${INST}/secrets"
              if [ -n "${PAPERCLIP_MASTER_KEY_SEED:-}" ] && [ ! -f "${INST}/secrets/master.key" ]; then
                printf '%s' "${PAPERCLIP_MASTER_KEY_SEED}" | base64 -d > "${INST}/secrets/master.key"
                chmod 0600 "${INST}/secrets/master.key"
              fi
              # The chat plugin (@lucitra/paperclip-plugin-chat) hard-spawns
              # `${HOME}/.local/bin/<binary>` for both claude and codex agents.
              # The image bakes these symlinks at /usr/local/bin/, but the PVC
              # mount at ${BASE} hides anything baked under it, so we must
              # recreate the symlinks on every pod boot. The container
              # deployment overrides the image entrypoint to run `node`
              # directly, which means docker-entrypoint.sh never runs — the
              # seed init container is the right place to do this once before
              # the main container starts.
              mkdir -p "${BASE}/.local/bin"
              for bin in claude codex; do
                if [ ! -e "${BASE}/.local/bin/${bin}" ] && [ -e "/usr/local/bin/${bin}" ]; then
                  ln -sf "/usr/local/bin/${bin}" "${BASE}/.local/bin/${bin}"
                fi
              done
              chown -R 1000:1000 "${BASE}/.local" 2>/dev/null || true
              # Install bundled adapter tarballs from /opt/paperclip-bundled-adapters
              # into the runtime adapter-plugins dir on the shared PVC. This makes the
              # patched paperclip-adapter-claude-k8s (kkroo fork) self-bootstrapping —
              # a fresh PVC doesn't need an out-of-band kubectl-cp + /api/adapters/install
              # round-trip. Skipped if the adapter package dir already exists with the
              # bundled version (so paperclip's runtime install path can still upgrade).
              if [ -d /opt/paperclip-bundled-adapters ]; then
                ADAPTER_DIR="${BASE}/adapter-plugins"
                mkdir -p "${ADAPTER_DIR}/node_modules"
                for tgz in /opt/paperclip-bundled-adapters/*.tgz; do
                  [ -f "${tgz}" ] || continue
                  pkg_name=$(tar -xzOf "${tgz}" package/package.json 2>/dev/null | sed -n 's/.*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
                  pkg_ver=$(tar -xzOf "${tgz}" package/package.json 2>/dev/null | sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
                  [ -n "${pkg_name}" ] || continue
                  installed_ver=""
                  if [ -f "${ADAPTER_DIR}/node_modules/${pkg_name}/package.json" ]; then
                    installed_ver=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "${ADAPTER_DIR}/node_modules/${pkg_name}/package.json" | head -1)
                  fi
                  if [ "${installed_ver}" = "${pkg_ver}" ]; then
                    echo "seed: bundled adapter ${pkg_name}@${pkg_ver} already installed"
                  else
                    echo "seed: installing bundled adapter ${pkg_name}@${pkg_ver} (was: ${installed_ver:-none})"
                    rm -rf "${ADAPTER_DIR}/node_modules/${pkg_name}"
                    mkdir -p "${ADAPTER_DIR}/node_modules/${pkg_name}"
                    tar -xzf "${tgz}" -C "${ADAPTER_DIR}/node_modules/${pkg_name}" --strip-components=1
                  fi
                  # Ensure adapter-plugins.json registry entry exists / is updated.
                  python3 - "${BASE}/adapter-plugins.json" "${pkg_name}" "${pkg_ver}" "${ADAPTER_DIR}/node_modules/${pkg_name}" <<'PY' || echo "seed: registry update for ${pkg_name} failed (non-fatal)"
              import json, os, sys
              path, name, ver, local_path = sys.argv[1:5]
              # adapter-plugins.json stores [{packageName,version,type,installedAt,localPath?}]
              # We don't know the adapter `type` field without loading the dist — leave it
              # to the runtime /api/adapters reload to populate. Just ensure the shape so
              # paperclip's loadFromRecord picks it up. If existing record present, update.
              records = []
              if os.path.exists(path):
                  try:
                      with open(path) as f: records = json.load(f) or []
                  except Exception: records = []
              # Find by packageName
              hit = next((r for r in records if isinstance(r, dict) and r.get("packageName") == name), None)
              if hit is None:
                  records.append({"packageName": name, "version": ver, "localPath": local_path, "type": "", "installedAt": "1970-01-01T00:00:00.000Z"})
              else:
                  hit["version"] = ver
                  hit["localPath"] = local_path
              with open(path, "w") as f: json.dump(records, f, indent=2)
              PY
                done
                chown -R 1000:1000 "${ADAPTER_DIR}" 2>/dev/null || true
                if [ -f "${BASE}/adapter-plugins.json" ]; then
                  chown 1000:1000 "${BASE}/adapter-plugins.json" 2>/dev/null || true
                fi
              fi
              # Install ccrotate's claude-code hooks into /paperclip/.claude/hooks
              # and register them in /paperclip/.claude/settings.json. claude-code
              # only loads hooks declared in $HOME/.claude/settings.json, and on a
              # k8s Job pod $HOME=/paperclip — so without this step a long-running
              # claude session inside a Job pod can't refresh OAuth mid-run, and
              # the spawn-time `ccrotate next` prepend is the only refresh point.
              # See ccrotate README §Claude Code Hook Integration.
              CCROTATE_PKG_DIR="/usr/local/lib/node_modules/ccrotate"
              if [ -d "${CCROTATE_PKG_DIR}/claude-hooks" ]; then
                CLAUDE_DIR="${BASE}/.claude"
                HOOKS_DIR="${CLAUDE_DIR}/hooks"
                SETTINGS="${CLAUDE_DIR}/settings.json"
                mkdir -p "${HOOKS_DIR}"
                for src in "${CCROTATE_PKG_DIR}/claude-hooks/"*.sh; do
                  [ -f "${src}" ] || continue
                  dst="${HOOKS_DIR}/$(basename "${src}")"
                  if [ ! -f "${dst}" ] || [ "${src}" -nt "${dst}" ]; then
                    cp "${src}" "${dst}"
                    chmod +x "${dst}"
                    echo "seed: installed claude-code hook $(basename ${src})"
                  fi
                done
                # Merge ccrotate hook entries into settings.json without clobbering
                # operator-set hooks. Idempotent: skips re-inserting an entry whose
                # command already matches one of ccrotate's hook scripts.
                python3 - "${SETTINGS}" "${HOOKS_DIR}" <<'PY' || echo "seed: claude settings hooks merge failed (non-fatal)"
              import json, os, sys
              settings_path, hooks_dir = sys.argv[1], sys.argv[2]
              # claude-code settings.json schema: top-level "hooks" is an object
              # whose keys are hook event names; each value is an array of {hooks:
              # [{type, command, timeout, statusMessage}]} groups.
              desired = {
                  "Stop": {
                      "command": f"bash {hooks_dir}/ccrotate-on-limit.sh",
                      "timeout": 15,
                      "statusMessage": "Checking rate limits...",
                  },
                  "SessionStart": {
                      "command": f"bash {hooks_dir}/ccrotate-check-tier.sh",
                      "timeout": 45,
                      "statusMessage": "Checking usage tier...",
                  },
                  "UserPromptSubmit": {
                      "command": f"bash {hooks_dir}/ccrotate-preemptive.sh",
                      "timeout": 10,
                  },
              }
              try:
                  with open(settings_path) as f:
                      doc = json.load(f) or {}
              except (FileNotFoundError, ValueError):
                  doc = {}
              if not isinstance(doc, dict):
                  doc = {}
              hooks = doc.setdefault("hooks", {})
              if not isinstance(hooks, dict):
                  hooks = {}
                  doc["hooks"] = hooks
              changed = False
              for event, entry in desired.items():
                  groups = hooks.setdefault(event, [])
                  if not isinstance(groups, list):
                      groups = []
                      hooks[event] = groups
                  # Already installed? Match by command path so re-running upgrades
                  # the timeout/statusMessage if ccrotate's defaults change.
                  found_idx = None
                  for i, group in enumerate(groups):
                      if not isinstance(group, dict): continue
                      for h in group.get("hooks", []):
                          if isinstance(h, dict) and h.get("command") == entry["command"]:
                              found_idx = i
                              break
                      if found_idx is not None: break
                  payload = {"hooks": [{"type": "command", **entry}]}
                  if found_idx is None:
                      groups.append(payload)
                      changed = True
                  elif groups[found_idx] != payload:
                      groups[found_idx] = payload
                      changed = True
              if changed or not os.path.exists(settings_path):
                  os.makedirs(os.path.dirname(settings_path), exist_ok=True)
                  with open(settings_path, "w") as f:
                      json.dump(doc, f, indent=2)
                  print(f"seed: updated {settings_path} with ccrotate hooks")
              else:
                  print("seed: ccrotate hooks already registered in settings.json")
              PY
                chown -R 1000:1000 "${CLAUDE_DIR}" 2>/dev/null || true
              fi
          env:
            {{- if .Values.secret.masterKey }}
            - name: PAPERCLIP_MASTER_KEY_SEED
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperclip.secretName" . }}
                  key: masterKey
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
      containers:
        - name: paperclip
          image: {{ include "paperclip.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.pod.containerSecurityContext | nindent 12 }}
          workingDir: /app
          command: ["node"]
          args:
            - --import
            - ./server/node_modules/tsx/dist/loader.mjs
            - server/dist/index.js
          ports:
            - name: http
              containerPort: {{ .Values.env.port }}
              protocol: TCP
          env:
            - name: HOST
              value: {{ .Values.env.host | quote }}
            - name: PORT
              value: {{ .Values.env.port | quote }}
            - name: SERVE_UI
              value: {{ .Values.env.serveUi | quote }}
            - name: PAPERCLIP_HOME
              value: {{ .Values.persistence.mountPath | quote }}
            - name: PAPERCLIP_INSTANCE_ID
              value: {{ .Values.env.instanceId | quote }}
            - name: PAPERCLIP_AGENT_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperclip.secretName" . }}
                  key: agentJwtSecret
            {{- with .Values.env.extra }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.probes.startup | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.persistence.enabled .Values.persistence.existingClaim }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | quote }}
      {{- end }}
  {{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "paperclip.labels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- with .Values.persistence.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
