{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "paperclip.fullname" . }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
spec:
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "paperclip.selectorLabels" . | nindent 6 }}
{{- end }}
