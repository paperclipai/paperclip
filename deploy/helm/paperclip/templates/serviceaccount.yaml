{{- /*
   Fail fast when rbac.create=true but the SA token isn't being mounted.
   The k8s-Job adapters need an in-cluster kubeconfig to reach the API;
   without a token, install-time SSAR never runs and every adapter call
   fails with "in-cluster config not available".
*/ -}}
{{- if and .Values.rbac.create (not .Values.serviceAccount.automountToken) -}}
{{- fail "rbac.create=true requires serviceAccount.automountToken=true (the k8s-Job adapters need a mounted SA token to reach the K8s API)." -}}
{{- end -}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "paperclip.serviceAccountName" . }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountToken }}
{{- end }}
