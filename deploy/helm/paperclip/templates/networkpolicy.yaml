{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "paperclip.fullname" . }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "paperclip.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- toYaml .Values.networkPolicy.allowFromNamespaces | nindent 8 }}
        {{- if and .Values.serviceMonitor.enabled .Values.serviceMonitor.scrapeAllowFromNamespaces }}
        {{- /* Open the scrape path for the Prometheus namespace(s) when a
               ServiceMonitor is in play; /metrics shares the HTTP port. */}}
        {{- toYaml .Values.serviceMonitor.scrapeAllowFromNamespaces | nindent 8 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.env.port }}
{{- end }}
