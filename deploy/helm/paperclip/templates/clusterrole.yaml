{{- if .Values.rbac.create }}
# Cluster-scoped ClusterRole for SelfSubjectAccessReview only.
# Both k8s-Job adapters call SSAR from their test() entry point as a
# best-effort permission probe; failures surface as warnings, not hard
# install errors (paperclip-adapter-claude-k8s/dist/server/test.js:118).
# SSAR is a cluster-scoped resource (it has no namespace) so it can't live
# in the Role above.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "paperclip.fullname" . }}-{{ .Release.Namespace }}-ssar
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
rules:
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectaccessreviews"]
    verbs: ["create"]
{{- end }}
