# Default values for paperclip.
# Every value is annotated for helm-docs. If you add or rename a value, run
# `pre-commit run helm-docs` (or the chart-lint CI will fail).

# -- Container image settings.
image:
  # -- Image repository. Upstream publishes to `ghcr.io/paperclipai/paperclip` on every master push and stable tag.
  repository: ghcr.io/paperclipai/paperclip
  # -- Image tag. Override to a specific stable release (e.g. `v2026.416.0`) or pin to a `sha-<commit>` tag.
  tag: "latest"
  # -- Image pull policy.
  pullPolicy: IfNotPresent

# -- Image pull secrets. Only needed if the GHCR package is private.
# Example: `[{name: ghcr-pull}]`.
imagePullSecrets: []

# -- Override the chart name used in resource names.
nameOverride: ""
# -- Override the full name used as the prefix for every resource.
fullnameOverride: ""

# -- Persistent volume settings for `/paperclip`.
persistence:
  # -- Whether to create a PVC for `/paperclip`. Required for any real use — disabling loses all state on pod restart.
  enabled: true
  # -- StorageClass for the PVC. `local-path` on the Talos cluster; set to empty string to use the cluster default.
  storageClassName: local-path
  # -- Access mode for the PVC. ReadWriteOnce is correct for the single-replica StatefulSet.
  accessMode: ReadWriteOnce
  # -- PVC size. Sized for live state + ~30 days of hourly pg_dumps.
  size: 20Gi
  # -- Mount path inside the container. Paperclip's `PAPERCLIP_HOME` defaults to `/paperclip`; keep these aligned.
  mountPath: /paperclip
  # -- Use a pre-created PVC by name instead of `volumeClaimTemplates`. Required for ReadWriteMany migrations
  # where the StatefulSet's immutable volumeClaimTemplates lock-in must be avoided. When set, `storageClassName`,
  # `accessMode`, and `size` are ignored — the PVC must already exist in the release namespace.
  existingClaim: ""

# -- Pod-local cache storage for regenerable build/package/browser downloads.
# Keep durable identity/config state on `persistence.mountPath`; this emptyDir is
# safe to discard on pod restart.
# Rollback: set `enabled: false`, run a Helm upgrade, and restart affected
# Paperclip pods/jobs so they fall back to image/default cache paths.
runtimeCache:
  # -- Mount an emptyDir cache volume and point common cache env vars at it.
  enabled: true
  # -- Mount path for the cache emptyDir.
  mountPath: /runtime-cache
  # -- Optional emptyDir size limit. Set to empty string for no explicit limit.
  sizeLimit: 20Gi

# -- HA API tier — splits the single-pod StatefulSet into a multi-replica
# HTTP API Deployment plus a singleton worker StatefulSet. When enabled,
# the workers tier owns the heartbeat scheduler + plugin workers + Linear
# tunnel + database backup; the API tier serves HTTP traffic only with
# `PAPERCLIP_NODE_ROLE=api` (so plugin operations 503 cleanly on it).
# See server/src/services/plugin-worker-manager-stub.ts.
api:
  # -- Enable the API/worker split. When `false` (default) the chart behaves
  # like the single-replica StatefulSet that ships with upstream paperclip —
  # no migration impact for existing deploys.
  enabled: false
  # -- Number of API tier replicas. 2+ is the point of the split. Each replica
  # runs `PAPERCLIP_NODE_ROLE=api`, no plugin workers, no scheduler.
  replicas: 2
  # -- Rolling update budget for the API Deployment. `maxSurge: 1` +
  # `maxUnavailable: 0` gives zero-downtime rolls for HTTP traffic.
  maxSurge: 1
  maxUnavailable: 0
  # -- Soft anti-affinity to spread API replicas across nodes. Falls back to
  # co-located if the cluster has only one schedulable paperclip node.
  spreadAcrossNodes: true

# -- Kubernetes Service exposing the HTTP UI/API.
service:
  # -- Service type. Keep `ClusterIP`; cloudflared or Ingress handle external exposure.
  type: ClusterIP
  # -- Service port. Must match `env.port`.
  port: 3100

# -- Optional Ingress. Leave disabled if fronting via cloudflared only.
ingress:
  # -- Enable an Ingress resource.
  enabled: false
  # -- Ingress class name. `nginx` matches the cluster's ingress-nginx install.
  className: nginx
  # -- Annotations on the Ingress (e.g. cert-manager, rate limits).
  annotations: {}
  # -- Hosts and paths served by the Ingress.
  # @default -- single host at `paperclip.example.com` serving `/`.
  hosts:
    - host: paperclip.example.com
      paths:
        - path: /
          pathType: Prefix
  # -- TLS configuration. Leave empty to serve HTTP only.
  # Example: `[{hosts: [paperclip.example.com], secretName: paperclip-tls}]`.
  tls: []

# -- Paperclip runtime environment.
env:
  # -- Bind address.
  host: "0.0.0.0"
  # -- HTTP port inside the container (must match `service.port`).
  port: 3100
  # -- Serve the bundled web UI alongside the API.
  serveUi: true
  # -- Paperclip instance identifier. Directory under `/paperclip/instances/` is named after this.
  instanceId: default
  # -- Extra environment variables merged verbatim into the container spec.
  # Example: `[{name: NODE_OPTIONS, value: --max-old-space-size=3072}]`.
  extra: []

# -- Additional pod-level volumes. Used to mount Secrets/ConfigMaps that
# plugins read from disk (e.g. paperclip-plugin-gbrain reads OAuth client
# credentials from `/etc/paperclip-plugin-gbrain/clients.json`).
# Example:
#   extraVolumes:
#     - name: gbrain-oauth-secrets
#       secret:
#         secretName: paperclip-plugin-gbrain-oauth-secrets
#         defaultMode: 0444
extraVolumes: []

# -- Additional volumeMounts for the main `paperclip` container. Pair with
# `extraVolumes`; each entry must reference a name declared there.
# Example:
#   extraVolumeMounts:
#     - name: gbrain-oauth-secrets
#       mountPath: /etc/paperclip-plugin-gbrain
#       readOnly: true
extraVolumeMounts: []

# -- Secret containing `agentJwtSecret` and optional `masterKey` seed.
secret:
  # -- Name of a pre-existing Secret to read credentials from. Leave empty to let the chart render a Secret with an auto-generated `agentJwtSecret` on first install. **Set this under GitOps** — the templated Secret uses `randAlphaNum`, which re-rolls on every render, keeping the app perpetually OutOfSync and thrashing pods under `selfHeal`. Create the Secret with `kubectl create secret generic <name> --from-literal=agentJwtSecret=$(openssl rand -hex 32)` and point `existingSecret` at it.
  existingSecret: ""
  # -- JWT secret for the Paperclip agent. Only used when `existingSecret` is empty — avoid under GitOps (non-deterministic render).
  agentJwtSecret: ""
  # -- Base64-encoded master key to seed `/paperclip/instances/<instanceId>/secrets/master.key` on first boot. Ignored if the file already exists on the PVC. Only used when `existingSecret` is empty. Leave empty to let Paperclip generate its own on first run.
  masterKey: ""

# -- GitHub App creds for server-side installation-token minting. Lets the API
# authoritatively verify (via the GitHub API) that a PR-review run actually left
# a review/comment before flagging it `pr_review_output_missing` (BLO-10448).
# Disabled by default — the verification is inert without it and runs fall back
# to the text heuristic. Enable on deployments where the referenced secret exists.
githubApp:
  # -- Mount the GitHub App creds into the API env and enable GitHub-verified PR-review evidence.
  enabled: false
  # -- Name of the pre-existing Secret holding the App creds.
  secretName: paperclip-github-app-creds
  # -- Secret keys (override only if your secret uses different key names).
  appIdKey: app_id
  installationIdKey: installation_id
  privateKeyKey: private_key.pem
  # -- GitHub login of the reviewer bot used to filter reviews/comments. Empty -> server default ("allyblockcast[bot]").
  reviewerBotLogin: ""

# -- Pod spec knobs.
pod:
  # -- Share the process namespace so tini (pid 1) reaps orphaned child processes spawned by Claude agents.
  shareProcessNamespace: true
  # -- Pod-level security context.
  # @default -- `{fsGroup: 1000, fsGroupChangePolicy: OnRootMismatch}`.
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  # -- Container-level security context.
  # @default -- `{runAsUser: 1000, runAsGroup: 1000, runAsNonRoot: true}`.
  containerSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
  # -- Extra annotations on the pod template.
  annotations: {}
  # -- Extra labels on the pod template.
  labels: {}

# -- Container resource requests/limits.
# @default -- requests `500m/1Gi`, limits `2/4Gi`.
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

# -- Health probe configuration. `httpGet` to `/healthz` with an explicit
# `Host: 127.0.0.1:3100` header — Paperclip's hostname allowlist always accepts
# loopback (see server/src/middleware/private-hostname-guard.ts), while the
# pod-IP Host header kubelet would otherwise send is rejected.
probes:
  # -- Liveness probe. Paperclip serves HTTP on the configured port once the embedded Postgres is up.
  # timeoutSeconds=5 (k8s default is 1) — under load /healthz can spike past
  # 1s when the event loop is briefly busy (e.g. during a fs-write batch
  # under contention with ccrotate-auth-bot's pool sweep). Observed
  # 2026-05-09 ~04:55Z: kubelet flagged "Killing — failed liveness probe"
  # but the process recovered before the kill landed. 5s is a generous
  # ceiling that absorbs those spikes without hiding a real wedge.
  liveness:
    httpGet:
      path: /healthz
      port: http
      httpHeaders:
        - name: Host
          value: 127.0.0.1:3100
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  # -- Readiness probe. Shorter cadence pulls the pod out of rotation quickly on transient failures.
  readiness:
    httpGet:
      path: /healthz
      port: http
      httpHeaders:
        - name: Host
          value: 127.0.0.1:3100
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  # -- Startup probe. Long timeout tolerates first-run DB init + 45 migrations.
  startup:
    httpGet:
      path: /healthz
      port: http
      httpHeaders:
        - name: Host
          value: 127.0.0.1:3100
    periodSeconds: 10
    failureThreshold: 30

# -- Node selector.
nodeSelector: {}
# -- Tolerations.
tolerations: []
# -- Affinity rules.
affinity: {}
# -- Priority class name.
priorityClassName: ""

# -- PodDisruptionBudget. Uses `maxUnavailable` rather than `minAvailable` so node drains and cluster upgrades remain possible on the single-replica StatefulSet (a `minAvailable: 1` budget would block every voluntary eviction).
pdb:
  # -- Create a PodDisruptionBudget.
  enabled: true
  # -- Maximum number of pods that may be unavailable during voluntary disruptions. `1` lets a single-replica StatefulSet be drained.
  maxUnavailable: 1

# -- Ingress NetworkPolicy restricting which namespaces may reach the pod.
networkPolicy:
  # -- Create a NetworkPolicy. Defaults to allowing from `ingress-nginx` and `cloudflare` namespaces only — **same-namespace pods (sidecars, scrapers, `kubectl debug` pods) are also blocked**, so extend `allowFromNamespaces` or disable the policy for any in-cluster tooling that needs to reach the service.
  enabled: true
  # -- Namespaces whose pods may reach the Paperclip service port. Add an entry for the release namespace if you need same-namespace traffic (e.g. Prometheus scrape, debug pods).
  # @default -- `ingress-nginx` and `cloudflare` namespaces.
  allowFromNamespaces:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: cloudflare

# -- Prometheus Operator ServiceMonitor for scraping the control-plane
# `/metrics` endpoint (BLO-8328). Requires the `monitoring.coreos.com/v1` CRDs
# (Prometheus Operator / kube-prometheus-stack). Disabled by default so the
# chart still installs on clusters without the operator. Enabling this also
# opens the NetworkPolicy scrape path when `scrapeAllowFromNamespaces` is set.
serviceMonitor:
  # -- Create a ServiceMonitor. Leave false on clusters without the Prometheus Operator CRDs.
  enabled: false
  # -- Namespace for the ServiceMonitor. Empty renders it into the release namespace.
  namespace: ""
  # -- Extra labels so a Prometheus `serviceMonitorSelector` can adopt it (e.g. `{release: kube-prometheus-stack}`).
  labels: {}
  # -- Scrape path. Matches the control-plane `/metrics` route.
  path: /metrics
  # -- Scrape interval.
  interval: 30s
  # -- Per-scrape timeout. Must be `<=` `interval`.
  scrapeTimeout: 10s
  # -- Namespaces of the Prometheus pods that scrape this Service. Appended to
  # the NetworkPolicy ingress `from` (when `networkPolicy.enabled`) so scrapes
  # are not blocked. Same shape as `networkPolicy.allowFromNamespaces`.
  # Example: `[{namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: monitoring}}}]`.
  scrapeAllowFromNamespaces: []

# -- Dedicated ServiceAccount for the pod.
serviceAccount:
  # -- Create a dedicated ServiceAccount.
  create: true
  # -- Name override. Defaults to the full release name when empty.
  name: ""
  # -- Annotations on the ServiceAccount.
  annotations: {}
  # -- Mount the SA token into the pod. Required when `rbac.create` is true so the k8s-Job adapters (paperclip-adapter-claude-k8s / -opencode-k8s) can authenticate to the K8s API. Default false to preserve the legacy posture.
  automountToken: false

# -- Namespace-scoped RBAC for the k8s-Job adapters.
# When `rbac.create: true`, the chart renders a Role + RoleBinding granting
# the SA permission to manage Jobs/Pods/Secrets/PVCs in this namespace, plus
# a ClusterRole + ClusterRoleBinding for SelfSubjectAccessReview (used by
# both adapters' install-time self-test). Only enable in tandem with
# `serviceAccount.automountToken: true`.
rbac:
  # -- Render Role/RoleBinding/ClusterRole/ClusterRoleBinding for the k8s-Job adapters.
  create: false
