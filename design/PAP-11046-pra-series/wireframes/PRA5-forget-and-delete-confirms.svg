  <text x="280" y="334" font-size="13" stroke="none" fill="#bbb" text-anchor="start">— rule row —</text>
  <rect x="232" y="352" width="1016" height="48" rx="0" fill="#fafaf8" stroke="#000" stroke-width="1.5" />
