  <text x="184" y="418.0" font-size="12" stroke="none" fill="#666" text-anchor="start">Remembered for Fable · approved by Dotta on Jun 3</text>
  <rect x="184" y="436.0" width="352" height="56" rx="6" fill="#fafaf8" stroke="#000" stroke-width="1.5" />
  <text x="196" y="458.0" font-size="13" stroke="none" fill="#000" text-anchor="start">Next time Fable tries Send email, Paperclip will</text>
  <text x="196" y="476.0" font-size="13" stroke="none" fill="#000" text-anchor="start">ask you again instead of letting it through.</text>
  <rect x="440" y="504.0" width="96" height="36" rx="6" fill="#000" stroke="#000" stroke-width="1.5" />
