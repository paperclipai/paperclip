  <text x="744" y="356.0" font-size="18" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Delete this rule?</text>
  <text x="744" y="390.0" font-size="13" stroke="none" fill="#000" text-anchor="start">When any agent uses destructive Gmail</text>
  <text x="744" y="408.0" font-size="13" stroke="none" fill="#000" text-anchor="start">actions → Ask first</text>
  <rect x="744" y="428.0" width="352" height="56" rx="6" fill="#fafaf8" stroke="#000" stroke-width="1.5" />
