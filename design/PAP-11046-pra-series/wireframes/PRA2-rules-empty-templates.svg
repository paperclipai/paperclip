  <text x="232" y="124" font-size="28" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Rules</text>
  <text x="232" y="148" font-size="14" stroke="none" fill="#666" text-anchor="start">Checked top to bottom — the first one that matches decides</text>
