  <text x="756.0" y="336" font-size="20" stroke="none" fill="#000" text-anchor="middle" font-weight="bold">No rules yet</text>
  <text x="756.0" y="360" font-size="14" stroke="none" fill="#666" text-anchor="middle">Start from a template, or build your own.</text>
  <rect x="280" y="408" width="416" height="152" rx="8" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="304" y="444" font-size="15" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Block destructive actions everywhere</text>
  <text x="304" y="472" font-size="13" stroke="none" fill="#666" text-anchor="start">Stop sends, deletes, and other irreversible</text>
  <text x="304" y="492" font-size="13" stroke="none" fill="#666" text-anchor="start">actions across every app.</text>
  <rect x="304" y="516" width="88" height="28" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
