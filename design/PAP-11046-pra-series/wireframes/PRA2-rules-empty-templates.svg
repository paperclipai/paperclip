  <rect x="980" y="224" width="132" height="36" rx="6" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="1046.0" y="247.0" font-size="14" stroke="none" fill="#000" text-anchor="middle">Test a rule</text>
