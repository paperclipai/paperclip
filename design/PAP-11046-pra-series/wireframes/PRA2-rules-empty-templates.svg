  <text x="744" y="444" font-size="15" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Ask first before anything sends or deletes</text>
  <text x="744" y="472" font-size="13" stroke="none" fill="#666" text-anchor="start">Pause any outgoing message or delete until</text>
  <text x="744" y="492" font-size="13" stroke="none" fill="#666" text-anchor="start">you tap Allow.</text>
  <rect x="744" y="516" width="88" height="28" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="788.0" y="534.0" font-size="12" stroke="none" fill="#000" text-anchor="middle">Use this</text>
  <rect x="280" y="584" width="416" height="152" rx="8" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="304" y="620" font-size="15" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Limit a noisy action</text>
  <text x="304" y="648" font-size="13" stroke="none" fill="#666" text-anchor="start">Cap how many times an action can run</text>
  <text x="304" y="668" font-size="13" stroke="none" fill="#666" text-anchor="start">per hour, or per day.</text>
  <rect x="304" y="692" width="88" height="28" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="348.0" y="710.0" font-size="12" stroke="none" fill="#000" text-anchor="middle">Use this</text>
  <rect x="720" y="584" width="416" height="152" rx="8" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="744" y="620" font-size="15" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Start from scratch</text>
  <text x="744" y="648" font-size="13" stroke="none" fill="#666" text-anchor="start">Open an empty rule builder. You pick who,</text>
