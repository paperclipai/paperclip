<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1100" viewBox="0 0 1280 1100" font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="1100" />
  <rect x="0" y="0" width="1280" height="56" rx="0" fill="#fff" stroke="#000" stroke-width="1.5" />
  <line x1="0" y1="56" x2="1280" y2="56" stroke="#000" stroke-width="1.5" />
  <text x="32" y="35" font-size="14" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Paperclip</text>
  <text x="1248" y="35" font-size="12" stroke="none" fill="#666" text-anchor="end">Dotta</text>
  <rect x="0" y="56" width="200" height="1044" rx="0" fill="#fafaf8" stroke="#000" stroke-width="1.5" />
  <line x1="200" y1="56" x2="200" y2="1100" stroke="#000" stroke-width="1.5" />
  <text x="28" y="96" font-size="14" stroke="none" fill="#666" text-anchor="start">Inbox</text>
  <text x="28" y="132" font-size="14" stroke="none" fill="#666" text-anchor="start">Tasks</text>
  <text x="28" y="168" font-size="14" stroke="none" fill="#666" text-anchor="start">Documents</text>
  <rect x="12" y="186" width="176" height="32" rx="6" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="28" y="204" font-size="14" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Apps</text>
  <text x="28" y="240" font-size="14" stroke="none" fill="#666" text-anchor="start">Settings</text>
  <text x="232" y="92" font-size="12" stroke="none" fill="#666" text-anchor="start">Apps · Advanced · Rules · New</text>
  <text x="232" y="124" font-size="28" stroke="none" fill="#000" text-anchor="start" font-weight="bold">New rule</text>
  <text x="232" y="148" font-size="14" stroke="none" fill="#666" text-anchor="start">Build a rule in plain words. Preview updates as you go.</text>
  <line x1="232" y1="204" x2="293" y2="204" stroke="#000" stroke-width="2.5" />
  <text x="262.5" y="188" font-size="14" stroke="none" fill="#000" text-anchor="middle" font-weight="bold">Rules</text>
  <text x="352.0" y="188" font-size="14" stroke="none" fill="#666" text-anchor="middle">Health</text>
  <text x="455.0" y="188" font-size="14" stroke="none" fill="#666" text-anchor="middle">Activity</text>
  <line x1="232" y1="204" x2="1248" y2="204" stroke="#ccc" stroke-width="1" />
  <rect x="232" y="220" width="1016" height="56" rx="8" fill="#fafaf8" stroke="#000" stroke-width="1.5" />
  <text x="248" y="244" font-size="11" stroke="none" fill="#666" text-anchor="start" font-weight="bold">Preview</text>
  <text x="248" y="264" font-size="14" stroke="none" fill="#000" text-anchor="start" font-weight="bold">When Fable uses gmail.send_*, ask first  ·  priority 250</text>
  <rect x="232" y="296" width="1016" height="96" rx="8" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="248" y="320" font-size="12" stroke="none" fill="#666" text-anchor="start" font-weight="bold">When</text>
  <text x="248" y="340" font-size="13" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Fable</text>
  <text x="440" y="320" font-size="12" stroke="none" fill="#666" text-anchor="start" font-weight="bold">uses</text>
  <text x="440" y="340" font-size="13" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Gmail · actions that make changes</text>
  <text x="840" y="320" font-size="12" stroke="none" fill="#666" text-anchor="start" font-weight="bold">then</text>
  <text x="840" y="340" font-size="13" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Ask first</text>
  <text x="248" y="372" font-size="11" stroke="none" fill="#666" text-anchor="start">Click any of the three above to edit</text>
  <rect x="232" y="416" width="1016" height="588" rx="8" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="248" y="444" font-size="15" stroke="none" fill="#000" text-anchor="start" font-weight="bold">▾ Advanced</text>
  <text x="248" y="464" font-size="12" stroke="none" fill="#666" text-anchor="start">For power users — most rules don't need any of this.</text>
  <line x1="248" y1="480" x2="1232" y2="480" stroke="#000" stroke-width="1.5" />
  <text x="256" y="504" font-size="12" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Wildcard action names</text>
  <rect x="256" y="516" width="472.0" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="268" y="541" font-size="13" stroke="none" fill="#000" text-anchor="start">gmail.send_*, gmail.delete_*</text>
  <text x="256" y="574" font-size="11" stroke="none" fill="#666" text-anchor="start">Comma-separated. Use * as a wildcard.</text>
  <text x="752.0" y="504" font-size="12" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Raw selectors</text>
  <rect x="752.0" y="516" width="472.0" height="96" rx="6" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="764.0" y="536" font-size="12" stroke="none" fill="#666" text-anchor="start">connectionId</text>
  <text x="764.0" y="554" font-size="13" stroke="none" fill="#000" text-anchor="start">cn_2c5e…fable-gmail</text>
  <text x="764.0" y="580" font-size="12" stroke="none" fill="#666" text-anchor="start">catalogId</text>
  <text x="764.0" y="598" font-size="13" stroke="none" fill="#000" text-anchor="start">cat_g…workspace-actions</text>
  <text x="256" y="620" font-size="12" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Conditions JSON</text>
  <rect x="256" y="632" width="968" height="132" rx="6" fill="#fafaf8" stroke="#000" stroke-width="1.5" />
  <text x="272" y="656" font-size="12" stroke="none" fill="#000" text-anchor="start">{</text>
  <text x="272" y="676" font-size="12" stroke="none" fill="#000" text-anchor="start">  "actorRiskLevel": ["medium", "high"],</text>
  <text x="272" y="696" font-size="12" stroke="none" fill="#000" text-anchor="start">  "params.to.domain": { "$nin": ["magicmachine.co"] },</text>
  <text x="272" y="716" font-size="12" stroke="none" fill="#000" text-anchor="start">  "time.window": { "after": "08:00", "before": "20:00" }</text>
  <text x="272" y="736" font-size="12" stroke="none" fill="#000" text-anchor="start">}</text>
  <text x="256" y="788" font-size="12" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Custom check (validate) config</text>
  <rect x="256" y="800" width="472.0" height="64" rx="6" fill="#fafaf8" stroke="#000" stroke-width="1.5" />
  <text x="272" y="824" font-size="12" stroke="none" fill="#000" text-anchor="start">{ "checker": "no-external-recipients" }</text>
  <text x="272" y="844" font-size="11" stroke="none" fill="#666" text-anchor="start">Runs your check function before the action.</text>
  <text x="752.0" y="788" font-size="12" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Priority</text>
  <rect x="752.0" y="800" width="120" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="768.0" y="825" font-size="14" stroke="none" fill="#000" text-anchor="start">250</text>
  <text x="752.0" y="858" font-size="11" stroke="none" fill="#666" text-anchor="start">Lower numbers run first. Leave blank to use drag order.</text>
  <rect x="1128" y="1036" width="120" height="36" rx="6" fill="#000" stroke="#000" stroke-width="1.5" />
  <text x="1188.0" y="1059.0" font-size="14" stroke="none" fill="#fff" text-anchor="middle">Save rule</text>
  <rect x="1016" y="1036" width="96" height="36" rx="6" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="1064.0" y="1059.0" font-size="14" stroke="none" fill="#000" text-anchor="middle">Cancel</text>
</svg>