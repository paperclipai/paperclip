<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="800" />

  <!-- App header -->
  <g transform="translate(48,40)">
    <rect width="56" height="56" rx="8" fill="#e6e6e6" />
    <text x="68" y="22" font-size="20" stroke="none" fill="#000">Google Sheets</text>
    <text x="68" y="44" font-size="12" stroke="none" fill="#666">Connected · 12 actions available</text>
  </g>

  <!-- Tabs (Review has a badge now) -->
  <g transform="translate(48,120)">
    <line x1="0" y1="40" x2="1184" y2="40" />
    <g font-size="14" stroke="none" fill="#666">
      <text x="0" y="28">Setup</text>
      <text x="80" y="28">Review</text>
      <circle cx="124" cy="22" r="8" fill="#000" />
      <text x="124" y="26" font-size="10" stroke="none" fill="#fff" text-anchor="middle">1</text>
      <text x="168" y="28">Permissions</text>
      <text x="280" y="28">Activity</text>
      <text x="360" y="28">Advanced</text>
      <text x="448" y="28" fill="#000" font-weight="600">Test</text>
    </g>
    <line x1="444" y1="40" x2="496" y2="40" stroke-width="3" />
  </g>

  <!-- Compact test as -->
  <g transform="translate(48,184)">
    <rect width="280" height="40" rx="8" />
    <rect x="8" y="8" width="24" height="24" rx="12" fill="#e6e6e6" />
    <text x="40" y="25" font-size="14" stroke="none" fill="#000" font-weight="600">Testing as ClaudeCoder</text>
    <path d="M256 16 l8 8 l8 -8" stroke="#000" fill="none" />
  </g>

  <!-- Expanded Ask-first row -->
  <g transform="translate(48,256)">
    <rect width="1184" height="488" rx="8" stroke-width="2" />

    <g transform="translate(0,0)">
      <rect width="1184" height="64" rx="8" stroke="none" fill="#fff" />
      <path d="M16 24 l8 8 l8 -8" stroke="#000" fill="none" />
      <text x="48" y="28" font-size="14" stroke="none" fill="#000" font-weight="600">Append a row</text>
      <text x="48" y="48" font-size="12" stroke="none" fill="#666">Add a new row to the bottom of a sheet.</text>
      <g transform="translate(1040,20)">
        <rect width="128" height="24" rx="12" />
        <path d="M11 9 l6 6 M11 15 l6 -6" stroke="#000" />
        <text x="32" y="16" font-size="12" stroke="none" fill="#000">Ask first</text>
      </g>
    </g>
    <line x1="0" y1="64" x2="1184" y2="64" />

    <!-- Summary on the left -->
    <g transform="translate(48,88)">
      <text x="0" y="14" font-size="12" stroke="none" fill="#666" font-weight="600">SENT</text>
      <text x="0" y="40" font-size="12" stroke="none" fill="#666">Spreadsheet</text>
      <text x="600" y="40" font-size="12" stroke="none" fill="#000" text-anchor="end">Q3 Pipeline Tracker</text>
      <line x1="0" y1="48" x2="600" y2="48" stroke="#e6e6e6" />
      <text x="0" y="68" font-size="12" stroke="none" fill="#666">Sheet</text>
      <text x="600" y="68" font-size="12" stroke="none" fill="#000" text-anchor="end">Leads</text>
      <line x1="0" y1="76" x2="600" y2="76" stroke="#e6e6e6" />
      <text x="0" y="96" font-size="12" stroke="none" fill="#666">Values</text>
      <text x="600" y="96" font-size="12" stroke="none" fill="#000" text-anchor="end">["Wayne Industries","Demo","Dotta"]</text>

      <g transform="translate(0,144)">
        <rect width="120" height="32" rx="8" />
        <text x="60" y="20" font-size="12" stroke="none" fill="#000" text-anchor="middle">Edit and re-send</text>
      </g>
    </g>

    <!-- Right-side ask-first card -->
    <g transform="translate(688,88)">
      <rect width="448" height="368" rx="8" stroke-width="2" />
      <!-- hand icon stand-in (square placeholder) -->
      <rect x="16" y="20" width="32" height="32" rx="6" fill="#e6e6e6" />
      <text x="60" y="36" font-size="14" stroke="none" fill="#000" font-weight="600">Sent for your OK.</text>
      <text x="60" y="54" font-size="12" stroke="none" fill="#666">ClaudeCoder needs your approval before this runs.</text>

      <line x1="0" y1="76" x2="448" y2="76" />

      <g transform="translate(16,92)">
        <text x="0" y="14" font-size="12" stroke="none" fill="#666" font-weight="600">REQUEST</text>
        <text x="0" y="38" font-size="12" stroke="none" fill="#666">Action</text>
        <text x="416" y="38" font-size="12" stroke="none" fill="#000" text-anchor="end">Append a row</text>
        <line x1="0" y1="46" x2="416" y2="46" stroke="#e6e6e6" />
        <text x="0" y="64" font-size="12" stroke="none" fill="#666">Where</text>
        <text x="416" y="64" font-size="12" stroke="none" fill="#000" text-anchor="end">Q3 Pipeline Tracker · Leads</text>
        <line x1="0" y1="72" x2="416" y2="72" stroke="#e6e6e6" />
        <text x="0" y="90" font-size="12" stroke="none" fill="#666">Status</text>
        <text x="416" y="90" font-size="12" stroke="none" fill="#000" text-anchor="end">Waiting · just now</text>

        <g transform="translate(0,128)">
          <rect width="416" height="56" rx="8" fill="#e6e6e6" stroke="none" />
          <text x="16" y="24" font-size="12" stroke="none" fill="#000">Approve it in the</text>
          <text x="108" y="24" font-size="12" stroke="none" fill="#000" font-weight="600">Review tab</text>
          <text x="170" y="24" font-size="12" stroke="none" fill="#000">to finish the test.</text>
          <text x="16" y="44" font-size="12" stroke="none" fill="#666">You can also cancel the request.</text>
        </g>

        <g transform="translate(0,200)">
          <rect width="156" height="40" rx="8" fill="#000" />
          <text x="78" y="25" font-size="14" stroke="none" fill="#fff" font-weight="600" text-anchor="middle">Open Review tab</text>
        </g>
        <g transform="translate(168,200)">
          <rect width="156" height="40" rx="8" />
          <text x="78" y="25" font-size="14" stroke="none" fill="#000" text-anchor="middle">Cancel this request</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(48,760)">
    <text x="0" y="14" font-size="12" stroke="none" fill="#666">Waiting for your OK before this call leaves Paperclip.</text>
    <g transform="translate(1056,-8)">
      <rect width="128" height="40" rx="8" fill="#e6e6e6" />
      <text x="64" y="25" font-size="14" stroke="none" fill="#666" font-weight="600" text-anchor="middle">Run</text>
    </g>
  </g>

  <!-- Annotations -->
  <g stroke="#d33" stroke-dasharray="4 4" fill="#fff">
    <circle cx="124" cy="142" r="12" />
    <circle cx="688" cy="356" r="12" />
    <circle cx="688" cy="528" r="12" />
  </g>
  <g font-size="12" stroke="none" fill="#d33">
    <text x="124" y="146" text-anchor="middle">1</text>
    <text x="688" y="360" text-anchor="middle">2</text>
    <text x="688" y="532" text-anchor="middle">3</text>
  </g>
</svg>
