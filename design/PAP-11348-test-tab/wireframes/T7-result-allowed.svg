<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="800" />

  <!-- App header -->
  <g transform="translate(48,40)">
    <rect width="56" height="56" rx="8" fill="#e6e6e6" />
    <text x="68" y="22" font-size="20" stroke="none" fill="#000">Google Sheets</text>
    <text x="68" y="44" font-size="12" stroke="none" fill="#666">Connected · 12 actions available</text>
  </g>

  <!-- Tabs -->
  <g transform="translate(48,120)">
    <line x1="0" y1="40" x2="1184" y2="40" />
    <g font-size="14" stroke="none" fill="#666">
      <text x="0" y="28">Setup</text>
      <text x="80" y="28">Review</text>
      <text x="168" y="28">Permissions</text>
      <text x="280" y="28">Activity</text>
      <text x="360" y="28">Advanced</text>
      <text x="448" y="28" fill="#000" font-weight="600">Test</text>
    </g>
    <line x1="444" y1="40" x2="496" y2="40" stroke-width="3" />
  </g>

  <!-- Compact test as -->
  <g transform="translate(48,184)">
    <rect width="280" height="40" rx="8" />
    <rect x="8" y="8" width="24" height="24" rx="12" fill="#e6e6e6" />
    <text x="40" y="25" font-size="14" stroke="none" fill="#000" font-weight="600">Testing as ClaudeCoder</text>
    <path d="M256 16 l8 8 l8 -8" stroke="#000" fill="none" />
  </g>

  <!-- Expanded row -->
  <g transform="translate(48,256)">
    <rect width="1184" height="488" rx="8" stroke-width="2" />

    <g transform="translate(0,0)">
      <rect width="1184" height="64" rx="8" stroke="none" fill="#fff" />
      <path d="M16 24 l8 8 l8 -8" stroke="#000" fill="none" />
      <text x="48" y="28" font-size="14" stroke="none" fill="#000" font-weight="600">Read a sheet</text>
      <text x="48" y="48" font-size="12" stroke="none" fill="#666">Get rows and cell values from a sheet.</text>
      <g transform="translate(1056,20)">
        <rect width="112" height="24" rx="12" />
        <circle cx="14" cy="12" r="4" fill="#000" />
        <text x="28" y="16" font-size="12" stroke="none" fill="#000">Allowed</text>
      </g>
    </g>
    <line x1="0" y1="64" x2="1184" y2="64" />

    <!-- Compact form summary on the left -->
    <g transform="translate(48,88)">
      <text x="0" y="14" font-size="12" stroke="none" fill="#666" font-weight="600">SENT</text>
      <text x="0" y="40" font-size="12" stroke="none" fill="#666">Spreadsheet</text>
      <text x="600" y="40" font-size="12" stroke="none" fill="#000" text-anchor="end">Q3 Pipeline Tracker</text>
      <line x1="0" y1="48" x2="600" y2="48" stroke="#e6e6e6" />
      <text x="0" y="68" font-size="12" stroke="none" fill="#666">Sheet</text>
      <text x="600" y="68" font-size="12" stroke="none" fill="#000" text-anchor="end">Leads</text>
      <line x1="0" y1="76" x2="600" y2="76" stroke="#e6e6e6" />
      <text x="0" y="96" font-size="12" stroke="none" fill="#666">Range</text>
      <text x="600" y="96" font-size="12" stroke="none" fill="#000" text-anchor="end">A1:F50</text>
      <line x1="0" y1="104" x2="600" y2="104" stroke="#e6e6e6" />
      <text x="0" y="124" font-size="12" stroke="none" fill="#666">More options</text>
      <text x="600" y="124" font-size="12" stroke="none" fill="#666" text-anchor="end">2 changed</text>

      <g transform="translate(0,160)">
        <rect width="120" height="32" rx="8" />
        <text x="60" y="20" font-size="12" stroke="none" fill="#000" text-anchor="middle">Edit and re-run</text>
      </g>
    </g>

    <!-- Result panel -->
    <g transform="translate(688,88)">
      <rect width="448" height="368" rx="8" />
      <!-- check icon -->
      <circle cx="32" cy="32" r="12" fill="#000" />
      <path d="M26 32 l4 4 l8 -8" stroke="#fff" fill="none" stroke-width="2" />
      <text x="56" y="36" font-size="14" stroke="none" fill="#000" font-weight="600">Worked. 28 rows came back.</text>
      <text x="56" y="56" font-size="12" stroke="none" fill="#666">Ran as ClaudeCoder · 1.2s · Just now</text>

      <line x1="0" y1="76" x2="448" y2="76" />

      <!-- Pretty data -->
      <g transform="translate(16,92)">
        <text x="0" y="14" font-size="12" stroke="none" fill="#666" font-weight="600">PREVIEW</text>
        <rect x="0" y="24" width="416" height="180" rx="6" fill="#e6e6e6" stroke="none" />
        <g font-size="12" stroke="none" fill="#000">
          <text x="12" y="44">Name           Stage      Owner       Updated</text>
          <text x="12" y="64">Acme Co.       Demo       Dotta       Tue</text>
          <text x="12" y="84">Globex         Trial      Dotta       Mon</text>
          <text x="12" y="104">Initech        Closed     CodexCo.    Sun</text>
          <text x="12" y="124">Soylent        Discovery  QA          Fri</text>
          <text x="12" y="144">Umbrella       Trial      Dotta       Thu</text>
          <text x="12" y="164">… 23 more rows</text>
        </g>

        <!-- Raw disclosure -->
        <g transform="translate(0,216)">
          <path d="M0 8 l8 -8 l8 8" stroke="#000" fill="none" transform="rotate(180 8 4)" />
          <text x="24" y="14" font-size="12" stroke="none" fill="#000">Show raw response</text>
        </g>

        <!-- Footer actions -->
        <g transform="translate(0,248)">
          <text x="0" y="14" font-size="12" stroke="none" fill="#666">This call is in the</text>
          <text x="100" y="14" font-size="12" stroke="none" fill="#000" font-weight="600">Activity tab</text>
          <text x="170" y="14" font-size="12" stroke="none" fill="#666">.</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Footer Run -->
  <g transform="translate(48,760)">
    <text x="0" y="14" font-size="12" stroke="none" fill="#666">Last run finished in 1.2s.</text>
    <g transform="translate(1056,-8)">
      <rect width="128" height="40" rx="8" fill="#000" />
      <text x="64" y="25" font-size="14" stroke="none" fill="#fff" font-weight="600" text-anchor="middle">Run again</text>
    </g>
  </g>

  <!-- Annotations -->
  <g stroke="#d33" stroke-dasharray="4 4" fill="#fff">
    <circle cx="688" cy="356" r="12" />
    <circle cx="688" cy="464" r="12" />
    <circle cx="688" cy="568" r="12" />
    <circle cx="688" cy="620" r="12" />
  </g>
  <g font-size="12" stroke="none" fill="#d33">
    <text x="688" y="360" text-anchor="middle">1</text>
    <text x="688" y="468" text-anchor="middle">2</text>
    <text x="688" y="572" text-anchor="middle">3</text>
    <text x="688" y="624" text-anchor="middle">4</text>
  </g>
</svg>
