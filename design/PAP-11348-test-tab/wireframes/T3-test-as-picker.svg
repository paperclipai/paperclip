<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="800" />

  <!-- App header -->
  <g transform="translate(48,40)">
    <rect width="56" height="56" rx="8" fill="#e6e6e6" />
    <text x="68" y="22" font-size="20" stroke="none" fill="#000">Google Sheets</text>
    <text x="68" y="44" font-size="12" stroke="none" fill="#666">Connected · 12 actions available</text>
  </g>

  <!-- Tabs -->
  <g transform="translate(48,120)">
    <line x1="0" y1="40" x2="1184" y2="40" />
    <g font-size="14" stroke="none" fill="#666">
      <text x="0" y="28">Setup</text>
      <text x="80" y="28">Review</text>
      <text x="168" y="28">Permissions</text>
      <text x="280" y="28">Activity</text>
      <text x="360" y="28">Advanced</text>
      <text x="448" y="28" fill="#000" font-weight="600">Test</text>
    </g>
    <line x1="444" y1="40" x2="496" y2="40" stroke-width="3" />
  </g>

  <!-- Test as control (focused state) -->
  <g transform="translate(48,184)">
    <text x="0" y="14" font-size="12" stroke="none" fill="#666">TEST AS</text>
    <rect x="0" y="24" width="280" height="48" rx="8" stroke-width="2" />
    <rect x="12" y="36" width="24" height="24" rx="12" fill="#e6e6e6" />
    <text x="48" y="46" font-size="14" stroke="none" fill="#000" font-weight="600">ClaudeCoder</text>
    <text x="48" y="62" font-size="12" stroke="none" fill="#666">Allowed for 9 · Ask first for 2 · Off for 1</text>
    <path d="M256 52 l8 -8 l8 8" stroke="#000" fill="none" />
    <text x="304" y="54" font-size="12" stroke="none" fill="#666">Runs real actions in Google Sheets, exactly as this agent would.</text>
  </g>

  <!-- Dropdown panel -->
  <g transform="translate(48,288)">
    <rect width="448" height="408" rx="8" />

    <!-- Search row -->
    <g transform="translate(16,16)">
      <rect width="416" height="32" rx="6" fill="#e6e6e6" stroke="none" />
      <text x="12" y="20" font-size="12" stroke="none" fill="#666">Search agents…</text>
    </g>

    <line x1="0" y1="64" x2="448" y2="64" />

    <!-- Row 1: selected -->
    <g transform="translate(0,72)">
      <rect width="448" height="56" stroke="none" fill="#e6e6e6" />
      <rect x="16" y="12" width="32" height="32" rx="16" fill="#fff" />
      <text x="60" y="28" font-size="14" stroke="none" fill="#000" font-weight="600">ClaudeCoder</text>
      <text x="60" y="46" font-size="12" stroke="none" fill="#666">Allowed 9 · Ask first 2 · Off 1</text>
      <path d="M408 28 l8 8 l16 -16" stroke="#000" fill="none" stroke-width="2" />
    </g>

    <!-- Row 2 -->
    <g transform="translate(0,128)">
      <rect width="448" height="56" stroke="none" fill="#fff" />
      <rect x="16" y="12" width="32" height="32" rx="16" fill="#e6e6e6" />
      <text x="60" y="28" font-size="14" stroke="none" fill="#000" font-weight="600">CodexCoder</text>
      <text x="60" y="46" font-size="12" stroke="none" fill="#666">Allowed 7 · Ask first 4 · Off 1</text>
    </g>
    <line x1="16" y1="184" x2="432" y2="184" stroke="#e6e6e6" />

    <!-- Row 3 -->
    <g transform="translate(0,184)">
      <rect width="448" height="56" stroke="none" fill="#fff" />
      <rect x="16" y="12" width="32" height="32" rx="16" fill="#e6e6e6" />
      <text x="60" y="28" font-size="14" stroke="none" fill="#000" font-weight="600">QA</text>
      <text x="60" y="46" font-size="12" stroke="none" fill="#666">Allowed 5 · Ask first 2 · Off 5</text>
    </g>
    <line x1="16" y1="240" x2="432" y2="240" stroke="#e6e6e6" />

    <!-- Row 4 -->
    <g transform="translate(0,240)">
      <rect width="448" height="56" stroke="none" fill="#fff" />
      <rect x="16" y="12" width="32" height="32" rx="16" fill="#e6e6e6" />
      <text x="60" y="28" font-size="14" stroke="none" fill="#000" font-weight="600">UXDesigner</text>
      <text x="60" y="46" font-size="12" stroke="none" fill="#666">No access — not allowed for any action</text>
    </g>
    <line x1="16" y1="296" x2="432" y2="296" stroke="#e6e6e6" />

    <!-- Row 5: disabled (no task-assign rights) -->
    <g transform="translate(0,296)" fill="#666">
      <rect width="448" height="56" stroke="none" fill="#fff" />
      <rect x="16" y="12" width="32" height="32" rx="16" fill="#e6e6e6" />
      <text x="60" y="28" font-size="14" stroke="none" fill="#666" font-weight="600">SecurityEngineer</text>
      <text x="60" y="46" font-size="12" stroke="none" fill="#666">You can't assign tasks to this agent</text>
    </g>

    <line x1="0" y1="352" x2="448" y2="352" />
    <text x="16" y="376" font-size="12" stroke="none" fill="#666">Only agents you can assign tasks to are listed.</text>
    <text x="16" y="394" font-size="12" stroke="none" fill="#666">Pick one to preview what they'd see in Google Sheets.</text>
  </g>

  <!-- Right-side context: what each badge means -->
  <g transform="translate(528,288)">
    <rect width="384" height="232" rx="8" stroke-dasharray="4 4" stroke="#666" />
    <text x="16" y="28" font-size="14" stroke="none" fill="#666" font-weight="600">What the badges mean</text>

    <g transform="translate(16,48)">
      <rect width="112" height="24" rx="12" />
      <circle cx="14" cy="12" r="4" fill="#000" />
      <text x="28" y="16" font-size="12" stroke="none" fill="#000">Allowed</text>
    </g>
    <text x="144" y="64" font-size="12" stroke="none" fill="#666">Runs immediately when you press Run.</text>

    <g transform="translate(16,88)">
      <rect width="112" height="24" rx="12" />
      <path d="M11 9 l6 6 M11 15 l6 -6" stroke="#000" />
      <text x="32" y="16" font-size="12" stroke="none" fill="#000">Ask first</text>
    </g>
    <text x="144" y="104" font-size="12" stroke="none" fill="#666">Run is parked in Review for your OK.</text>

    <g transform="translate(16,128)">
      <rect width="112" height="24" rx="12" fill="#e6e6e6" />
      <line x1="14" y1="12" x2="22" y2="12" stroke="#000" />
      <text x="36" y="16" font-size="12" stroke="none" fill="#000">Off</text>
    </g>
    <text x="144" y="144" font-size="12" stroke="none" fill="#666">Won't run. Change it in Permissions.</text>

    <text x="16" y="192" font-size="12" stroke="none" fill="#666">Badges reflect this agent's current settings, not yours.</text>
    <text x="16" y="208" font-size="12" stroke="none" fill="#666">Swap agents to see how an action would behave for each.</text>
  </g>

  <!-- annotations -->
  <g stroke="#d33" stroke-dasharray="4 4" fill="#fff">
    <circle cx="64" cy="288" r="12" />
    <circle cx="64" cy="368" r="12" />
    <circle cx="64" cy="592" r="12" />
    <circle cx="64" cy="664" r="12" />
    <circle cx="544" cy="304" r="12" />
  </g>
  <g font-size="12" stroke="none" fill="#d33">
    <text x="64" y="292" text-anchor="middle">1</text>
    <text x="64" y="372" text-anchor="middle">2</text>
    <text x="64" y="596" text-anchor="middle">3</text>
    <text x="64" y="668" text-anchor="middle">4</text>
    <text x="544" y="308" text-anchor="middle">5</text>
  </g>
</svg>
