<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="800" />

  <!-- App header -->
  <g transform="translate(48,40)">
    <rect width="56" height="56" rx="8" fill="#e6e6e6" />
    <text x="68" y="22" font-size="20" stroke="none" fill="#000">Google Sheets</text>
    <text x="68" y="44" font-size="12" stroke="none" fill="#666">Connected · 12 actions available</text>
  </g>

  <!-- Tabs -->
  <g transform="translate(48,120)">
    <line x1="0" y1="40" x2="1184" y2="40" />
    <g font-size="14" stroke="none" fill="#666">
      <text x="0" y="28">Setup</text>
      <text x="80" y="28">Review</text>
      <text x="168" y="28">Permissions</text>
      <text x="280" y="28">Activity</text>
      <text x="360" y="28">Advanced</text>
      <text x="448" y="28" fill="#000" font-weight="600">Test</text>
    </g>
    <line x1="444" y1="40" x2="496" y2="40" stroke-width="3" />
  </g>

  <!-- Compact test as -->
  <g transform="translate(48,184)">
    <rect width="280" height="40" rx="8" />
    <rect x="8" y="8" width="24" height="24" rx="12" fill="#e6e6e6" />
    <text x="40" y="25" font-size="14" stroke="none" fill="#000" font-weight="600">Testing as ClaudeCoder</text>
    <path d="M256 16 l8 8 l8 -8" stroke="#000" fill="none" />
  </g>

  <!-- Expanded row -->
  <g transform="translate(48,256)">
    <rect width="1184" height="488" rx="8" stroke-width="2" />

    <g transform="translate(0,0)">
      <rect width="1184" height="64" rx="8" stroke="none" fill="#fff" />
      <path d="M16 24 l8 8 l8 -8" stroke="#000" fill="none" />
      <text x="48" y="28" font-size="14" stroke="none" fill="#000" font-weight="600">Read a sheet</text>
      <text x="48" y="48" font-size="12" stroke="none" fill="#666">Get rows and cell values from a sheet.</text>
      <g transform="translate(1056,20)">
        <rect width="112" height="24" rx="12" />
        <circle cx="14" cy="12" r="4" fill="#000" />
        <text x="28" y="16" font-size="12" stroke="none" fill="#000">Allowed</text>
      </g>
    </g>
    <line x1="0" y1="64" x2="1184" y2="64" />

    <!-- Form left side (still visible) -->
    <g transform="translate(48,88)">
      <text x="0" y="14" font-size="12" stroke="none" fill="#666">SPREADSHEET *</text>
      <rect x="0" y="24" width="560" height="40" rx="8" stroke-width="2" />
      <text x="12" y="49" font-size="14" stroke="none" fill="#000">1AbCxyz123…NotFound</text>
      <text x="0" y="82" font-size="12" stroke="none" fill="#000">Google Sheets couldn't find that spreadsheet.</text>

      <text x="0" y="120" font-size="12" stroke="none" fill="#666">SHEET *</text>
      <rect x="0" y="130" width="560" height="40" rx="8" />
      <text x="12" y="155" font-size="14" stroke="none" fill="#666">Pick a sheet…</text>

      <text x="0" y="200" font-size="12" stroke="none" fill="#666">RANGE</text>
      <rect x="0" y="210" width="560" height="40" rx="8" />
      <text x="12" y="235" font-size="14" stroke="none" fill="#666">e.g. A1:D20</text>
    </g>

    <!-- Result panel: error -->
    <g transform="translate(688,88)">
      <rect width="448" height="368" rx="8" stroke-width="2" />
      <!-- exclam icon -->
      <circle cx="32" cy="32" r="12" />
      <line x1="32" y1="26" x2="32" y2="34" />
      <circle cx="32" cy="40" r="1.5" fill="#000" />
      <text x="56" y="32" font-size="14" stroke="none" fill="#000" font-weight="600">It didn't work.</text>
      <text x="56" y="50" font-size="12" stroke="none" fill="#666">Tried as ClaudeCoder · 0.4s · Just now</text>

      <line x1="0" y1="76" x2="448" y2="76" />

      <g transform="translate(16,92)">
        <text x="0" y="14" font-size="12" stroke="none" fill="#666" font-weight="600">WHAT GOOGLE SHEETS SAID</text>
        <rect x="0" y="24" width="416" height="80" rx="6" fill="#e6e6e6" stroke="none" />
        <text x="12" y="46" font-size="12" stroke="none" fill="#000">Requested entity was not found.</text>
        <text x="12" y="64" font-size="12" stroke="none" fill="#666">code: NOT_FOUND</text>
        <text x="12" y="82" font-size="12" stroke="none" fill="#666">resource: spreadsheets/1AbCxyz123…NotFound</text>

        <text x="0" y="132" font-size="12" stroke="none" fill="#666" font-weight="600">WHAT TO TRY</text>
        <text x="0" y="152" font-size="12" stroke="none" fill="#000">• Pick the spreadsheet from the dropdown instead of pasting an ID.</text>
        <text x="0" y="170" font-size="12" stroke="none" fill="#000">• Make sure ClaudeCoder has access to it in your Google Workspace.</text>

        <g transform="translate(0,200)">
          <path d="M0 8 l8 -8 l8 8" stroke="#000" fill="none" transform="rotate(180 8 4)" />
          <text x="24" y="14" font-size="12" stroke="none" fill="#000">Show raw response</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(48,760)">
    <text x="0" y="14" font-size="12" stroke="none" fill="#666">Adjust the input above and try again.</text>
    <g transform="translate(1056,-8)">
      <rect width="128" height="40" rx="8" fill="#000" />
      <text x="64" y="25" font-size="14" stroke="none" fill="#fff" font-weight="600" text-anchor="middle">Run again</text>
    </g>
  </g>

  <!-- Annotations -->
  <g stroke="#d33" stroke-dasharray="4 4" fill="#fff">
    <circle cx="64" cy="368" r="12" />
    <circle cx="688" cy="356" r="12" />
    <circle cx="688" cy="524" r="12" />
  </g>
  <g font-size="12" stroke="none" fill="#d33">
    <text x="64" y="372" text-anchor="middle">1</text>
    <text x="688" y="360" text-anchor="middle">2</text>
    <text x="688" y="528" text-anchor="middle">3</text>
  </g>
</svg>
