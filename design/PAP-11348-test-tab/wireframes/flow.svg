<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="720" />

  <text x="48" y="40" font-size="20" stroke="none" fill="#000">User journey · Test tab</text>
  <text x="48" y="60" font-size="12" stroke="none" fill="#666">Three branches diverge at the access badge (Allowed / Ask first / Off).</text>

  <!-- Row 1: discover -->
  <g transform="translate(48,96)">
    <rect width="160" height="100" rx="8" />
    <text x="80" y="22" font-size="12" stroke="none" fill="#666" text-anchor="middle">T1</text>
    <text x="80" y="46" font-size="14" stroke="none" fill="#000" font-weight="600" text-anchor="middle">Empty state</text>
    <text x="80" y="68" font-size="12" stroke="none" fill="#666" text-anchor="middle">No actions loaded</text>
    <text x="80" y="84" font-size="12" stroke="none" fill="#666" text-anchor="middle">→ Setup CTA</text>
  </g>
  <line x1="208" y1="146" x2="248" y2="146" />
  <path d="M242 140 l8 6 l-8 6" stroke="#000" fill="none" />

  <g transform="translate(248,96)">
    <rect width="200" height="100" rx="8" />
    <text x="100" y="22" font-size="12" stroke="none" fill="#666" text-anchor="middle">T2</text>
    <text x="100" y="46" font-size="14" stroke="none" fill="#000" font-weight="600" text-anchor="middle">Default — collapsed list</text>
    <text x="100" y="68" font-size="12" stroke="none" fill="#666" text-anchor="middle">Test-as picker + badges</text>
    <text x="100" y="84" font-size="12" stroke="none" fill="#666" text-anchor="middle">Read/Write groups</text>
  </g>
  <line x1="448" y1="146" x2="488" y2="146" />
  <path d="M482 140 l8 6 l-8 6" stroke="#000" fill="none" />

  <g transform="translate(488,96)">
    <rect width="184" height="100" rx="8" stroke-dasharray="4 4" />
    <text x="92" y="22" font-size="12" stroke="none" fill="#666" text-anchor="middle">T3 / T11</text>
    <text x="92" y="46" font-size="14" stroke="none" fill="#000" font-weight="600" text-anchor="middle">Pick agent / filter</text>
    <text x="92" y="68" font-size="12" stroke="none" fill="#666" text-anchor="middle">Switch Test as,</text>
    <text x="92" y="84" font-size="12" stroke="none" fill="#666" text-anchor="middle">search or Read/Write</text>
  </g>
  <line x1="672" y1="146" x2="712" y2="146" />
  <path d="M706 140 l8 6 l-8 6" stroke="#000" fill="none" />

  <g transform="translate(712,96)">
    <rect width="216" height="100" rx="8" />
    <text x="108" y="22" font-size="12" stroke="none" fill="#666" text-anchor="middle">T4 / T5</text>
    <text x="108" y="46" font-size="14" stroke="none" fill="#000" font-weight="600" text-anchor="middle">Expand row · fill form</text>
    <text x="108" y="68" font-size="12" stroke="none" fill="#666" text-anchor="middle">Schema fields,</text>
    <text x="108" y="84" font-size="12" stroke="none" fill="#666" text-anchor="middle">More options</text>
  </g>
  <line x1="928" y1="146" x2="968" y2="146" />
  <path d="M962 140 l8 6 l-8 6" stroke="#000" fill="none" />

  <g transform="translate(968,96)">
    <rect width="184" height="100" rx="8" />
    <text x="92" y="22" font-size="12" stroke="none" fill="#666" text-anchor="middle">T6</text>
    <text x="92" y="46" font-size="14" stroke="none" fill="#000" font-weight="600" text-anchor="middle">Run</text>
    <text x="92" y="68" font-size="12" stroke="none" fill="#666" text-anchor="middle">Spinner ·</text>
    <text x="92" y="84" font-size="12" stroke="none" fill="#666" text-anchor="middle">"Running…"</text>
  </g>

  <!-- 3-way branch under Run -->
  <line x1="1060" y1="196" x2="1060" y2="240" />
  <line x1="320" y1="240" x2="1060" y2="240" />
  <line x1="320" y1="240" x2="320" y2="296" />
  <line x1="688" y1="240" x2="688" y2="296" />
  <line x1="1060" y1="240" x2="1060" y2="296" />
  <path d="M314 290 l6 8 l6 -8" stroke="#000" fill="none" />
  <path d="M682 290 l6 8 l6 -8" stroke="#000" fill="none" />
  <path d="M1054 290 l6 8 l6 -8" stroke="#000" fill="none" />

  <!-- Allowed branch -->
  <g transform="translate(224,304)">
    <text x="96" y="14" font-size="12" stroke="none" fill="#000" text-anchor="middle">Badge: Allowed</text>
    <rect width="192" height="120" rx="8" y="24" />
    <text x="96" y="56" font-size="12" stroke="none" fill="#666" text-anchor="middle">T7</text>
    <text x="96" y="80" font-size="14" stroke="none" fill="#000" font-weight="600" text-anchor="middle">Result panel</text>
    <text x="96" y="102" font-size="12" stroke="none" fill="#666" text-anchor="middle">Worked. 28 rows · 1.2s</text>
    <text x="96" y="118" font-size="12" stroke="none" fill="#666" text-anchor="middle">Pretty + raw + Activity</text>
  </g>
  <line x1="320" y1="424" x2="320" y2="460" />
  <path d="M314 454 l6 8 l6 -8" stroke="#000" fill="none" />
  <g transform="translate(232,468)">
    <rect width="176" height="56" rx="8" stroke-dasharray="4 4" />
    <text x="88" y="22" font-size="12" stroke="none" fill="#666" text-anchor="middle">T8 (error fallback)</text>
    <text x="88" y="44" font-size="12" stroke="none" fill="#000" text-anchor="middle">"It didn't work." + raw</text>
  </g>

  <!-- Ask first branch -->
  <g transform="translate(592,304)">
    <text x="96" y="14" font-size="12" stroke="none" fill="#000" text-anchor="middle">Badge: Ask first</text>
    <rect width="192" height="120" rx="8" y="24" />
    <text x="96" y="56" font-size="12" stroke="none" fill="#666" text-anchor="middle">T9</text>
    <text x="96" y="80" font-size="14" stroke="none" fill="#000" font-weight="600" text-anchor="middle">"Sent for your OK."</text>
    <text x="96" y="102" font-size="12" stroke="none" fill="#666" text-anchor="middle">Real request in Review</text>
    <text x="96" y="118" font-size="12" stroke="none" fill="#666" text-anchor="middle">→ approve to finish</text>
  </g>
  <line x1="688" y1="424" x2="688" y2="460" />
  <path d="M682 454 l6 8 l6 -8" stroke="#000" fill="none" />
  <g transform="translate(600,468)">
    <rect width="176" height="56" rx="8" stroke-dasharray="4 4" />
    <text x="88" y="22" font-size="12" stroke="none" fill="#666" text-anchor="middle">Review tab</text>
    <text x="88" y="44" font-size="12" stroke="none" fill="#000" text-anchor="middle">Approve → call runs · result back here</text>
  </g>

  <!-- Off branch -->
  <g transform="translate(964,304)">
    <text x="96" y="14" font-size="12" stroke="none" fill="#000" text-anchor="middle">Badge: Off</text>
    <rect width="192" height="120" rx="8" y="24" />
    <text x="96" y="56" font-size="12" stroke="none" fill="#666" text-anchor="middle">T10</text>
    <text x="96" y="80" font-size="14" stroke="none" fill="#000" font-weight="600" text-anchor="middle">Blocked banner</text>
    <text x="96" y="102" font-size="12" stroke="none" fill="#666" text-anchor="middle">"… is off for this agent."</text>
    <text x="96" y="118" font-size="12" stroke="none" fill="#666" text-anchor="middle">→ Permissions</text>
  </g>
  <line x1="1060" y1="424" x2="1060" y2="460" />
  <path d="M1054 454 l6 8 l6 -8" stroke="#000" fill="none" />
  <g transform="translate(972,468)">
    <rect width="176" height="56" rx="8" stroke-dasharray="4 4" />
    <text x="88" y="22" font-size="12" stroke="none" fill="#666" text-anchor="middle">Permissions tab</text>
    <text x="88" y="44" font-size="12" stroke="none" fill="#000" text-anchor="middle">Change setting · come back · Run</text>
  </g>

  <!-- Mobile callout -->
  <g transform="translate(48,576)">
    <rect width="1184" height="96" rx="8" stroke-dasharray="4 4" stroke="#666" />
    <text x="24" y="32" font-size="14" stroke="none" fill="#666" font-weight="600">Mobile (T12)</text>
    <text x="24" y="56" font-size="12" stroke="none" fill="#666">390×844 viewport · Test-as becomes a full-width sheet · accordion rows full-width · result panel stacks under the form ·</text>
    <text x="24" y="74" font-size="12" stroke="none" fill="#666">"Find an action" stays sticky at the top of the catalog scroll · Run is a full-width button at the bottom of the open row.</text>
  </g>
</svg>
