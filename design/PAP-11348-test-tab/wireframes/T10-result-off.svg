<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="800" />

  <!-- App header -->
  <g transform="translate(48,40)">
    <rect width="56" height="56" rx="8" fill="#e6e6e6" />
    <text x="68" y="22" font-size="20" stroke="none" fill="#000">Google Sheets</text>
    <text x="68" y="44" font-size="12" stroke="none" fill="#666">Connected · 12 actions available</text>
  </g>

  <!-- Tabs -->
  <g transform="translate(48,120)">
    <line x1="0" y1="40" x2="1184" y2="40" />
    <g font-size="14" stroke="none" fill="#666">
      <text x="0" y="28">Setup</text>
      <text x="80" y="28">Review</text>
      <text x="168" y="28">Permissions</text>
      <text x="280" y="28">Activity</text>
      <text x="360" y="28">Advanced</text>
      <text x="448" y="28" fill="#000" font-weight="600">Test</text>
    </g>
    <line x1="444" y1="40" x2="496" y2="40" stroke-width="3" />
  </g>

  <!-- Compact test as -->
  <g transform="translate(48,184)">
    <rect width="280" height="40" rx="8" />
    <rect x="8" y="8" width="24" height="24" rx="12" fill="#e6e6e6" />
    <text x="40" y="25" font-size="14" stroke="none" fill="#000" font-weight="600">Testing as ClaudeCoder</text>
    <path d="M256 16 l8 8 l8 -8" stroke="#000" fill="none" />
  </g>

  <!-- Expanded Off row -->
  <g transform="translate(48,256)">
    <rect width="1184" height="488" rx="8" stroke-width="2" />

    <g transform="translate(0,0)">
      <rect width="1184" height="64" rx="8" stroke="none" fill="#fff" />
      <path d="M16 24 l8 8 l8 -8" stroke="#000" fill="none" />
      <text x="48" y="28" font-size="14" stroke="none" fill="#000" font-weight="600">Delete a row</text>
      <text x="48" y="48" font-size="12" stroke="none" fill="#666">Remove a row from a sheet permanently.</text>
      <g transform="translate(1056,20)">
        <rect width="112" height="24" rx="12" fill="#e6e6e6" />
        <line x1="14" y1="12" x2="22" y2="12" stroke="#000" />
        <text x="36" y="16" font-size="12" stroke="none" fill="#000">Off</text>
      </g>
    </g>
    <line x1="0" y1="64" x2="1184" y2="64" />

    <!-- Big Off banner taking the place of the form -->
    <g transform="translate(48,104)">
      <rect width="1088" height="160" rx="8" fill="#e6e6e6" stroke="none" />
      <text x="32" y="48" font-size="20" stroke="none" fill="#000">Delete a row is off for ClaudeCoder.</text>
      <text x="32" y="76" font-size="14" stroke="none" fill="#000">It won't run here, and it won't run from a task either.</text>

      <line x1="32" y1="96" x2="1056" y2="96" stroke="#fff" stroke-width="2" />

      <text x="32" y="120" font-size="12" stroke="none" fill="#000">Want to test it?</text>
      <text x="32" y="138" font-size="12" stroke="none" fill="#000">Turn it on for ClaudeCoder in</text>
      <text x="208" y="138" font-size="12" stroke="none" fill="#000" font-weight="600">Permissions</text>
      <text x="276" y="138" font-size="12" stroke="none" fill="#000">— set it to Allowed or Ask first.</text>

      <g transform="translate(848,108)">
        <rect width="208" height="40" rx="8" fill="#000" />
        <text x="104" y="25" font-size="14" stroke="none" fill="#fff" font-weight="600" text-anchor="middle">Open Permissions →</text>
      </g>
    </g>

    <!-- Form preview (greyed) -->
    <g transform="translate(48,296)" stroke="#666">
      <text x="0" y="14" font-size="12" stroke="none" fill="#666">SPREADSHEET *</text>
      <rect x="0" y="24" width="560" height="40" rx="8" fill="#e6e6e6" />
      <text x="12" y="49" font-size="14" stroke="none" fill="#666">Pick a spreadsheet… (disabled)</text>

      <text x="0" y="98" font-size="12" stroke="none" fill="#666">ROW NUMBER *</text>
      <rect x="0" y="108" width="560" height="40" rx="8" fill="#e6e6e6" />
      <text x="12" y="133" font-size="14" stroke="none" fill="#666">e.g. 12 (disabled)</text>
    </g>

    <g transform="translate(688,296)">
      <text x="0" y="14" font-size="12" stroke="none" fill="#666" font-weight="600">WHY THIS IS OFF</text>
      <text x="0" y="36" font-size="12" stroke="none" fill="#000">An admin set it to</text>
      <text x="112" y="36" font-size="12" stroke="none" fill="#000" font-weight="600">Off</text>
      <text x="132" y="36" font-size="12" stroke="none" fill="#000">for all agents using this app.</text>
      <text x="0" y="56" font-size="12" stroke="none" fill="#666">Last changed by Dotta · 2 days ago</text>

      <text x="0" y="90" font-size="12" stroke="none" fill="#000">Other agents using this app:</text>
      <text x="0" y="110" font-size="12" stroke="none" fill="#666">CodexCoder: Off · QA: Off · UXDesigner: Off</text>

      <g transform="translate(0,140)">
        <rect width="208" height="32" rx="8" />
        <text x="104" y="20" font-size="12" stroke="none" fill="#000" text-anchor="middle">Try as a different agent</text>
      </g>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(48,760)">
    <text x="0" y="14" font-size="12" stroke="none" fill="#666">No call will be made — this action is off for ClaudeCoder.</text>
    <g transform="translate(1056,-8)">
      <rect width="128" height="40" rx="8" fill="#e6e6e6" />
      <text x="64" y="25" font-size="14" stroke="none" fill="#666" font-weight="600" text-anchor="middle">Run</text>
    </g>
  </g>

  <!-- Annotations -->
  <g stroke="#d33" stroke-dasharray="4 4" fill="#fff">
    <circle cx="64" cy="288" r="12" />
    <circle cx="64" cy="360" r="12" />
    <circle cx="688" cy="568" r="12" />
  </g>
  <g font-size="12" stroke="none" fill="#d33">
    <text x="64" y="292" text-anchor="middle">1</text>
    <text x="64" y="364" text-anchor="middle">2</text>
    <text x="688" y="572" text-anchor="middle">3</text>
  </g>
</svg>
