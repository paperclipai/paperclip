<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="800" />

  <!-- App header -->
  <g transform="translate(48,40)">
    <rect width="56" height="56" rx="8" fill="#e6e6e6" />
    <text x="68" y="22" font-size="20" stroke="none" fill="#000">Google Sheets</text>
    <text x="68" y="44" font-size="12" stroke="none" fill="#666">Connected · 12 actions available</text>
  </g>

  <!-- Tabs -->
  <g transform="translate(48,120)">
    <line x1="0" y1="40" x2="1184" y2="40" />
    <g font-size="14" stroke="none" fill="#666">
      <text x="0" y="28">Setup</text>
      <text x="80" y="28">Review</text>
      <text x="168" y="28">Permissions</text>
      <text x="280" y="28">Activity</text>
      <text x="360" y="28">Advanced</text>
      <text x="448" y="28" fill="#000" font-weight="600">Test</text>
    </g>
    <line x1="444" y1="40" x2="496" y2="40" stroke-width="3" />
  </g>

  <!-- Compact test as -->
  <g transform="translate(48,184)">
    <rect width="280" height="40" rx="8" />
    <rect x="8" y="8" width="24" height="24" rx="12" fill="#e6e6e6" />
    <text x="40" y="25" font-size="14" stroke="none" fill="#000" font-weight="600">Testing as ClaudeCoder</text>
    <path d="M256 16 l8 8 l8 -8" stroke="#000" fill="none" />
  </g>

  <!-- Expanded row -->
  <g transform="translate(48,256)">
    <rect width="1184" height="488" rx="8" stroke-width="2" />

    <g transform="translate(0,0)">
      <rect width="1184" height="64" rx="8" stroke="none" fill="#fff" />
      <path d="M16 24 l8 8 l8 -8" stroke="#000" fill="none" />
      <text x="48" y="28" font-size="14" stroke="none" fill="#000" font-weight="600">Read a sheet</text>
      <text x="48" y="48" font-size="12" stroke="none" fill="#666">Get rows and cell values from a sheet.</text>
      <g transform="translate(1056,20)">
        <rect width="112" height="24" rx="12" />
        <circle cx="14" cy="12" r="4" fill="#000" />
        <text x="28" y="16" font-size="12" stroke="none" fill="#000">Allowed</text>
      </g>
    </g>
    <line x1="0" y1="64" x2="1184" y2="64" />

    <!-- Left column with form including More options open -->
    <g transform="translate(48,88)">
      <text x="0" y="14" font-size="12" stroke="none" fill="#666">SPREADSHEET *</text>
      <rect x="0" y="24" width="560" height="40" rx="8" />
      <text x="12" y="49" font-size="14" stroke="none" fill="#000">Q3 Pipeline Tracker</text>
      <path d="M536 44 l8 8 l8 -8" stroke="#000" fill="none" />

      <text x="0" y="98" font-size="12" stroke="none" fill="#666">SHEET *</text>
      <rect x="0" y="108" width="560" height="40" rx="8" />
      <text x="12" y="133" font-size="14" stroke="none" fill="#000">Leads</text>
      <path d="M536 128 l8 8 l8 -8" stroke="#000" fill="none" />

      <text x="0" y="182" font-size="12" stroke="none" fill="#666">RANGE</text>
      <rect x="0" y="192" width="560" height="40" rx="8" />
      <text x="12" y="217" font-size="14" stroke="none" fill="#000">A1:F50</text>

      <!-- More options OPEN -->
      <g transform="translate(0,256)">
        <path d="M0 0 l8 8 l8 -8" stroke="#000" fill="none" />
        <text x="24" y="6" font-size="14" stroke="none" fill="#000" font-weight="600">More options</text>

        <text x="0" y="40" font-size="12" stroke="none" fill="#666">RENDER VALUES AS</text>
        <rect x="0" y="50" width="272" height="40" rx="8" />
        <line x1="136" y1="50" x2="136" y2="90" />
        <rect x="0" y="50" width="136" height="40" rx="8" fill="#e6e6e6" />
        <text x="68" y="75" font-size="12" stroke="none" fill="#000" font-weight="600" text-anchor="middle">Values</text>
        <text x="204" y="75" font-size="12" stroke="none" fill="#666" text-anchor="middle">Formulas</text>

        <g transform="translate(288,50)">
          <rect width="20" height="20" rx="4" />
          <text x="28" y="14" font-size="12" stroke="none" fill="#000">Include cell formatting</text>
        </g>
        <g transform="translate(288,82)">
          <rect width="20" height="20" rx="4" fill="#000" />
          <path d="M4 11 l4 4 l8 -8" stroke="#fff" fill="none" stroke-width="2" />
          <text x="28" y="14" font-size="12" stroke="none" fill="#000">Skip empty rows</text>
        </g>
      </g>
    </g>

    <!-- Result placeholder right -->
    <g transform="translate(688,88)">
      <rect width="448" height="368" rx="8" stroke="#e6e6e6" stroke-dasharray="4 4" />
      <text x="224" y="180" font-size="14" stroke="none" fill="#666" text-anchor="middle">Press Run to see the result here.</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(48,760)">
    <text x="0" y="14" font-size="12" stroke="none" fill="#666">This runs a real call against Google Sheets as ClaudeCoder.</text>
    <g transform="translate(1056,-8)">
      <rect width="128" height="40" rx="8" fill="#000" />
      <text x="64" y="25" font-size="14" stroke="none" fill="#fff" font-weight="600" text-anchor="middle">Run</text>
    </g>
    <g transform="translate(992,-8)">
      <rect width="56" height="40" rx="8" />
      <text x="28" y="25" font-size="14" stroke="none" fill="#000" text-anchor="middle">Reset</text>
    </g>
  </g>

  <!-- Annotations -->
  <g stroke="#d33" stroke-dasharray="4 4" fill="#fff">
    <circle cx="64" cy="512" r="12" />
    <circle cx="320" cy="588" r="12" />
  </g>
  <g font-size="12" stroke="none" fill="#d33">
    <text x="64" y="516" text-anchor="middle">1</text>
    <text x="320" y="592" text-anchor="middle">2</text>
  </g>
</svg>
