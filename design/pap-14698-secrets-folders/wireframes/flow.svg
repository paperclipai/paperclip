<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="416" viewBox="0 0 1280 416"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="416" />
  <text x="24" y="40" font-size="20" font-weight="700" stroke="none" fill="#000">Flow — secrets folder navigation</text>

  <!-- 1. Root -->
  <g transform="translate(24,72)">
    <rect width="256" height="176" rx="6" />
    <text x="16" y="28" font-size="14" font-weight="600" stroke="none" fill="#000">1 · Root (All secrets)</text>
    <rect x="16" y="44" width="224" height="24" fill="#e6e6e6" />
    <text x="24" y="61" font-size="12" stroke="none" fill="#000">▸ dev</text>
    <rect x="16" y="72" width="224" height="24" fill="#e6e6e6" />
    <text x="24" y="89" font-size="12" stroke="none" fill="#000">▸ prod</text>
    <rect x="16" y="100" width="224" height="24" />
    <text x="24" y="117" font-size="12" stroke="none" fill="#000">instance-admin-token</text>
    <text x="16" y="152" font-size="12" stroke="none" fill="#666">?path= (empty)</text>
  </g>
  <!-- arrow -->
  <g stroke="#000" fill="none">
    <line x1="288" y1="160" x2="336" y2="160" />
    <polyline points="328,152 336,160 328,168" />
  </g>
  <text x="292" y="148" font-size="12" stroke="none" fill="#666">click folder</text>

  <!-- 2. Folder -->
  <g transform="translate(344,72)">
    <rect width="256" height="176" rx="6" />
    <text x="16" y="28" font-size="14" font-weight="600" stroke="none" fill="#000">2 · Folder view</text>
    <text x="16" y="52" font-size="12" stroke="none" fill="#666">All secrets / dev / github / oauth</text>
    <rect x="16" y="64" width="224" height="24" />
    <text x="24" y="81" font-size="12" stroke="none" fill="#000">clientid</text>
    <rect x="16" y="92" width="224" height="24" />
    <text x="24" y="109" font-size="12" stroke="none" fill="#000">clientsecret</text>
    <text x="16" y="152" font-size="12" stroke="none" fill="#666">?path=dev/github/oauth</text>
  </g>
  <g stroke="#000" fill="none">
    <line x1="608" y1="160" x2="656" y2="160" />
    <polyline points="648,152 656,160 648,168" />
  </g>
  <text x="608" y="148" font-size="12" stroke="none" fill="#666">Create secret</text>

  <!-- 3. Create dialog -->
  <g transform="translate(664,72)">
    <rect width="256" height="176" rx="6" />
    <text x="16" y="28" font-size="14" font-weight="600" stroke="none" fill="#000">3 · Create in folder</text>
    <rect x="16" y="48" width="224" height="32" rx="4" />
    <rect x="20" y="54" width="104" height="20" rx="10" fill="#e6e6e6" />
    <text x="28" y="68" font-size="10" stroke="none" fill="#000">dev/github/oauth/</text>
    <text x="132" y="69" font-size="12" stroke="none" fill="#000">newname</text>
    <text x="16" y="108" font-size="12" stroke="none" fill="#666">Name pre-filled with folder path;</text>
    <text x="16" y="124" font-size="12" stroke="none" fill="#666">key derived from full name.</text>
    <text x="16" y="152" font-size="12" stroke="none" fill="#666">Save → back to folder view</text>
  </g>

  <!-- 4. Search (branch from root) -->
  <g transform="translate(984,72)">
    <rect width="272" height="176" rx="6" />
    <text x="16" y="28" font-size="14" font-weight="600" stroke="none" fill="#000">4 · Search (from anywhere)</text>
    <rect x="16" y="44" width="240" height="24" rx="12" fill="#e6e6e6" />
    <text x="28" y="61" font-size="12" stroke="none" fill="#000">client</text>
    <rect x="16" y="76" width="240" height="24" />
    <text x="24" y="93" font-size="10" stroke="none" fill="#666">dev/github/oauth/<tspan fill="#000" font-weight="700">clientsecret</tspan></text>
    <rect x="16" y="104" width="240" height="24" />
    <text x="24" y="121" font-size="10" stroke="none" fill="#666">prod/github/oauth/<tspan fill="#000" font-weight="700">clientsecret</tspan></text>
    <text x="16" y="152" font-size="12" stroke="none" fill="#666">global flat results · clear returns to folder</text>
  </g>
  <g stroke="#000" fill="none">
    <line x1="928" y1="160" x2="976" y2="160" />
    <polyline points="968,152 976,160 968,168" />
  </g>
  <text x="928" y="148" font-size="12" stroke="none" fill="#666">type in search</text>

  <!-- back arrows note -->
  <text x="24" y="296" font-size="12" stroke="none" fill="#666">Breadcrumb segments and browser Back both navigate up (folder path lives in the URL as ?path=…).</text>
  <text x="24" y="320" font-size="12" stroke="none" fill="#666">Flat toggle shows today’s full-name list at any time; search always searches every folder.</text>
</svg>
