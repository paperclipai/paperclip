<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- canvas border + dimmed backdrop -->
  <rect x="0" y="0" width="1280" height="800" fill="#e6e6e6" />
  <text x="640" y="40" font-size="12" text-anchor="middle" stroke="none" fill="#666">Backdrop: Secrets page (folder dev/github/oauth) dimmed behind modal</text>

  <!-- ============ modal: create secret ============ -->
  <g transform="translate(360,96)">
    <rect width="560" height="616" rx="6" fill="#fff" />

    <!-- title -->
    <text x="24" y="44" font-size="20" font-weight="700" stroke="none" fill="#000">Create secret</text>
    <text x="536" y="44" font-size="20" text-anchor="middle" stroke="none" fill="#666">✕</text>

    <!-- who provides tabs -->
    <text x="24" y="84" font-size="14" font-weight="600" stroke="none" fill="#000">Who provides the value?</text>
    <g transform="translate(24,96)">
      <rect width="512" height="40" rx="4" />
      <rect x="2" y="2" width="254" height="36" rx="3" fill="#000" stroke="none" />
      <text x="128" y="25" font-size="14" text-anchor="middle" stroke="none" fill="#fff">Company</text>
      <text x="384" y="25" font-size="14" text-anchor="middle" stroke="none" fill="#666">Each user</text>
    </g>

    <!-- name field with folder-prefix chip -->
    <text x="24" y="172" font-size="14" font-weight="600" stroke="none" fill="#000">Name</text>
    <g transform="translate(24,184)">
      <rect width="512" height="40" rx="4" />
      <!-- prefix chip -->
      <g transform="translate(8,8)">
        <rect width="176" height="24" rx="12" fill="#e6e6e6" />
        <text x="12" y="16" font-size="12" stroke="none" fill="#000">dev/github/oauth/</text>
        <text x="160" y="16" font-size="12" stroke="none" fill="#666">✕</text>
      </g>
      <!-- typed leaf -->
      <text x="196" y="25" font-size="14" stroke="none" fill="#000">clientsecret</text>
      <line x1="284" y1="10" x2="284" y2="30" stroke="#666" />
    </g>
    <text x="24" y="248" font-size="12" stroke="none" fill="#666">Creating in dev/github/oauth — remove the chip to type a different path.</text>

    <!-- value tabs: managed / external -->
    <g transform="translate(24,264)">
      <text x="0" y="14" font-size="14" font-weight="600" stroke="none" fill="#000">Managed value</text>
      <line x1="0" y1="24" x2="104" y2="24" stroke-width="3" />
      <text x="136" y="14" font-size="14" stroke="none" fill="#666">External reference</text>
      <line x1="0" y1="25" x2="512" y2="25" stroke="#666" stroke-width="0.5" />
    </g>

    <!-- value textarea -->
    <text x="24" y="320" font-size="14" font-weight="600" stroke="none" fill="#000">Value</text>
    <g transform="translate(24,332)">
      <rect width="512" height="72" rx="4" />
      <text x="12" y="26" font-size="14" stroke="none" fill="#666">Paste the secret value…</text>
    </g>

    <!-- derived key -->
    <text x="24" y="440" font-size="14" font-weight="600" stroke="none" fill="#000">Key</text>
    <g transform="translate(24,452)">
      <rect width="512" height="40" rx="4" fill="#e6e6e6" />
      <text x="12" y="25" font-size="14" stroke="none" fill="#000">dev-github-oauth-clientsecret</text>
      <text x="488" y="25" font-size="14" stroke="none" fill="#666">✎</text>
    </g>
    <text x="24" y="512" font-size="12" stroke="none" fill="#666">Auto-derived from the full name (slashes become dashes). Edit to override.</text>

    <!-- footer buttons -->
    <line x1="0" y1="544" x2="560" y2="544" stroke="#666" stroke-width="0.5" />
    <g transform="translate(304,560)">
      <rect width="104" height="40" rx="4" />
      <text x="52" y="25" font-size="14" text-anchor="middle" stroke="none" fill="#000">Cancel</text>
    </g>
    <g transform="translate(424,560)">
      <rect width="112" height="40" rx="4" fill="#000" />
      <text x="56" y="25" font-size="14" text-anchor="middle" stroke="none" fill="#fff">Create</text>
    </g>
  </g>

  <!-- ============ annotations ============ -->
  <g stroke="#d33" stroke-dasharray="6,4" fill="none">
    <rect x="376" y="272" width="536" height="64" rx="4" />
    <circle cx="360" cy="304" r="12" stroke-dasharray="none" fill="#fff" />
    <rect x="376" y="536" width="536" height="64" rx="4" />
    <circle cx="360" cy="568" r="12" stroke-dasharray="none" fill="#fff" />
  </g>
  <g stroke="none" fill="#d33" font-size="12" font-weight="700">
    <text x="360" y="308" text-anchor="middle">1</text>
    <text x="360" y="572" text-anchor="middle">2</text>
  </g>
</svg>
