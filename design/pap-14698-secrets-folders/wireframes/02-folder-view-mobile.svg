<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="375" height="812" />

  <!-- header -->
  <text x="16" y="44" font-size="28" font-weight="700" stroke="none" fill="#000">Secrets</text>

  <!-- tab bar -->
  <g transform="translate(16,64)">
    <text x="0" y="17" font-size="14" font-weight="600" stroke="none" fill="#000">Secrets</text>
    <line x1="0" y1="28" x2="52" y2="28" stroke-width="3" />
    <text x="76" y="17" font-size="14" stroke="none" fill="#666">My secrets</text>
    <text x="168" y="17" font-size="14" stroke="none" fill="#666">Vaults</text>
    <line x1="0" y1="29" x2="343" y2="29" stroke="#666" stroke-width="0.5" />
  </g>

  <!-- search + create row -->
  <g transform="translate(16,112)">
    <rect width="240" height="40" rx="20" />
    <circle cx="20" cy="20" r="6" />
    <line x1="24" y1="24" x2="30" y2="30" />
    <text x="40" y="25" font-size="14" stroke="none" fill="#666">Search…</text>
    <g transform="translate(256,0)">
      <rect width="88" height="40" rx="4" fill="#000" />
      <text x="44" y="25" font-size="14" text-anchor="middle" stroke="none" fill="#fff">Create</text>
    </g>
  </g>

  <!-- breadcrumb collapses to back + current folder -->
  <g transform="translate(16,176)">
    <polyline points="8,4 0,12 8,20" fill="none" />
    <text x="20" y="17" font-size="14" stroke="none" fill="#666">github</text>
    <text x="80" y="17" font-size="14" font-weight="700" stroke="none" fill="#000">/ oauth</text>
    <text x="152" y="17" font-size="12" stroke="none" fill="#666">2 secrets · 1 folder</text>
  </g>

  <!-- folder card -->
  <g transform="translate(16,208)">
    <rect width="343" height="56" rx="6" />
    <g transform="translate(16,16)">
      <path d="M0,6 L0,22 L24,22 L24,4 L11,4 L8,0 L0,0 Z" fill="#e6e6e6" />
    </g>
    <text x="56" y="34" font-size="14" font-weight="600" stroke="none" fill="#000">webhooks</text>
    <text x="216" y="34" font-size="12" stroke="none" fill="#666">1 secret</text>
    <polyline points="320,20 328,28 320,36" fill="none" />
  </g>

  <!-- secret card -->
  <g transform="translate(16,280)">
    <rect width="343" height="96" rx="6" />
    <text x="16" y="28" font-size="14" font-weight="600" stroke="none" fill="#000">clientid</text>
    <text x="16" y="48" font-size="12" stroke="none" fill="#666">DEV_GITHUB_OAUTH_CLIENTID</text>
    <g transform="translate(16,60)">
      <rect width="56" height="24" rx="12" />
      <text x="28" y="16" font-size="12" text-anchor="middle" stroke="none" fill="#000">Active</text>
    </g>
    <text x="88" y="76" font-size="12" stroke="none" fill="#666">v1 · managed · 2h ago</text>
    <text x="320" y="28" font-size="14" stroke="none" fill="#000">…</text>
  </g>

  <!-- secret card 2 -->
  <g transform="translate(16,392)">
    <rect width="343" height="96" rx="6" />
    <text x="16" y="28" font-size="14" font-weight="600" stroke="none" fill="#000">clientsecret</text>
    <text x="16" y="48" font-size="12" stroke="none" fill="#666">DEV_GITHUB_OAUTH_CLIENTSECRET</text>
    <g transform="translate(16,60)">
      <rect width="56" height="24" rx="12" />
      <text x="28" y="16" font-size="12" text-anchor="middle" stroke="none" fill="#000">Active</text>
    </g>
    <text x="88" y="76" font-size="12" stroke="none" fill="#666">v4 · managed · 2h ago</text>
    <text x="320" y="28" font-size="14" stroke="none" fill="#000">…</text>
  </g>

  <!-- annotations -->
  <g stroke="#d33" stroke-dasharray="6,4" fill="none">
    <rect x="8" y="168" width="296" height="32" rx="4" />
    <circle cx="336" cy="184" r="12" stroke-dasharray="none" fill="#fff" />
  </g>
  <g stroke="none" fill="#d33" font-size="12" font-weight="700">
    <text x="336" y="188" text-anchor="middle">1</text>
  </g>
  <text x="16" y="536" font-size="12" stroke="none" fill="#666">1 — In the narrow card view the breadcrumb collapses to</text>
  <text x="16" y="556" font-size="12" stroke="none" fill="#666">back-chevron + parent + current folder. Folder cards sit</text>
  <text x="16" y="576" font-size="12" stroke="none" fill="#666">above secret cards; Create pre-fills the current path.</text>
</svg>
