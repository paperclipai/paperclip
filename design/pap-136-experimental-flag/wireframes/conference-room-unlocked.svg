<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- Desktop 1280x800 — flag ON: Conference Room page + everything else the flag unlocks -->
  <rect x="0" y="0" width="1280" height="800" />

  <!-- main app sidebar -->
  <rect x="0" y="0" width="240" height="800" />
  <rect x="16" y="16" width="208" height="40" rx="8" fill="#e6e6e6" />
  <text x="32" y="41" font-size="14" stroke="none" fill="#000" font-weight="bold">Paperclip</text>
  <text x="24" y="92" font-size="14" stroke="none" fill="#000">Inbox</text>
  <rect x="16" y="104" width="208" height="32" rx="4" fill="#e6e6e6" />
  <text x="24" y="125" font-size="14" stroke="none" fill="#000" font-weight="bold">Conference Room</text>
  <text x="24" y="172" font-size="12" stroke="none" fill="#666">WORK</text>
  <text x="24" y="200" font-size="14" stroke="none" fill="#000">My Tasks</text>
  <text x="24" y="228" font-size="14" stroke="none" fill="#000">Projects</text>
  <text x="24" y="272" font-size="12" stroke="none" fill="#666">AGENTS</text>
  <circle cx="32" cy="296" r="8" fill="#e6e6e6" />
  <text x="48" y="301" font-size="14" stroke="none" fill="#000">CEO</text>
  <circle cx="32" cy="328" r="8" fill="#e6e6e6" />
  <text x="48" y="333" font-size="14" stroke="none" fill="#000">Coder</text>

  <!-- page header -->
  <text x="264" y="44" font-size="20" stroke="none" fill="#000" font-weight="bold">Conference Room</text>
  <text x="264" y="68" font-size="12" stroke="none" fill="#666">Talk to your whole team in one place. Chats drive toward traceable tasks.</text>

  <!-- chat column -->
  <rect x="264" y="88" width="616" height="600" rx="8" />

  <!-- agent bubble 1 -->
  <circle cx="296" cy="128" r="12" fill="#e6e6e6" />
  <text x="316" y="124" font-size="12" stroke="none" fill="#000" font-weight="bold">CEO</text>
  <text x="352" y="124" font-size="12" stroke="none" fill="#666">9:14 AM</text>
  <g transform="translate(316, 136)">
    <rect width="424" height="56" rx="8" fill="#e6e6e6" />
    <text x="16" y="24" font-size="14" stroke="none" fill="#000">Morning! Two tasks moved to review overnight.</text>
    <text x="16" y="44" font-size="14" stroke="none" fill="#000">Want me to summarize what changed?</text>
  </g>
  <!-- action row under agent bubble -->
  <g transform="translate(316, 200)">
    <rect width="24" height="16" rx="4" />
    <rect x="32" width="24" height="16" rx="4" />
    <rect x="64" width="24" height="16" rx="4" />
    <text x="104" y="12" font-size="12" stroke="none" fill="#666">copy · vote · more</text>
  </g>

  <!-- user bubble (right aligned) -->
  <g transform="translate(456, 240)">
    <rect width="392" height="40" rx="8" />
    <text x="16" y="25" font-size="14" stroke="none" fill="#000">Yes — and queue a release checklist task.</text>
  </g>

  <!-- agent bubble 2 with task chip -->
  <circle cx="296" cy="320" r="12" fill="#e6e6e6" />
  <text x="316" y="316" font-size="12" stroke="none" fill="#000" font-weight="bold">CEO</text>
  <g transform="translate(316, 328)">
    <rect width="424" height="72" rx="8" fill="#e6e6e6" />
    <text x="16" y="24" font-size="14" stroke="none" fill="#000">Created the checklist task and assigned QA:</text>
    <rect x="16" y="36" width="200" height="24" rx="4" fill="#fff" />
    <text x="28" y="52" font-size="12" stroke="none" fill="#000">PAP-141 · Release checklist</text>
  </g>

  <!-- typing dots -->
  <g transform="translate(316, 424)">
    <rect width="80" height="32" rx="8" fill="#e6e6e6" />
    <circle cx="24" cy="16" r="4" fill="#666" stroke="none" />
    <circle cx="40" cy="16" r="4" fill="#666" stroke="none" />
    <circle cx="56" cy="16" r="4" fill="#666" stroke="none" />
  </g>

  <!-- composer -->
  <g transform="translate(288, 600)">
    <rect width="568" height="64" rx="8" />
    <rect x="16" y="16" width="64" height="24" rx="12" fill="#e6e6e6" />
    <text x="48" y="32" font-size="12" text-anchor="middle" stroke="none" fill="#000">Agent</text>
    <text x="96" y="32" font-size="14" stroke="none" fill="#666">Message the room...</text>
    <rect x="496" y="12" width="56" height="40" rx="4" fill="#000" />
    <text x="524" y="37" font-size="14" text-anchor="middle" stroke="none" fill="#fff">Send</text>
  </g>

  <!-- activity feed rail -->
  <rect x="904" y="88" width="352" height="600" rx="8" />
  <text x="928" y="120" font-size="14" stroke="none" fill="#000" font-weight="bold">Activity feed</text>
  <g transform="translate(928, 136)">
    <rect width="304" height="72" rx="8" />
    <circle cx="20" cy="20" r="8" fill="#e6e6e6" />
    <text x="36" y="25" font-size="12" stroke="none" fill="#000" font-weight="bold">Coder · committed</text>
    <text x="16" y="48" font-size="12" stroke="none" fill="#666">fix(feed): single-flight quicklook...</text>
  </g>
  <g transform="translate(928, 224)">
    <rect width="304" height="72" rx="8" />
    <circle cx="20" cy="20" r="8" fill="#e6e6e6" />
    <text x="36" y="25" font-size="12" stroke="none" fill="#000" font-weight="bold">QA · moved to review</text>
    <text x="16" y="48" font-size="12" stroke="none" fill="#666">PAP-135 typing-dots QA</text>
  </g>
  <g transform="translate(928, 312)">
    <rect width="304" height="72" rx="8" />
    <circle cx="20" cy="20" r="8" fill="#e6e6e6" />
    <text x="36" y="25" font-size="12" stroke="none" fill="#000" font-weight="bold">CEO · commented</text>
    <text x="16" y="48" font-size="12" stroke="none" fill="#666">on PAP-128 composer plan</text>
  </g>

  <!-- footer note: what else the flag unlocks -->
  <text x="264" y="724" font-size="12" stroke="none" fill="#666">Also unlocked by the same flag: capsule onboarding wizard · chat-style task threads · brand status chips · team-centric copy</text>
  <text x="264" y="748" font-size="12" stroke="none" fill="#666">Flag OFF: this nav item and page disappear (/board-chat redirects home), task threads and onboarding render exactly as on master.</text>

  <!-- annotation layer -->
  <g stroke="#d33" stroke-dasharray="6 4" fill="none">
    <rect x="8" y="96" width="224" height="48" rx="4" />
    <rect x="896" y="80" width="368" height="616" rx="8" />
    <rect x="280" y="592" width="584" height="80" rx="8" />
  </g>
  <g stroke="#d33" fill="none">
    <circle cx="256" cy="120" r="14" />
    <circle cx="880" cy="160" r="14" />
    <circle cx="880" cy="632" r="14" />
    <circle cx="880" cy="104" r="14" />
  </g>
  <text x="256" y="125" font-size="14" text-anchor="middle" stroke="none" fill="#d33" font-weight="bold">1</text>
  <text x="880" y="165" font-size="14" text-anchor="middle" stroke="none" fill="#d33" font-weight="bold">2</text>
  <text x="880" y="637" font-size="14" text-anchor="middle" stroke="none" fill="#d33" font-weight="bold">3</text>
  <text x="880" y="109" font-size="14" text-anchor="middle" stroke="none" fill="#d33" font-weight="bold">4</text>
</svg>
