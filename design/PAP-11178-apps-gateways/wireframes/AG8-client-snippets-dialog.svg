  <text x="480" y="248" font-size="14" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Add to your Claude Desktop config</text>
  <text x="480" y="268" font-size="12" stroke="none" fill="#666" xml:space="preserve"><tspan font-weight="bold">macOS · </tspan>~/Library/Application Support/Claude/claude_desktop_config.json</text>
