  <rect x="224" y="272" width="232" height="36" rx="6" fill="#f4f4f1" stroke="#000" stroke-width="1" />
  <text x="240" y="294" font-size="13" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Claude Desktop</text>
  <text x="240" y="338" font-size="13" stroke="none" fill="#666" text-anchor="start">VS Code</text>
  <text x="240" y="382" font-size="13" stroke="none" fill="#666" text-anchor="start">OpenCode / Claude Code</text>
