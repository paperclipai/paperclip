  <text x="985.0" y="313.0" font-size="12" stroke="none" fill="#000" text-anchor="middle">Copy</text>
  <text x="480" y="536" font-size="12" stroke="none" fill="#666" text-anchor="start" font-weight="bold">Token</text>
  <rect x="480" y="550" width="576" height="50" rx="8" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="496" y="578" font-size="13" stroke="none" fill="#000" text-anchor="start" font-weight="bold">pcgk_live_8x4Pa…RAg</text>
  <text x="496" y="594" font-size="11" stroke="none" fill="#666" text-anchor="start">Mints a new token on copy · expires in 90 days · revocable any time</text>
  <rect x="930" y="558" width="110" height="26" rx="4" fill="#fff" stroke="#000" stroke-width="1.2" />
  <text x="985.0" y="575.0" font-size="12" stroke="none" fill="#000" text-anchor="middle">Show</text>
  <rect x="480" y="616" width="576" height="76" rx="8" fill="#f4f4f1" stroke="#ccc" stroke-width="1" />
  <text x="496" y="642" font-size="12" stroke="none" fill="#000" xml:space="preserve"><tspan font-weight="bold">Treat this like a password. </tspan>Anyone with this token can call exactly the tools this gateway allows. If a laptop is lost, revoke from the Tokens tab.</text>
  <text x="496" y="664" font-size="12" stroke="none" fill="#000" xml:space="preserve"><tspan font-weight="bold">Test it: </tspan>Quit Claude Desktop, replace the file, relaunch. The gateway should show in the picker as `paperclip-cto-agents`.</text>
