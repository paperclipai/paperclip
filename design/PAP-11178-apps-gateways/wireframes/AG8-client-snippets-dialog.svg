  <text x="496" y="330" font-size="12" stroke="none" fill="#222" font-family="ui-monospace, Menlo, monospace">  "mcpServers": {</text>
  <text x="496" y="348" font-size="12" stroke="none" fill="#222" font-family="ui-monospace, Menlo, monospace">    "paperclip-cto-agents": {</text>
  <text x="496" y="366" font-size="12" stroke="none" fill="#222" font-family="ui-monospace, Menlo, monospace">      "url": "https://mcp.paperclip.dev/g/cto-agents/mcp",</text>
  <text x="496" y="384" font-size="12" stroke="none" fill="#222" font-family="ui-monospace, Menlo, monospace">      "headers": {</text>
  <text x="496" y="402" font-size="12" stroke="none" fill="#222" font-family="ui-monospace, Menlo, monospace">        "Authorization": "Bearer pcgk_live_8x4Pa…RAg"</text>
  <text x="496" y="420" font-size="12" stroke="none" fill="#222" font-family="ui-monospace, Menlo, monospace">      }</text>
  <text x="496" y="438" font-size="12" stroke="none" fill="#222" font-family="ui-monospace, Menlo, monospace">    }</text>
  <text x="496" y="456" font-size="12" stroke="none" fill="#222" font-family="ui-monospace, Menlo, monospace">  }</text>
  <text x="496" y="474" font-size="12" stroke="none" fill="#222" font-family="ui-monospace, Menlo, monospace">}</text>
