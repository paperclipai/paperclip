  <text x="224" y="168" font-size="20" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Connect a client</text>
  <text x="224" y="192" font-size="13" stroke="none" fill="#666" text-anchor="start">Pick how you’ll point your client at this gateway. A new token is minted on copy.</text>
  <text x="1044" y="168" font-size="18" stroke="none" fill="#666" text-anchor="end">✕</text>
