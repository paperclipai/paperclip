  <rect x="304" y="266" width="672" height="280" rx="8" fill="#f4f4f1" stroke="#ccc" stroke-width="1" />
  <text x="320" y="288" font-size="12" stroke="none" fill="#444" font-family="ui-monospace, Menlo, monospace">{</text>
  <text x="320" y="306" font-size="12" stroke="none" fill="#444" font-family="ui-monospace, Menlo, monospace">  "mcpServers": {</text>
  <text x="320" y="324" font-size="12" stroke="none" fill="#444" font-family="ui-monospace, Menlo, monospace">    "github": {</text>
  <text x="320" y="342" font-size="12" stroke="none" fill="#444" font-family="ui-monospace, Menlo, monospace">      "command": "npx -y @modelcontextprotocol/server-github",</text>
  <text x="320" y="360" font-size="12" stroke="none" fill="#444" font-family="ui-monospace, Menlo, monospace">      "env": { "GITHUB_TOKEN": "ghp_..." }</text>
  <text x="320" y="378" font-size="12" stroke="none" fill="#444" font-family="ui-monospace, Menlo, monospace">    },</text>
  <text x="320" y="396" font-size="12" stroke="none" fill="#444" font-family="ui-monospace, Menlo, monospace">    "linear": {</text>
  <text x="320" y="414" font-size="12" stroke="none" fill="#444" font-family="ui-monospace, Menlo, monospace">      "url": "https://mcp.linear.app/v1/sse",</text>
  <text x="320" y="432" font-size="12" stroke="none" fill="#444" font-family="ui-monospace, Menlo, monospace">      "headers": { "Authorization": "Bearer lin_api_..." }</text>
  <text x="320" y="450" font-size="12" stroke="none" fill="#444" font-family="ui-monospace, Menlo, monospace">    }</text>
  <text x="320" y="468" font-size="12" stroke="none" fill="#444" font-family="ui-monospace, Menlo, monospace">  }</text>
  <text x="320" y="486" font-size="12" stroke="none" fill="#444" font-family="ui-monospace, Menlo, monospace">}</text>
  <text x="304" y="570" font-size="12" stroke="none" fill="#666" xml:space="preserve">Sensitive values stay in your secret service. <tspan font-weight="bold">Paperclip never stores raw secrets in this draft.</tspan></text>
  <text x="304" y="592" font-size="12" stroke="none" fill="#666" xml:space="preserve">Stdio entries must map to an <tspan font-weight="bold">approved template</tspan> before they can be activated.</text>
