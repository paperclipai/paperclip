  <text x="872" y="580" font-size="11" stroke="none" fill="#666" text-anchor="start">Inbox approvals stacked, single-action default.</text>
  <text x="64" y="652" font-size="14" stroke="none" fill="#000" text-anchor="start" font-weight="bold">Spec checklist</text>
  <line x1="64" y1="660" x2="1216" y2="660" stroke="#000" stroke-width="1.5" />
  <text x="80" y="684" font-size="12" stroke="none" fill="#000" text-anchor="start">· Mobile: stack to a single column &lt; 720px. Sidebar collapses to a sheet under a Menu button.</text>
  <text x="80" y="706" font-size="12" stroke="none" fill="#000" text-anchor="start">· Empty: every list view ships with an explicit empty state explaining what the surface is for and one primary action.</text>
  <text x="80" y="728" font-size="12" stroke="none" fill="#000" text-anchor="start">· Loading: never blank — prefer skeleton rows; spinner only on inline buttons / mutations.</text>
  <text x="80" y="750" font-size="12" stroke="none" fill="#000" text-anchor="start">· Error: reachability/reconnect errors get a banner with one fix action, not a toast.</text>
  <text x="80" y="772" font-size="12" stroke="none" fill="#000" text-anchor="start">· Permission errors: read-only viewers see the same surface with all destructive actions hidden, not disabled.</text>
  <text x="80" y="794" font-size="12" stroke="none" fill="#000" text-anchor="start">· Tokens: reveal-once banner replaces the secret with masked dots on next view. No copy of the full value persists in DOM.</text>
  <text x="80" y="816" font-size="12" stroke="none" fill="#000" text-anchor="start">· Destructive copy: “Revoke token”, “Forget rule”, “Delete gateway” need a typed confirm input matching the resource name.</text>
</svg>