<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- canvas border -->
  <rect x="0" y="0" width="1280" height="320" />

  <!-- ===== page header ===== -->
  <g transform="translate(48, 40)">
    <text x="0" y="12" font-size="12" letter-spacing="2" stroke="none" fill="#666">EXECUTION WORKSPACE</text>
    <text x="0" y="48" font-size="28" font-weight="700" stroke="none" fill="#000">PAP-14025-skills-need-to-be-org…</text>
  </g>

  <!-- ===== service control bar (single service, running) ===== -->
  <g transform="translate(688, 48)">
    <rect width="544" height="40" rx="6" />
    <!-- status segment -->
    <circle cx="20" cy="20" r="5" fill="#000" />
    <text x="36" y="25" font-size="14" font-weight="600" stroke="none" fill="#000">Running</text>
    <line x1="128" y1="8" x2="128" y2="32" stroke="#666" />
    <!-- url segment (text is the link; copy + open live at fixed slots) -->
    <text x="144" y="25" font-size="14" stroke="none" fill="#000">paperclip-dev:45439</text>
    <g transform="translate(344, 13)">
      <rect x="3" y="3" width="9" height="11" rx="1" />
      <rect x="0" y="0" width="9" height="11" rx="1" />
    </g>
    <g transform="translate(384, 14)">
      <rect width="12" height="12" rx="2" />
      <line x1="6" y1="6" x2="13" y2="-1" />
      <polyline points="8,-1 13,-1 13,4" fill="none" />
    </g>
    <line x1="424" y1="8" x2="424" y2="32" stroke="#666" />
    <!-- actions segment: two fixed 32px icon slots (stop, restart) -->
    <g transform="translate(436, 4)">
      <rect width="32" height="32" rx="4" />
      <rect x="10" y="10" width="12" height="12" fill="#000" stroke="none" />
    </g>
    <g transform="translate(476, 4)">
      <rect width="32" height="32" rx="4" />
      <path d="M 11 16 a 6 6 0 1 1 2 4.5" fill="none" />
      <polygon points="8,17 14,17 11,11" fill="#000" stroke="none" />
    </g>
  </g>

  <!-- ===== tab bar ===== -->
  <g transform="translate(48, 152)">
    <line x1="0" y1="48" x2="1184" y2="48" />
    <text x="0" y="32" font-size="14" font-weight="600" stroke="none" fill="#000">Tasks</text>
    <line x1="0" y1="48" x2="48" y2="48" stroke-width="3" />
    <text x="80" y="32" font-size="14" stroke="none" fill="#666">Services</text>
    <text x="176" y="32" font-size="14" stroke="none" fill="#666">Configuration</text>
    <text x="296" y="32" font-size="14" stroke="none" fill="#666">Runtime logs</text>
    <text x="408" y="32" font-size="14" stroke="none" fill="#666">Runs</text>
  </g>

  <!-- ===== content placeholder ===== -->
  <g transform="translate(48, 232)">
    <line x1="0" y1="8" x2="1184" y2="8" stroke="#666" />
    <line x1="0" y1="32" x2="1184" y2="32" stroke="#666" />
    <line x1="0" y1="56" x2="800" y2="56" stroke="#666" />
  </g>

  <!-- ===== annotation layer ===== -->
  <g data-region="annotations">
    <rect x="680" y="40" width="560" height="56" fill="none" stroke="#d33" stroke-dasharray="6 3" />
    <g transform="translate(672, 32)">
      <circle cx="0" cy="0" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" />
      <text x="0" y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text>
    </g>
    <g transform="translate(708, 104)">
      <circle cx="0" cy="0" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" />
      <text x="0" y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text>
    </g>
    <g transform="translate(824, 104)">
      <circle cx="0" cy="0" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" />
      <text x="0" y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text>
    </g>
    <g transform="translate(1144, 104)">
      <circle cx="0" cy="0" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" />
      <text x="0" y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text>
    </g>
  </g>
</svg>
