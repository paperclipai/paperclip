<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="400" />

  <text x="48" y="48" font-size="20" font-weight="700" stroke="none" fill="#000">Service lifecycle — states the control bar must cover</text>
  <text x="48" y="72" font-size="12" stroke="none" fill="#666">Solid arrows = user actions and normal progress · dashed arrows = failure paths</text>

  <!-- Restarting (above Running) -->
  <g transform="translate(576, 96)">
    <rect width="144" height="48" rx="6" />
    <text x="72" y="29" font-size="14" font-weight="600" text-anchor="middle" stroke="none" fill="#000">Restarting…</text>
  </g>

  <!-- main row -->
  <g transform="translate(96, 200)">
    <rect width="144" height="48" rx="6" />
    <text x="72" y="29" font-size="14" font-weight="600" text-anchor="middle" stroke="none" fill="#000">Stopped</text>
  </g>
  <g transform="translate(336, 200)">
    <rect width="144" height="48" rx="6" />
    <text x="72" y="29" font-size="14" font-weight="600" text-anchor="middle" stroke="none" fill="#000">Starting…</text>
  </g>
  <g transform="translate(576, 200)">
    <rect width="144" height="48" rx="6" />
    <text x="72" y="29" font-size="14" font-weight="600" text-anchor="middle" stroke="none" fill="#000">Running</text>
    <text x="72" y="64" font-size="12" text-anchor="middle" stroke="none" fill="#666">(healthy / unhealthy)</text>
  </g>
  <g transform="translate(816, 200)">
    <rect width="144" height="48" rx="6" />
    <text x="72" y="29" font-size="14" font-weight="600" text-anchor="middle" stroke="none" fill="#000">Stopping…</text>
  </g>

  <!-- Failed (below) -->
  <g transform="translate(336, 312)">
    <rect width="144" height="48" rx="6" />
    <text x="72" y="29" font-size="14" font-weight="600" text-anchor="middle" stroke="none" fill="#000">Failed</text>
  </g>

  <!-- Stopped -> Starting -->
  <line x1="240" y1="224" x2="328" y2="224" />
  <polygon points="328,224 320,220 320,228" fill="#000" stroke="none" />
  <text x="284" y="214" font-size="12" text-anchor="middle" stroke="none" fill="#666">Start</text>

  <!-- Starting -> Running -->
  <line x1="480" y1="224" x2="568" y2="224" />
  <polygon points="568,224 560,220 560,228" fill="#000" stroke="none" />
  <text x="524" y="214" font-size="12" text-anchor="middle" stroke="none" fill="#666">ready</text>

  <!-- Running -> Stopping -->
  <line x1="720" y1="224" x2="808" y2="224" />
  <polygon points="808,224 800,220 800,228" fill="#000" stroke="none" />
  <text x="764" y="214" font-size="12" text-anchor="middle" stroke="none" fill="#666">Stop</text>

  <!-- Stopping -> Stopped (return path underneath) -->
  <polyline points="888,248 888,288 168,288 168,248" fill="none" />
  <polygon points="168,248 164,256 172,256" fill="#000" stroke="none" />
  <text x="740" y="280" font-size="12" text-anchor="middle" stroke="none" fill="#666">stopped</text>

  <!-- Running <-> Restarting -->
  <line x1="624" y1="200" x2="624" y2="144" />
  <polygon points="624,144 620,152 628,152" fill="#000" stroke="none" />
  <text x="608" y="176" font-size="12" text-anchor="end" stroke="none" fill="#666">Restart</text>
  <line x1="672" y1="144" x2="672" y2="200" />
  <polygon points="672,200 668,192 676,192" fill="#000" stroke="none" />
  <text x="688" y="176" font-size="12" stroke="none" fill="#666">ready</text>

  <!-- Starting -> Failed (dashed) -->
  <line x1="408" y1="248" x2="408" y2="312" stroke-dasharray="6 3" />
  <polygon points="408,312 404,304 412,304" fill="#000" stroke="none" />
  <text x="420" y="284" font-size="12" stroke="none" fill="#666">exit / crash</text>

  <!-- Restarting -> Failed (dashed, long) -->
  <polyline points="576,120 264,120 264,336 328,336" fill="none" stroke-dasharray="6 3" />
  <polygon points="328,336 320,332 320,340" fill="#000" stroke="none" />
  <text x="256" y="112" font-size="12" text-anchor="end" stroke="none" fill="#666">crash</text>

  <!-- Running -> Failed (dashed) -->
  <polyline points="576,240 512,240 512,336 480,336" fill="none" stroke-dasharray="6 3" />
  <polygon points="480,336 488,332 488,340" fill="#000" stroke="none" />
  <text x="524" y="304" font-size="12" stroke="none" fill="#666">dies</text>

  <!-- Failed -> Starting -->
  <line x1="392" y1="312" x2="392" y2="248" />
  <polygon points="392,248 388,256 396,256" fill="#000" stroke="none" />
  <text x="380" y="284" font-size="12" text-anchor="end" stroke="none" fill="#666">Start / Restart</text>
</svg>
