<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="800" />

  <!-- ===== Left app sidebar ===== -->
  <g>
    <rect width="208" height="800" />
    <rect x="24" y="24" width="32" height="32" rx="4" fill="#e6e6e6" />
    <text x="64" y="45" font-size="14" font-weight="600" stroke="none" fill="#000">Paperclip</text>
    <text x="24" y="105" font-size="14" stroke="none" fill="#666">Inbox</text>
    <text x="24" y="145" font-size="14" stroke="none" fill="#666">My issues</text>
    <text x="24" y="185" font-size="14" stroke="none" fill="#666">Projects</text>
    <text x="24" y="225" font-size="14" stroke="none" fill="#666">Documents</text>
    <text x="24" y="265" font-size="14" stroke="none" fill="#666">Summaries</text>
    <text x="24" y="305" font-size="14" stroke="none" fill="#666">Briefs</text>
    <!-- active item -->
    <rect x="0" y="328" width="208" height="40" fill="#e6e6e6" />
    <text x="24" y="353" font-size="14" font-weight="600" stroke="none" fill="#000">Status cards</text>
    <text x="176" y="353" font-size="12" stroke="none" fill="#666">EXP</text>
    <text x="24" y="770" font-size="14" stroke="none" fill="#666">Settings</text>
  </g>

  <!-- ===== Page header ===== -->
  <g transform="translate(232, 0)">
    <text x="0" y="56" font-size="28" font-weight="700" stroke="none" fill="#000">Status cards</text>
    <!-- experimental pill -->
    <rect x="200" y="32" width="112" height="28" rx="14" fill="#e6e6e6" />
    <text x="256" y="51" font-size="12" text-anchor="middle" stroke="none" fill="#000">EXPERIMENTAL</text>
    <!-- cost meter -->
    <text x="656" y="52" font-size="12" stroke="none" fill="#666">Today: 41k tokens · ~$0.62</text>
    <!-- new card button -->
    <g transform="translate(872, 24)">
      <rect width="128" height="40" rx="4" fill="#000" />
      <text x="64" y="25" font-size="14" text-anchor="middle" stroke="none" fill="#fff">+ New card</text>
    </g>
  </g>

  <!-- ===== Tabs ===== -->
  <g transform="translate(232, 88)">
    <line x1="0" y1="48" x2="1000" y2="48" />
    <text x="0" y="32" font-size="14" font-weight="600" stroke="none" fill="#000">Active (6)</text>
    <line x1="0" y1="48" x2="72" y2="48" stroke-width="3" />
    <text x="104" y="32" font-size="14" stroke="none" fill="#666">Archived (3)</text>
    <text x="912" y="32" font-size="12" stroke="none" fill="#666">Sort: recent ▾</text>
  </g>

  <!-- ===== Card grid row 1 ===== -->
  <!-- Card 1: fresh -->
  <g transform="translate(232, 160)">
    <rect width="312" height="280" rx="6" />
    <circle cx="24" cy="32" r="5" fill="#000" />
    <text x="40" y="37" font-size="14" font-weight="600" stroke="none" fill="#000">Decisions v1 rollout</text>
    <text x="288" y="37" font-size="14" text-anchor="middle" stroke="none" fill="#666">⋯</text>
    <text x="24" y="64" font-size="12" stroke="none" fill="#666">All on track. PAP-15002 is ready for PR</text>
    <text x="24" y="82" font-size="12" stroke="none" fill="#666">after QA re-verify passed. Next: review</text>
    <text x="24" y="100" font-size="12" stroke="none" fill="#666">the deep-link fix, then merge.</text>
    <line x1="24" y1="120" x2="288" y2="120" stroke="#666" />
    <line x1="24" y1="140" x2="288" y2="140" stroke="#666" />
    <line x1="24" y1="160" x2="224" y2="160" stroke="#666" />
    <line x1="24" y1="180" x2="264" y2="180" stroke="#666" />
    <line x1="24" y1="200" x2="176" y2="200" stroke="#666" />
    <line x1="0" y1="232" x2="312" y2="232" />
    <text x="24" y="260" font-size="12" stroke="none" fill="#666">4m ago · every 15m · 1.1k tok</text>
    <text x="272" y="260" font-size="14" stroke="none" fill="#000">⟳</text>
  </g>

  <!-- Card 2: updating (incremental) -->
  <g transform="translate(568, 160)">
    <rect width="312" height="280" rx="6" />
    <circle cx="24" cy="32" r="5" fill="#e6e6e6" />
    <text x="40" y="37" font-size="14" font-weight="600" stroke="none" fill="#000">Connections v3 PR lane</text>
    <text x="288" y="37" font-size="14" text-anchor="middle" stroke="none" fill="#666">⋯</text>
    <!-- delta banner -->
    <rect x="24" y="52" width="264" height="32" rx="4" fill="#e6e6e6" />
    <text x="36" y="72" font-size="12" stroke="none" fill="#000">Integrating 3 changes… ▓▓▓░░</text>
    <text x="24" y="112" font-size="12" stroke="none" fill="#666">#9987 went green, #9965 still conflicting,</text>
    <text x="24" y="130" font-size="12" stroke="none" fill="#666">PAP-14986 moved to done —</text>
    <line x1="24" y1="152" x2="288" y2="152" stroke="#666" />
    <line x1="24" y1="172" x2="240" y2="172" stroke="#666" />
    <line x1="24" y1="192" x2="264" y2="192" stroke="#666" />
    <line x1="0" y1="232" x2="312" y2="232" />
    <text x="24" y="260" font-size="12" stroke="none" fill="#666">updating now · on change (60s) · 0.3k tok</text>
  </g>

  <!-- Card 3: stale -->
  <g transform="translate(904, 160)">
    <rect width="312" height="280" rx="6" />
    <circle cx="24" cy="32" r="5" fill="#fff" />
    <text x="40" y="37" font-size="14" font-weight="600" stroke="none" fill="#000">Eval-related issues</text>
    <text x="288" y="37" font-size="14" text-anchor="middle" stroke="none" fill="#666">⋯</text>
    <!-- stale notice -->
    <rect x="24" y="52" width="264" height="32" rx="4" />
    <text x="36" y="72" font-size="12" stroke="none" fill="#000">5 changes since last update — Refresh</text>
    <line x1="24" y1="112" x2="288" y2="112" stroke="#666" />
    <line x1="24" y1="132" x2="288" y2="132" stroke="#666" />
    <line x1="24" y1="152" x2="224" y2="152" stroke="#666" />
    <line x1="24" y1="172" x2="264" y2="172" stroke="#666" />
    <line x1="24" y1="192" x2="176" y2="192" stroke="#666" />
    <line x1="0" y1="232" x2="312" y2="232" />
    <text x="24" y="260" font-size="12" stroke="none" fill="#666">2h ago · manual · 2.4k tok</text>
    <text x="272" y="260" font-size="14" stroke="none" fill="#000">⟳</text>
  </g>

  <!-- ===== Card grid row 2 ===== -->
  <!-- Card 4: multi-project example -->
  <g transform="translate(232, 464)">
    <rect width="312" height="280" rx="6" />
    <circle cx="24" cy="32" r="5" fill="#000" />
    <text x="40" y="37" font-size="14" font-weight="600" stroke="none" fill="#000">Cloud + ID + Content projects</text>
    <text x="288" y="37" font-size="14" text-anchor="middle" stroke="none" fill="#666">⋯</text>
    <text x="24" y="64" font-size="12" stroke="none" fill="#666">Advice: unblock PAP-14882 first; it gates</text>
    <text x="24" y="82" font-size="12" stroke="none" fill="#666">two ID tracks. Cloud is idle waiting on</text>
    <text x="24" y="100" font-size="12" stroke="none" fill="#666">review; Content shipped 3 issues today.</text>
    <line x1="24" y1="120" x2="288" y2="120" stroke="#666" />
    <line x1="24" y1="140" x2="288" y2="140" stroke="#666" />
    <line x1="24" y1="160" x2="224" y2="160" stroke="#666" />
    <line x1="24" y1="180" x2="264" y2="180" stroke="#666" />
    <line x1="0" y1="232" x2="312" y2="232" />
    <text x="24" y="260" font-size="12" stroke="none" fill="#666">28m ago · every 15m if changed · 1.8k</text>
    <text x="272" y="260" font-size="14" stroke="none" fill="#000">⟳</text>
  </g>

  <!-- Card 5: error -->
  <g transform="translate(568, 464)">
    <rect width="312" height="280" rx="6" />
    <circle cx="24" cy="32" r="5" fill="#fff" stroke-dasharray="2 2" />
    <text x="40" y="37" font-size="14" font-weight="600" stroke="none" fill="#000">Anything blocked anywhere</text>
    <text x="288" y="37" font-size="14" text-anchor="middle" stroke="none" fill="#666">⋯</text>
    <rect x="24" y="52" width="264" height="32" rx="4" />
    <text x="36" y="72" font-size="12" stroke="none" fill="#000">Last update failed · Retry · Details</text>
    <text x="24" y="112" font-size="12" stroke="none" fill="#666">Showing last good summary (3h ago):</text>
    <line x1="24" y1="132" x2="288" y2="132" stroke="#666" />
    <line x1="24" y1="152" x2="240" y2="152" stroke="#666" />
    <line x1="24" y1="172" x2="264" y2="172" stroke="#666" />
    <line x1="24" y1="192" x2="176" y2="192" stroke="#666" />
    <line x1="0" y1="232" x2="312" y2="232" />
    <text x="24" y="260" font-size="12" stroke="none" fill="#666">3h ago · every 30m · run failed</text>
    <text x="272" y="260" font-size="14" stroke="none" fill="#000">⟳</text>
  </g>

  <!-- Card 6: compiling / just created -->
  <g transform="translate(904, 464)">
    <rect width="312" height="280" rx="6" stroke-dasharray="6 3" />
    <text x="24" y="37" font-size="14" font-weight="600" stroke="none" fill="#666">New card</text>
    <rect x="24" y="52" width="264" height="32" rx="4" fill="#e6e6e6" />
    <text x="36" y="72" font-size="12" stroke="none" fill="#000">Agent is building your query… ▓░░░░</text>
    <text x="24" y="112" font-size="12" stroke="none" fill="#666">"issues that help ship the new install</text>
    <text x="24" y="130" font-size="12" stroke="none" fill="#666">subcommand"</text>
    <text x="24" y="170" font-size="12" stroke="none" fill="#666">You can add instructions and pick an</text>
    <text x="24" y="188" font-size="12" stroke="none" fill="#666">update policy while this runs.</text>
    <line x1="0" y1="232" x2="312" y2="232" />
    <text x="24" y="260" font-size="12" stroke="none" fill="#666">setting up · first summary pending</text>
  </g>

  <!-- ===== Annotations ===== -->
  <g data-region="annotations">
    <g transform="translate(1240, 48)">
      <circle r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" />
      <text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text>
    </g>
    <g transform="translate(208, 348)">
      <circle r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" />
      <text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text>
    </g>
    <g transform="translate(920, 76)">
      <circle r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" />
      <text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text>
    </g>
    <g transform="translate(560, 244)">
      <circle r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" />
      <text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text>
    </g>
    <g transform="translate(896, 236)">
      <circle r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" />
      <text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">5</text>
    </g>
    <g transform="translate(1232, 480)">
      <circle r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" />
      <text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">6</text>
    </g>
  </g>
</svg>
