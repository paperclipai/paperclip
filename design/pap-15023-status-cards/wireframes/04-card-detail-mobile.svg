<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="375" height="812" />

  <!-- top bar -->
  <rect x="0" y="0" width="375" height="56" />
  <text x="16" y="35" font-size="14" stroke="none" fill="#000">←</text>
  <circle cx="48" cy="28" r="5" fill="#000" />
  <text x="64" y="33" font-size="14" font-weight="600" stroke="none" fill="#000">Cloud + ID + Content</text>
  <text x="344" y="33" font-size="14" stroke="none" fill="#666">⋯</text>

  <text x="16" y="80" font-size="12" stroke="none" fill="#666">Updated 28m ago · every 15m if changed · 23 issues</text>

  <!-- tabs -->
  <g transform="translate(16, 96)">
