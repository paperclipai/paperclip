services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  telegram-bot:
    build: ./services/telegram-bot
    ports:
      - "8000:8000"
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      PAPERCLIP_API_URL: "http://server:3100"
      PAPERCLIP_COMPANY_ID: "dbc742c7-9a38-4542-936b-523dfa3a7fd2"
      PAPERCLIP_CTO_AGENT_ID: "4e5cbf52-a530-439f-917c-a6cfee78d76d"
      PAPERCLIP_API_KEY: ""
      CHAT_IDS_FILE: "/data/chat_ids.json"
      ANGEL_CHAT_ID: "1978432218"
    volumes:
      - telegram-data:/data
    depends_on:
      server:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  paperclip-data:
  telegram-data:
