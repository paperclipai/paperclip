services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: valadrien_os
      POSTGRES_PASSWORD: valadrien_os
      POSTGRES_DB: valadrien_os
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valadrien_os -d valadrien_os"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://valadrien_os:valadrien_os@db:5432/valadrien_os
      PORT: "3100"
      SERVE_UI: "true"
      VALADRIEN_OS_DEPLOYMENT_MODE: "authenticated"
      VALADRIEN_OS_DEPLOYMENT_EXPOSURE: "private"
      VALADRIEN_OS_PUBLIC_URL: "${VALADRIEN_OS_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - valadrien-os-data:/valadrien-os
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  valadrien-os-data:
