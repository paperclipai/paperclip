services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: aiteamcorp
      POSTGRES_PASSWORD: aiteamcorp
      POSTGRES_DB: aiteamcorp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiteamcorp -d aiteamcorp"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://aiteamcorp:aiteamcorp@db:5432/aiteamcorp
      PORT: "3100"
      SERVE_UI: "true"
      AITEAMCORP_DEPLOYMENT_MODE: "authenticated"
      AITEAMCORP_DEPLOYMENT_EXPOSURE: "private"
      AITEAMCORP_PUBLIC_URL: "${AITEAMCORP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - aiteamcorp-data:/aiteamcorp
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  aiteamcorp-data:
