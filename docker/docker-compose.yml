services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: odysseus
      POSTGRES_PASSWORD: odysseus
      POSTGRES_DB: odysseus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odysseus -d odysseus"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://odysseus:odysseus@db:5432/odysseus
      PORT: "3100"
      SERVE_UI: "true"
      ODYSSEUS_DEPLOYMENT_MODE: "authenticated"
      ODYSSEUS_DEPLOYMENT_EXPOSURE: "private"
      ODYSSEUS_PUBLIC_URL: "${ODYSSEUS_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - odysseus-data:/odysseus
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  odysseus-data:
