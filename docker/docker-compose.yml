services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    networks:
      - ai-ecosystem
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      # Definição do diretório de trabalho para o Paperclip processar seu código
      PROJECT_ROOT: "/src/site-goodlife"
    volumes:
      - paperclip-data:/paperclip
      # Mapeamento do seu repositório local para dentro do contêiner
      - D:/TestesIA/site-goodlife:/src/site-goodlife
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ai-ecosystem

networks:
  # Rede compartilhada com o compose do site-goodlife
  ai-ecosystem:
    external: true

volumes:
  pgdata:
  paperclip-data:
