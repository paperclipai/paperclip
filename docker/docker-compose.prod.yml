# Production: full stack with nginx reverse proxy.
# See docs/deploy/guia-instalacao.md for complete instructions.
#
# Usage:
#   cp .env.example .env        # edit BETTER_AUTH_SECRET, PAPERCLIP_PUBLIC_URL, etc.
#   docker compose -f docker/docker-compose.prod.yml up -d
#
# Or use the interactive installer:
#   ./setup.sh

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD must be set}"
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - redisdata:/data

  app:
    image: "${APP_IMAGE:-ghcr.io/connect-distribuidora/toca-da-ia:latest}"
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: "3100"
      DATABASE_URL: "postgres://paperclip:${DB_PASSWORD}@db:5432/paperclip"
      REDIS_URL: "redis://redis:6379"
      SERVE_UI: "true"
      PAPERCLIP_HOME: "/paperclip"
      PAPERCLIP_DEPLOYMENT_MODE: "${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "${PAPERCLIP_DEPLOYMENT_EXPOSURE:-private}"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:?PAPERCLIP_PUBLIC_URL must be set}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - app-data:/paperclip
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3100/health | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-certs:/etc/nginx/certs:ro
      - nginx-logs:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health 2>/dev/null || curl -sf http://localhost/health > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    depends_on:
      app:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  app-data:
  nginx-certs:
  nginx-logs:
