services:
  odysseus:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${ODYSSEUS_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      ODYSSEUS_HOME: "/odysseus"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ODYSSEUS_DEPLOYMENT_MODE: "authenticated"
      ODYSSEUS_DEPLOYMENT_EXPOSURE: "private"
      ODYSSEUS_PUBLIC_URL: "${ODYSSEUS_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${ODYSSEUS_DATA_DIR:-../data/docker-odysseus}:/odysseus"
