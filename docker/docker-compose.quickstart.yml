services:
  aiteamcorp:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${AITEAMCORP_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      AITEAMCORP_HOME: "/aiteamcorp"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      AITEAMCORP_DEPLOYMENT_MODE: "authenticated"
      AITEAMCORP_DEPLOYMENT_EXPOSURE: "private"
      AITEAMCORP_PUBLIC_URL: "${AITEAMCORP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${AITEAMCORP_DATA_DIR:-../data/docker-aiteamcorp}:/aiteamcorp"
