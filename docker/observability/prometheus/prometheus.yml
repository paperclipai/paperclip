global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    deployment: paperclip

scrape_configs:
  - job_name: paperclip-server
    static_configs:
      - targets:
          - "${PAPERCLIP_METRICS_HOST:-server}:${PAPERCLIP_METRICS_PORT:-3100}"
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
