# HTTP — serves directly on port 80.
# To enable HTTPS, copy app-https.conf.example to app-https.conf after placing
# your certificates in the nginx-certs volume (fullchain.pem + privkey.pem).
server {
  listen 80;
  server_name _;

  # Health check endpoint (no auth required)
  location /health {
    proxy_pass http://app:3100/health;
    proxy_set_header Host $host;
    access_log off;
  }

  location / {
    proxy_pass http://app:3100;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}
