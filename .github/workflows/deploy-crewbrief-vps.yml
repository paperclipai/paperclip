name: Deploy CrewBrief to VPS

on:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: crewbrief-vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Pull latest code and restart server on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'DEPLOY_EOF'
            set -e
            echo "=== Pulling latest code ==="
            cd /opt/paperclip
            git fetch origin master
            git reset --hard origin/master

            echo "=== Installing dependencies ==="
            pnpm install --frozen-lockfile

            echo "=== Clearing tsx cache ==="
            rm -rf /tmp/tsx-1000/*

            echo "=== Restarting server ==="
            sudo systemctl restart paperclip

            echo "=== Waiting for server to be healthy ==="
            for i in $(seq 1 30); do
              if curl -s http://localhost:3100/api/health > /dev/null 2>&1; then
                echo "Server is healthy after ${i}s"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: Server failed to become healthy"
                exit 1
              fi
              sleep 2
            done

            echo "=== Running database migrations ==="
            # Embedded PostgreSQL on port 54329 with trust auth via unix socket
            # Use the running server process env to find the DATABASE_URL
            DB_URL=$(grep -z 'DATABASE_URL' /proc/$(systemctl show -p MainPID paperclip | cut -d= -f2)/environ 2>/dev/null | tr '\0' '\n' | grep DATABASE_URL | cut -d= -f2-)
            if [ -n "$DB_URL" ]; then
              DATABASE_URL="$DB_URL" pnpm --filter @paperclipai/db exec drizzle-kit push
            else
              echo "WARNING: Could not determine DATABASE_URL. Migrations may need manual application."
            fi

            echo "=== Seeding demo data ==="
            CREWBRIEF_API_URL=http://localhost:3100 node /opt/paperclip/scripts/seed-crewbrief-demo-data.mjs

            echo "=== Backfilling Quinn QA gate for existing issues ==="
            if [ -n "$DB_URL" ]; then
              DATABASE_URL="$DB_URL" pnpm exec tsx scripts/backfill-qa-gate.ts
            else
              echo "WARNING: Could not determine DATABASE_URL. QA gate backfill skipped."
            fi
          DEPLOY_EOF

      - name: Verify deployment
        run: |
          echo "=== Verifying endpoints ==="
          for ep in \
            "https://crewbrief.avva.aero/api/health" \
            "https://crewbrief.avva.aero/api/briefings/demo-trip-001/demo-duty-001" \
            "https://crewbrief.avva.aero/api/crewbrief/intake/airports" \
            "https://crewbrief.avva.aero/api/crewbrief/intake/batch/airports" \
            "https://crewbrief.avva.aero/api/crewbrief/jetinsight/parse" \
            "https://crewbrief.avva.aero/api/crewbrief/jetinsight/upload" \
            "https://crewbrief.avva.aero/briefing/monday"; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$ep")
            echo "$ep -> HTTP $CODE"
            if [ "$CODE" = "000" ] || [ "$CODE" = "502" ] || [ "$CODE" = "503" ]; then
              echo "ERROR: $ep returned $CODE"
              exit 1
            fi
          done
          echo "=== Deployment verification complete ==="
