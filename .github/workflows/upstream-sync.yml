name: Upstream Sync

# Periodically pulls in changes from upstream paperclipai/paperclip
# and opens a PR against this fork's master so the maintainer can review
# (and the future translation bot can patch in Korean strings).

on:
  schedule:
    # 09:00 KST every Monday (00:00 UTC)
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      ref:
        description: "Upstream ref to sync (default: master)"
        required: false
        default: "master"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

env:
  UPSTREAM_REPO: paperclipai/paperclip
  UPSTREAM_REF: ${{ inputs.ref || 'master' }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "paperclip-ko-sync[bot]"
          git config user.email "paperclip-ko-sync@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_REF}" --tags --no-recurse-submodules

      - name: Check for new upstream commits
        id: check
        run: |
          AHEAD=$(git rev-list --count "HEAD..upstream/${UPSTREAM_REF}")
          echo "ahead=${AHEAD}" >> "$GITHUB_OUTPUT"
          if [ "${AHEAD}" -eq "0" ]; then
            echo "No new upstream commits. Nothing to do."
          else
            echo "Found ${AHEAD} new upstream commit(s)."
          fi
          UPSTREAM_SHA=$(git rev-parse --short "upstream/${UPSTREAM_REF}")
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create sync branch and merge
        if: steps.check.outputs.ahead != '0'
        id: branch
        run: |
          DATE=$(date -u +'%Y-%m-%d')
          BRANCH="upstream-sync/${DATE}-${{ steps.check.outputs.upstream_sha }}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          # Reset to a fresh branch off current master
          git checkout -b "${BRANCH}"

          # Try to merge upstream. If conflicts occur, commit the conflict
          # markers — the maintainer resolves in the PR.
          if git merge --no-edit --allow-unrelated-histories "upstream/${UPSTREAM_REF}"; then
            echo "Merge clean."
            echo "conflicts=false" >> "$GITHUB_OUTPUT"
          else
            echo "Merge produced conflicts. Recording state for manual review."
            git add -A
            git commit -m "chore(sync): conflicts during upstream merge — needs review" || true
            echo "conflicts=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch
        if: steps.check.outputs.ahead != '0'
        run: |
          git push origin "${{ steps.branch.outputs.branch }}" --force-with-lease

      - name: Build PR body
        if: steps.check.outputs.ahead != '0'
        id: body
        run: |
          {
            echo "Automated upstream sync."
            echo ""
            echo "**Upstream**: \`${UPSTREAM_REPO}@${{ steps.check.outputs.upstream_sha }}\`"
            echo "**New commits**: ${{ steps.check.outputs.ahead }}"
            if [ "${{ steps.branch.outputs.conflicts }}" = "true" ]; then
              echo ""
              echo "⚠️ **Merge conflicts detected.** Resolve before merging."
            fi
            echo ""
            echo "## Recent upstream commits"
            echo ""
            git log --oneline -n 20 "HEAD~${{ steps.check.outputs.ahead }}..HEAD" || true
            echo ""
            echo "---"
            echo ""
            echo "**Translation status**: Korean locale files (\`ui/src/i18n/locales/ko/**\`) have not been auto-updated by this sync. The translation bot is a separate workflow (queued for Phase 4 of the translation plan)."
            echo ""
            echo "Generated by \`.github/workflows/upstream-sync.yml\`."
          } > pr_body.md
          echo "body_file=pr_body.md" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.check.outputs.ahead != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If a PR already exists for this branch, gh will reuse it.
          gh pr create \
            --base master \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "chore(sync): upstream ${UPSTREAM_REPO}@${{ steps.check.outputs.upstream_sha }}" \
            --body-file "${{ steps.body.outputs.body_file }}" \
            --label "upstream-sync" \
            || echo "PR may already exist; skipping."

      - name: Summary
        if: always()
        run: |
          {
            echo "## Sync summary"
            echo ""
            echo "- Upstream: \`${UPSTREAM_REPO}@${UPSTREAM_REF}\`"
            echo "- New commits: ${{ steps.check.outputs.ahead || 'unknown' }}"
            if [ "${{ steps.branch.outputs.branch }}" != "" ]; then
              echo "- Branch: \`${{ steps.branch.outputs.branch }}\`"
            fi
            if [ "${{ steps.branch.outputs.conflicts }}" = "true" ]; then
              echo "- Conflicts: yes (resolve in PR)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
