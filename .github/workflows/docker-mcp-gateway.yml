name: Docker (mcp-gateway)

# Builds + pushes the paperclip-mcp-gateway image. Does NOT auto-deploy
# — the gateway is a new in-cluster service that proxies every agent's
# MCP traffic, so cutover is staged: applying the k8s manifest with a
# sha-pinned image is a separate manual step. Once proven healthy,
# switching consumers (agent MCP configs) to point at
# http://paperclip-mcp-gateway.paperclip.svc:8080/<route>/mcp is
# another staged step.
#
# Trigger: any change under packages/mcp-gateway/. Master and tags only;
# no PR builds (HARBOR_PASSWORD org secret isn't available to forks
# anyway, so a PR build would just 401 on push).

on:
  push:
    branches:
      - "master"
    paths:
      - "packages/mcp-gateway/**"
      - ".github/workflows/docker-mcp-gateway.yml"
    tags:
      - "mcp-gateway-v*"

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: self-hosted
    timeout-minutes: 15
    concurrency:
      group: docker-mcp-gateway-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean stale node_modules from runner workspace
        run: |
          find . -name node_modules -type d -prune -exec rm -rf {} + 2>/dev/null || true
          find . -name node_modules -type l -exec rm -f {} + 2>/dev/null || true

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.blockcast.net
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cleanup: true

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            harbor.blockcast.net/paperclip-mcp-gateway/paperclip-mcp-gateway
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/mcp-gateway/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          cache-from: type=registry,ref=harbor.blockcast.net/paperclip-mcp-gateway/paperclip-mcp-gateway:buildcache-v6
          cache-to: type=registry,ref=harbor.blockcast.net/paperclip-mcp-gateway/paperclip-mcp-gateway:buildcache-v6,mode=max,image-manifest=true,oci-mediatypes=true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
