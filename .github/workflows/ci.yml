name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - dev

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Run tests
        run: pnpm test:run

      - name: Build
        run: pnpm build

  deploy-dev:
    needs: verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    timeout-minutes: 5
    steps:
      - name: Deploy to dev (paper-dev.zenova.id)
        run: |
          curl -sf -X POST \
            -H "X-API-Key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"composeId":"OebpXiXB663ZmdWv-2G1p"}' \
            "https://dokploy.zenova.id/api/compose.deploy"

  deploy-prod:
    needs: verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    timeout-minutes: 5
    steps:
      - name: Deploy to production (paper.zenova.id)
        run: |
          curl -sf -X POST \
            -H "X-API-Key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"composeId":"Gh67c1zKV7MsnPo_lZiPZ"}' \
            "https://dokploy.zenova.id/api/compose.deploy"
