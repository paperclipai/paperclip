name: CI

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package manager
        id: pm
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "version=20" >> "$GITHUB_OUTPUT"
          elif [ -f package-lock.json ]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "version=20" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "version=20" >> "$GITHUB_OUTPUT"
          else
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "version=20" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.pm.outputs.version }}

      - name: Setup pnpm
        if: steps.pm.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        shell: bash
        run: |
          case "${{ steps.pm.outputs.manager }}" in
            pnpm) pnpm install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
            *) npm ci ;;
          esac

      - name: Lint
        shell: bash
        run: |
          case "${{ steps.pm.outputs.manager }}" in
            pnpm) pnpm run lint --if-present ;;
            yarn) yarn lint || true ;;
            *) npm run lint --if-present ;;
          esac

      - name: Typecheck
        shell: bash
        run: |
          case "${{ steps.pm.outputs.manager }}" in
            pnpm) pnpm run typecheck --if-present ;;
            yarn) yarn typecheck || true ;;
            *) npm run typecheck --if-present ;;
          esac

      - name: Test
        shell: bash
        run: |
          case "${{ steps.pm.outputs.manager }}" in
            pnpm) pnpm run test --if-present ;;
            yarn) yarn test || true ;;
            *) npm run test --if-present ;;
          esac

      - name: Build
        shell: bash
        run: |
          case "${{ steps.pm.outputs.manager }}" in
            pnpm) pnpm run build --if-present ;;
            yarn) yarn build || true ;;
            *) npm run build --if-present ;;
          esac
