name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      source_ref:
        description: Commit SHA, branch, or tag to publish as stable
        required: true
        type: string
        default: master
      stable_date:
        description: Enter a UTC date in YYYY-MM-DD format, for example 2026-03-18. Do not enter a version string. The workflow will resolve that date to a stable version such as 2026.318.0, then 2026.318.1 for the next same-day stable.
        required: false
        type: string
      dry_run:
        description: Preview the stable release without publishing
        required: true
        type: boolean
        default: false
      publish_canary:
        description: Explicitly publish an npm canary for source_ref. Default off. When true, the stable jobs are skipped and the canary verify/publish path runs instead. Missing npm auth still fails the job closed without exposing secrets.
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify_canary:
    # Canary verification runs on every push to master so the enterprise release
    # path keeps proving typecheck/tests/build green even when the optional npm
    # publish below is disabled. Also runs on workflow_dispatch when an operator
    # explicitly opts in to a canary publish.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_canary == true)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Validate release package manifest
        run: node ./scripts/release-package-map.mjs check

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Run tests
        run: pnpm test:run

      - name: Build
        run: pnpm build

  publish_canary_skipped:
    name: Canary npm publish gate skipped
    if: github.event_name == 'push' && vars.ENABLE_NPM_CANARY_PUBLISH != 'true'
    needs: verify_canary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Explain skipped canary publish
        run: |
          echo "npm canary publish is disabled for routine master pushes."
          echo "verify_canary completed; no npm publish, tag push, deploy, or release action was attempted."
          echo "To enable canary npm publishing later, configure the npm-canary environment/trusted publishing first, then set the non-secret repository variable ENABLE_NPM_CANARY_PUBLISH=true."

  publish_canary:
    # Optional, default-off. Two ways to enable:
    #   1. Repo-level variable `ENABLE_NPM_CANARY_PUBLISH=true` makes every push
    #      to master attempt a canary publish.
    #   2. workflow_dispatch input `publish_canary=true` is a one-shot operator
    #      gate that publishes a canary for the chosen `source_ref`.
    # When neither gate is set, `verify_canary` still proves the release path is
    # green, and a missing or misconfigured npm trust does not red the run.
    if: |
      (github.event_name == 'push' && vars.ENABLE_NPM_CANARY_PUBLISH == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_canary == true)
    needs: verify_canary
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: npm-canary
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Validate release package manifest
        run: node ./scripts/release-package-map.mjs check

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Restore tracked install-time changes
        run: git checkout -- pnpm-lock.yaml

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish canary
        env:
          GITHUB_ACTIONS: "true"
        run: |
          set -o pipefail
          publish_log="$(mktemp)"
          if ./scripts/release.sh canary --skip-verify 2>&1 | tee "$publish_log"; then
            exit 0
          fi
          status=${PIPESTATUS[0]}
          if grep -qiE 'ENEEDAUTH|need auth|E401|401 Unauthorized|missing.*auth' "$publish_log"; then
            {
              echo "::error title=npm canary publish blocked::pnpm publish reported a missing or invalid npm credential."
              echo "::error::This job is gated and only runs when ENABLE_NPM_CANARY_PUBLISH=true (push) or workflow_dispatch input publish_canary=true."
              echo "::error::Trusted publishing requires the npm package owners to grant OIDC trust to this repository and workflow on registry.npmjs.org."
              echo "::error::Do NOT paste raw npm tokens into logs, comments, or this workflow. Configure trusted publishing via the npm web UI and retry."
            } >&2
          fi
          exit "$status"

      - name: Push canary tag
        run: |
          tag="$(git tag --points-at HEAD | grep '^canary/v' | head -1)"
          if [ -z "$tag" ]; then
            echo "Error: no canary tag points at HEAD after release." >&2
            exit 1
          fi
          git push origin "refs/tags/${tag}"

  verify_stable:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_canary != true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Validate release package manifest
        run: node ./scripts/release-package-map.mjs check

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Run tests
        run: pnpm test:run

      - name: Build
        run: pnpm build

  preview_stable:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_canary != true && inputs.dry_run
    needs: verify_stable
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Validate release package manifest
        run: node ./scripts/release-package-map.mjs check

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Dry-run stable release
        env:
          GITHUB_ACTIONS: "true"
        run: |
          args=(stable --skip-verify --dry-run)
          if [ -n "${{ inputs.stable_date }}" ]; then
            args+=(--date "${{ inputs.stable_date }}")
          fi
          ./scripts/release.sh "${args[@]}"

  publish_stable:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_canary != true && !inputs.dry_run
    needs: verify_stable
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: npm-stable
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Restore tracked install-time changes
        run: git checkout -- pnpm-lock.yaml

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish stable
        env:
          GITHUB_ACTIONS: "true"
        run: |
          args=(stable --skip-verify)
          if [ -n "${{ inputs.stable_date }}" ]; then
            args+=(--date "${{ inputs.stable_date }}")
          fi
          ./scripts/release.sh "${args[@]}"

      - name: Push stable tag
        run: |
          tag="$(git tag --points-at HEAD | grep '^v' | head -1)"
          if [ -z "$tag" ]; then
            echo "Error: no stable tag points at HEAD after release." >&2
            exit 1
          fi
          git push origin "refs/tags/${tag}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISH_REMOTE: origin
        run: |
          version="$(git tag --points-at HEAD | grep '^v' | head -1 | sed 's/^v//')"
          if [ -z "$version" ]; then
            echo "Error: no v* tag points at HEAD after stable release." >&2
            exit 1
          fi
          ./scripts/create-github-release.sh "$version"
