name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      source_ref:
        description: Commit SHA, branch, or tag to publish as stable
        required: true
        type: string
        default: master
      stable_date:
        description: Enter a UTC date in YYYY-MM-DD format, for example 2026-03-18. Do not enter a version string. The workflow will resolve that date to a stable version such as 2026.318.0, then 2026.318.1 for the next same-day stable.
        required: false
        type: string
      dry_run:
        description: Preview the stable release without publishing
        required: true
        type: boolean
        default: false

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  verify_canary_typecheck:
    name: Canary typecheck
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Validate release package manifest
        run: node ./scripts/release-package-map.mjs check

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

  verify_canary_general_tests:
    name: Canary general tests (${{ matrix.group_label }})
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: general-server
            group_label: server
          - group: general-workspaces-a
            group_label: workspaces-a
          - group: general-workspaces-b
            group_label: workspaces-b

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run grouped general test suites
        run: pnpm test:run:general -- --group '${{ matrix.group }}'

  verify_canary_serialized_server:
    name: Canary serialized server suites (${{ matrix.shard_label }})
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_index: 0
            shard_count: 4
            shard_label: 1/4
          - shard_index: 1
            shard_count: 4
            shard_label: 2/4
          - shard_index: 2
            shard_count: 4
            shard_label: 3/4
          - shard_index: 3
            shard_count: 4
            shard_label: 4/4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run serialized server test shard
        run: pnpm test:run:serialized -- --shard-index ${{ matrix.shard_index }} --shard-count ${{ matrix.shard_count }}

  verify_canary_build:
    name: Canary build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  verify_canary:
    # Preserve the canary gate that publish_canary depends on, while the
    # underlying verification runs in parallel. The old single self-hosted
    # lane frequently hit its 45m timeout before the serialized route suites
    # completed.
    name: verify_canary
    if: ${{ github.event_name == 'push' && always() }}
    needs:
      - verify_canary_typecheck
      - verify_canary_general_tests
      - verify_canary_serialized_server
      - verify_canary_build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Fail if any canary verification lane failed
        env:
          TYPECHECK_RESULT: ${{ needs.verify_canary_typecheck.result }}
          GENERAL_TESTS_RESULT: ${{ needs.verify_canary_general_tests.result }}
          SERIALIZED_SERVER_RESULT: ${{ needs.verify_canary_serialized_server.result }}
          BUILD_RESULT: ${{ needs.verify_canary_build.result }}
        run: |
          test "$TYPECHECK_RESULT" = "success"
          test "$GENERAL_TESTS_RESULT" = "success"
          test "$SERIALIZED_SERVER_RESULT" = "success"
          test "$BUILD_RESULT" = "success"

  publish_canary:
    # npm trusted-publisher config (per package settings on npmjs.org) binds
    # to paperclipai/paperclip's OIDC identity. Forks like Blockcast/paperclip
    # don't own the @paperclipai/* / paperclipai npm namespaces and don't have
    # a matching trusted-publisher entry, so publishes from a fork hit
    # ENEEDAUTH on every master push and red-light the whole Release workflow
    # for no real reason (Docker workflow handles deploys separately and is
    # not gated on this). Gate on the upstream repo so forks still run
    # verify_canary but skip publish cleanly.
    if: github.event_name == 'push' && github.repository == 'paperclipai/paperclip'
    needs: verify_canary
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: npm-canary
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Validate release package manifest
        run: node ./scripts/release-package-map.mjs check

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Restore tracked install-time changes
        run: git checkout -- pnpm-lock.yaml

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish canary
        env:
          GITHUB_ACTIONS: "true"
        run: ./scripts/release.sh canary --skip-verify

      - name: Push canary tag
        run: |
          tag="$(git tag --points-at HEAD | grep '^canary/v' | head -1)"
          if [ -z "$tag" ]; then
            echo "Error: no canary tag points at HEAD after release." >&2
            exit 1
          fi
          git push origin "refs/tags/${tag}"

  verify_stable:
    if: github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Validate release package manifest
        run: node ./scripts/release-package-map.mjs check

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Run tests
        run: pnpm test:run

      - name: Build
        run: pnpm build

  preview_stable:
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run
    needs: verify_stable
    runs-on: self-hosted
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Validate release package manifest
        run: node ./scripts/release-package-map.mjs check

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Dry-run stable release
        env:
          GITHUB_ACTIONS: "true"
          INPUT_STABLE_DATE: ${{ inputs.stable_date }}
        run: |
          args=(stable --skip-verify --dry-run)
          if [ -n "$INPUT_STABLE_DATE" ]; then
            args+=(--date "$INPUT_STABLE_DATE")
          fi
          ./scripts/release.sh "${args[@]}"

  publish_stable:
    # Same fork-gating as publish_canary (see comment above) — only the
    # upstream repo has the matching npm trusted-publisher entry, so forks
    # would hit ENEEDAUTH if they ever trigger this job manually.
    if: github.event_name == 'workflow_dispatch' && !inputs.dry_run && github.repository == 'paperclipai/paperclip'
    needs: verify_stable
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: npm-stable
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Restore tracked install-time changes
        run: git checkout -- pnpm-lock.yaml

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish stable
        env:
          GITHUB_ACTIONS: "true"
          INPUT_STABLE_DATE: ${{ inputs.stable_date }}
        run: |
          args=(stable --skip-verify)
          if [ -n "$INPUT_STABLE_DATE" ]; then
            args+=(--date "$INPUT_STABLE_DATE")
          fi
          ./scripts/release.sh "${args[@]}"

      - name: Push stable tag
        run: |
          tag="$(git tag --points-at HEAD | grep '^v' | head -1)"
          if [ -z "$tag" ]; then
            echo "Error: no stable tag points at HEAD after release." >&2
            exit 1
          fi
          git push origin "refs/tags/${tag}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISH_REMOTE: origin
        run: |
          version="$(git tag --points-at HEAD | grep '^v' | head -1 | sed 's/^v//')"
          if [ -z "$version" ]; then
            echo "Error: no v* tag points at HEAD after stable release." >&2
            exit 1
          fi
          ./scripts/create-github-release.sh "$version"
