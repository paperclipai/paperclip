name: Pricing Catalog Refresh

on:
  schedule:
    # Sundays at 06:00 UTC.
    - cron: '0 6 * * 0'
  workflow_dispatch:

concurrency:
  group: pricing-refresh
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Refresh pricing catalog
        run: pnpm --filter @paperclipai/pricing refresh

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- packages/pricing/data/catalog.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Pricing catalog is already up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Pricing catalog drifted; opening / updating PR."
          fi

      - name: Create or update pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/pricing-refresh
          base: master
          commit-message: 'chore(pricing): weekly catalog refresh'
          title: 'chore(pricing): weekly catalog refresh'
          body: |
            Automated weekly refresh of `packages/pricing/data/catalog.json`.

            Sources:
            - https://models.dev/api.json
            - https://raw.githubusercontent.com/BerriAI/litellm/main/litellm/model_prices_and_context_window_backup.json

            Generated by `.github/workflows/pricing-refresh.yml`. Review the diff
            to confirm no upstream schema regressions before merging.
          add-paths: |
            packages/pricing/data/catalog.json
          delete-branch: true
          labels: |
            pricing
            automated
