name: Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: The stable version to deploy (e.g., 2026.318.0)
        required: true
        type: string
      environment:
        description: The target environment (staging or production)
        required: true
        type: string
        default: staging
  workflow_run:
    workflows: ["Release"]
    types: [completed]
jobs:
  deploy-staging:
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging' ||
      github.event_name == 'workflow_run' && github.event.workflow_run.event == 'workflow_dispatch' && github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_commit.message, 'chore(release): stable')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: get_image_tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "IMAGE_TAG=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Extract version from the commit message of the workflow_run that triggered this
            # Example: "chore(release): stable 2026.318.0"
            VERSION=$(echo "${{ github.event.workflow_run.head_commit.message }}" | sed -n 's/^chore(release): stable \(.*\)/\1/p')
            echo "IMAGE_TAG=v$VERSION" >> $GITHUB_OUTPUT
          fi
      - name: Pull Docker image
        run: docker pull ghcr.io/${{ github.repository }}:${{ steps.get_image_tag.outputs.IMAGE_TAG }}

      - name: Create k8s namespace
        run: kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Staging
        run: |
          kubectl set image deployment/paperclip-staging -n staging paperclip=ghcr.io/${{ github.repository }}:${{ steps.get_image_tag.outputs.IMAGE_TAG }} --record
          kubectl rollout status deployment/paperclip-staging -n staging

      - name: Verify Staging Deployment
        run: |
          kubectl get pods -n staging -l app=paperclip
          curl -sSf http://staging.paperclip.ai/api/health

      - name: Run Staging Smoke Tests
        run: npm test
