name: Merge Automation

on:
  status: {}
  check_run:
    types: [completed]

concurrency:
  group: merge-automation-${{ github.event.commit.sha || github.event.check_run.head_sha }}
  cancel-in-progress: false

jobs:
  evaluate-merge:
    # Run on ai-review/verdict status events OR when verify/policy/review check runs complete
    if: >-
      (github.event_name == 'status' && github.event.context == 'ai-review/verdict') ||
      (github.event_name == 'check_run' && github.event.check_run.conclusion == 'success' &&
       contains(fromJSON('["verify","policy","review"]'), github.event.check_run.name))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
      statuses: read
      checks: read

    steps:
      - name: Evaluate merge conditions
        id: evaluate
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.eventName === 'status'
              ? context.payload.commit.sha
              : context.payload.check_run.head_sha;

            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });

            const pr = prs.find((candidate) => candidate.state === 'open');
            if (!pr) {
              console.log('No open PR found for this commit.');
              return;
            }

            const { data: combined } = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
            });

            const statusMap = {};
            for (const s of combined.statuses) {
              statusMap[s.context] = s.state;
            }

            const verdictStatus = combined.statuses.find(s => s.context === 'ai-review/verdict');
            if (!verdictStatus || verdictStatus.state !== 'success') {
              console.log('ai-review/verdict not yet successful.');
              return;
            }

            const description = verdictStatus.description || '';
            if (description.includes('HIGH_RISK') || description.includes('HUMAN_REQUIRED')) {
              console.log('AI review requires manual merge.');
              return;
            }

            if (description.includes('FAIL')) {
              console.log('AI review failed.');
              return;
            }

            if (!description.includes('PASS')) {
              console.log(`Unexpected ai-review/verdict description: ${description}`);
              return;
            }

            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
            });

            for (const run of checkRuns.check_runs) {
              if (run.conclusion === 'success') {
                statusMap[run.name] = 'success';
              }
            }

            const requiredChecks = ['verify', 'policy'];
            const missing = requiredChecks.filter((check) => statusMap[check] !== 'success');
            if (missing.length > 0) {
              console.log(`Missing required checks: ${missing.join(', ')}`);
              return;
            }

            const { data: fullPr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('node_id', fullPr.node_id);
            core.setOutput('mergeable_state', String(fullPr.mergeable_state || 'unknown'));
            core.setOutput('has_auto_merge', fullPr.auto_merge ? 'true' : 'false');

      - name: Update behind branch
        if: steps.evaluate.outputs.pr_number != '' && steps.evaluate.outputs.mergeable_state == 'behind'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.updateBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number('${{ steps.evaluate.outputs.pr_number }}'),
            });
            console.log('Requested branch update for behind PR.');

      - name: Enable auto-merge
        if: steps.evaluate.outputs.pr_number != '' && steps.evaluate.outputs.mergeable_state != 'behind' && steps.evaluate.outputs.mergeable_state != 'dirty' && steps.evaluate.outputs.mergeable_state != 'blocked' && steps.evaluate.outputs.mergeable_state != 'unknown' && steps.evaluate.outputs.has_auto_merge != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNodeId = '${{ steps.evaluate.outputs.node_id }}';
            if (!prNodeId) {
              core.setFailed('Missing pull request node id.');
              return;
            }
            await github.graphql(
              `mutation EnableAutoMerge($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }) {
                  pullRequest { number }
                }
              }`,
              { pullRequestId: prNodeId },
            );
            console.log(`Enabled auto-merge for PR #${{ steps.evaluate.outputs.pr_number }}`);
