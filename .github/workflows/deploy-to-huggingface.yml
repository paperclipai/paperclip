name: Deploy Paperclip to Hugging Face

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: paperclip-hf-space-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Hugging Face uploader
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade huggingface_hub hf_xet

      - name: Prepare complete Space upload folder
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil

          root = Path.cwd()
          out = root / "hf_space_upload"
          if out.exists():
              shutil.rmtree(out)

          blocked_names = {
              ".git",
              "node_modules",
              "hf_space_upload",
              ".next",
              ".cache",
              ".turbo",
              "coverage",
              "playwright-report",
              "test-results",
          }

          def ignore(_dir, names):
              ignored = set()
              for name in names:
                  if name in blocked_names:
                      ignored.add(name)
                  if name.endswith(".log"):
                      ignored.add(name)
              return ignored

          shutil.copytree(root, out, ignore=ignore)
          (out / "README.md").write_text(
              "---\n"
              "title: Paperclip AI Company\n"
              "emoji: 🧠\n"
              "colorFrom: blue\n"
              "colorTo: purple\n"
              "sdk: docker\n"
              "app_port: 8080\n"
              "---\n",
              encoding="utf-8",
          )
          print("Prepared complete Space upload folder")
          PY

      - name: Upload folder to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN")
          repo_id = os.environ.get("HF_SPACE")
          if not token:
              raise SystemExit("Missing GitHub secret: HF_TOKEN")
          if not repo_id:
              raise SystemExit("Missing GitHub secret: HF_SPACE")

          api = HfApi(token=token)
          api.upload_folder(
              folder_path="hf_space_upload",
              repo_id=repo_id,
              repo_type="space",
              delete_patterns=["*"],
              commit_message="Deploy Paperclip control room from GitHub Actions",
          )
          print(f"Uploaded complete Paperclip Space files to {repo_id}")
          PY
