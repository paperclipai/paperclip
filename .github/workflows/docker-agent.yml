name: Docker (agent base)

# Builds the paperclip-agent base image — the paperclip server image with
# build-essential + Go + Rust + Python dev + Docker CLI + kubectl + helm +
# kind + kubelogin layered on top. Used as the container image for agent
# Job pods (set via the adapter's `config.image`); the heavy toolchain
# stays out of the paperclip-server image.
#
# Triggered after the main Docker workflow lands a server image with the
# matching sha — `workflow_run` ensures we always build paperclip-agent on
# top of a server image that actually exists in the registry.

on:
  workflow_run:
    workflows: ["Docker"]
    types: [completed]
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    timeout-minutes: 30
    concurrency:
      group: docker-agent-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # On workflow_run the default ref is the workflow file's branch,
          # not the head SHA of the triggering run. Pin to the SHA the
          # server build actually used so paperclip-agent's `sha-...` tag
          # tracks 1:1 with the matching paperclip-server tag.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Login to Harbor
        uses: docker/login-action@v4
        with:
          registry: harbor.blockcast.net
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # Dockerfile.agent's `COPY --from=registry.blockcast.net/blockcast/
      # pim-multicast-gateway/ffmpeg-publisher@sha256:...` (BLO-8717/BLO-8719)
      # pulls the moq_mmt ffmpeg build from the LAN-local cache registry. That
      # digest is published to registry.blockcast.net + Docker Hub but is NOT
      # replicated to harbor.blockcast.net, so the COPY would 404 without this
      # login. Same (HARBOR_USERNAME, HARBOR_PASSWORD) pair authenticates both
      # Harbor hostnames — mirrors pim-multicast-gateway e2e-codec-matrix.yml.
      - name: Login to registry.blockcast.net (LAN-local cache)
        uses: docker/login-action@v4
        with:
          registry: registry.blockcast.net
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          # Same rationale as docker.yml — ephemeral builder per run so a
          # corrupt content-store blob can't propagate across builds. The
          # agent buildcache (paperclip-agent:buildcache) hasn't surfaced
          # the same `short read` symptom yet, but it's the same runner +
          # same persistent-builder pattern, so apply the fix preemptively.
          cleanup: true

      - name: Resolve build SHA
        id: sha
        env:
          TRIGGERING_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -e
          short=$(printf '%s' "$TRIGGERING_SHA" | cut -c1-7)
          echo "short=${short}" >> "$GITHUB_OUTPUT"

      # Mirror the server image's tag scheme: `sha-<7>-k8s-vendored` per
      # commit + `latest-k8s-vendored` floating tag on master. The
      # adapter's `config.image` will pin a specific sha tag; `latest` is
      # for ad-hoc pulls and devbox parity.
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            harbor.blockcast.net/paperclip-agent/paperclip-agent
          tags: |
            type=raw,value=sha-${{ steps.sha.outputs.short }}-k8s-vendored
            type=raw,value=latest-k8s-vendored,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.agent
          platforms: linux/amd64
          push: true
          # Pin BASE_IMAGE to the just-built server image at this exact sha
          # so paperclip-agent:sha-<X> always extends paperclip:sha-<X>.
          # Falling back to `latest` here would race with concurrent server
          # builds and produce drifted layers.
          #
          # Pulled from harbor (not zot) — the zot/Ceph RGW backend
          # truncates some small blobs (e.g. 32B FROM-layer descriptors)
          # to 0 bytes on GET, producing `short read: expected N bytes
          # but got 0: unexpected EOF` at FROM resolution. Harbor serves
          # the same blobs correctly. Phase B cutover (BLO-5717) already
          # parallel-pushes the server image to both registries, so the
          # sha tag exists on harbor when this workflow runs.
          build-args: |
            BASE_IMAGE=harbor.blockcast.net/paperclip/paperclip:sha-${{ steps.sha.outputs.short }}-k8s-vendored
          # Same containerd-EOF-on-attestation-manifest reasoning as the
          # server image's Docker workflow.
          provenance: false
          sbom: false
          # Registry-backed cache on harbor (was zot pre-2026-05-17;
          # moved alongside BASE_IMAGE so any small cache blob can't
          # trip the same Ceph RGW zero-byte truncation that the FROM
          # blob hit).
          cache-from: type=registry,ref=harbor.blockcast.net/paperclip-agent/paperclip-agent:buildcache-v6
          cache-to: type=registry,ref=harbor.blockcast.net/paperclip-agent/paperclip-agent:buildcache-v6,mode=max,image-manifest=true,oci-mediatypes=true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # BLO-4141: Auto-bump per-agent adapter_config.image so the freshly
      # built tag actually lands on running agents. Without this, the new
      # image sits in harbor unused until an operator manually PATCHes each
      # agent — the gap that silently no-op'd the BLO-6151 wake-pre-flight
      # rollout for three days in May 2026.
      #
      # The server endpoint owns the policy (eligibility filter, in-flight
      # skip, audit-log write, retry-on-completion stashing); this step is
      # just a thin curl. Skipped on manual workflow_dispatch so an operator
      # can rebuild without bumping (e.g. testing image build changes).
      #
      # Security note: all values interpolated into the run block come from
      # GH-controlled sources only — `vars.PAPERCLIP_API_URL` (operator var),
      # `secrets.PAPERCLIP_BOARD_TOKEN` (secret), `steps.sha.outputs.short`
      # (7 hex chars from a commit SHA), and `github.event.workflow_run.head_sha`
      # (commit SHA, hex-only). No user-controlled strings (issue titles,
      # commit messages, refs, etc.) reach the shell, so workflow-injection
      # vectors don't apply here.
      #
      # Requires GH repo secret PAPERCLIP_BOARD_TOKEN — a board-tier token
      # with agents:create permission for the production company. If unset,
      # the step warns and exits 0 so a missing secret doesn't break the
      # build; the prior manual-bump workflow remains intact.
      - name: Bump agent image refs in cluster
        if: github.event_name != 'workflow_dispatch'
        env:
          PAPERCLIP_API: ${{ vars.PAPERCLIP_API_URL || 'https://paperclip.blockcast.net' }}
          # Must be a paperclip BOARD token (pcp_board_…) — /admin/agents/bump-agent-image
          # rejects anything whose actor.type != "board" with 403. This is a
          # DIFFERENT credential from PAPERCLIP_BOARD_TOKEN, which #294 repurposed
          # to a GitHub PAT for the private kkroo/* vendor clones in Dockerfile;
          # a GitHub PAT is not a valid paperclip bearer, so the two cannot share
          # one secret. Mint via POST /api/service-account-tokens (instance-admin).
          PAPERCLIP_BUMP_TOKEN: ${{ secrets.PAPERCLIP_AGENT_BUMP_TOKEN }}
          NEW_IMAGE_SHORT: ${{ steps.sha.outputs.short }}
          BUILD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          # Production company id for Blockcast :: CEO. If we add more
          # companies, refactor the endpoint to take a list (or call it N
          # times here); single POST for now.
          COMPANY_ID: aaced805-3491-4ee5-9b14-cdf70cb81d47
        run: |
          set -euo pipefail
          if [ -z "${PAPERCLIP_BUMP_TOKEN:-}" ]; then
            echo "::warning::PAPERCLIP_AGENT_BUMP_TOKEN not set; skipping agent image bump (manual operator PATCH still required)"
            exit 0
          fi
          NEW_IMAGE="harbor.blockcast.net/paperclip-agent/paperclip-agent:sha-${NEW_IMAGE_SHORT}-k8s-vendored"
          response=$(mktemp)
          http=$(curl -sS -o "$response" -w "%{http_code}" \
            -X POST "${PAPERCLIP_API}/api/admin/agents/bump-agent-image" \
            -H "Authorization: Bearer ${PAPERCLIP_BUMP_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg image "$NEW_IMAGE" --arg sha "$BUILD_SHA" --arg cid "$COMPANY_ID" '
              { companyId: $cid, image: $image, source: "ci:docker-agent.yml", buildSha: $sha }
            ')")
          echo "HTTP $http"
          jq '.' "$response" || cat "$response"
          if [ "$http" != "200" ]; then
            echo "::error::bump-agent-image returned HTTP $http"
            exit 1
          fi
          echo "Bumped: $(jq -r '.bumped | length' "$response") agents"
          echo "Skipped: $(jq -r '.skipped | length' "$response") agents (will auto-retry on next run completion)"
          echo "Already on target: $(jq -r '.unchanged | length' "$response") agents"
