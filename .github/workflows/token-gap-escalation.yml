name: Token-Gap Escalation Routine

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  token_gap_escalation:
    name: Scan and escalate token-gap blocked issues
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run token gap escalation
        env:
          PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
          PAPERCLIP_COMPANY_ID: ${{ secrets.PAPERCLIP_COMPANY_ID }}
          PAPERCLIP_RUN_ID: ${{ github.run_id }}
        run: python3 scripts/token_gap_escalation.py
