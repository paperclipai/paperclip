name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      skip_llm:
        description: "Skip LLM-dependent assertions (default: true)"
        type: boolean
        default: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PAPERCLIP_E2E_SKIP_LLM: ${{ inputs.skip_llm && 'true' || 'false' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # GitHub-hosted ubuntu-latest runners already ship Google Chrome + Chromium.
      # Use the system Chrome channel instead of downloading browsers from the
      # Playwright CDN, which hangs on extraction.
      PLAYWRIGHT_CHROMIUM_CHANNEL: chrome
      PLAYWRIGHT_BROWSERS_PATH: 0
      PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS: 1

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Chromium system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          timeout 120 bash -c '
            sudo apt-get update -qq
            sudo apt-get install -y -qq --no-install-recommends \
              libnss3 libnspr4 libatk1.0-0t64 libatk-bridge2.0-0 \
              libcups2t64 libdrm2 libdbus-1-3 libxkbcommon0 \
              libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
              libgbm1 libpango-1.0-0 libcairo2 libasound2t64 \
              libatspi2.0-0 libwayland-client0
          ' || echo "WARNING: system-deps install timed out; continuing"
        shell: bash

      - run: pnpm build
      - run: pnpm run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 14
