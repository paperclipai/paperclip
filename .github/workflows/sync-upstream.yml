name: Sync Upstream
on:
  schedule:
    - cron: "0 8 * * 1" # Cada lunes a las 8:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Sync master from upstream
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git remote add upstream https://github.com/paperclipai/paperclip.git || true
          git fetch upstream
          git checkout master
          git merge upstream/master --no-edit || echo 'Merge conflicts need manual review'
          git push origin master
