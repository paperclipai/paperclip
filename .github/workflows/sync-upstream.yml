name: Sync with Upstream

on:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync fork with upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve upstream config
        id: config
        run: |
          UPSTREAM_URL="${{ vars.UPSTREAM_URL }}"
          UPSTREAM_BRANCH="${{ vars.UPSTREAM_BRANCH }}"

          if [ -z "$UPSTREAM_URL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "UPSTREAM_URL is not configured. Skipping sync."
            exit 0
          fi

          if [ -z "$UPSTREAM_BRANCH" ]; then
            UPSTREAM_BRANCH="main"
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "url=$UPSTREAM_URL" >> "$GITHUB_OUTPUT"
          echo "branch=$UPSTREAM_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Add upstream remote
        if: steps.config.outputs.skip == 'false'
        run: |
          git remote add upstream "${{ steps.config.outputs.url }}" || git remote set-url upstream "${{ steps.config.outputs.url }}"

      - name: Fetch upstream
        id: fetch
        if: steps.config.outputs.skip == 'false'
        run: |
          if git fetch upstream --no-tags; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "Unable to fetch upstream. Skipping sync."
          fi

      - name: Check for new commits
        if: steps.config.outputs.skip == 'false' && steps.fetch.outputs.ok == 'true'
        id: check
        run: |
          UPSTREAM_BRANCH="${{ steps.config.outputs.branch }}"
          BEHIND=$(git rev-list HEAD..upstream/$UPSTREAM_BRANCH --count 2>/dev/null || echo "0")
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "upstream_branch=$UPSTREAM_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create sync PR if upstream has new commits
        if: steps.config.outputs.skip == 'false' && steps.fetch.outputs.ok == 'true' && steps.check.outputs.behind != '0'
        run: |
          UPSTREAM_BRANCH="${{ steps.check.outputs.upstream_branch }}"
          SYNC_BRANCH="chore/sync-upstream-${GITHUB_RUN_ID}"
          BEHIND="${{ steps.check.outputs.behind }}"
          UPSTREAM_URL="${{ steps.config.outputs.url }}"

          git checkout -B "$SYNC_BRANCH"
          if ! git merge "upstream/$UPSTREAM_BRANCH" --no-edit --allow-unrelated-histories; then
            echo "Merge conflict detected while syncing upstream."
            git merge --abort || true
            exit 0
          fi

          git push origin "$SYNC_BRANCH" --force-with-lease

          gh pr create \
            --title "chore: sync with upstream ($BEHIND new commits)" \
            --body "Automated upstream sync from $UPSTREAM_URL ($UPSTREAM_BRANCH). This branch is $BEHIND commits behind upstream." \
            --base main \
            --head "$SYNC_BRANCH" 2>/dev/null || echo "PR already exists or no changes to push"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No sync needed
        if: steps.config.outputs.skip == 'false' && steps.fetch.outputs.ok == 'true' && steps.check.outputs.behind == '0'
        run: echo "Already up to date with upstream."

      - name: Upstream unreachable
        if: steps.config.outputs.skip == 'false' && steps.fetch.outputs.ok != 'true'
        run: echo "Upstream fetch failed. Workflow exits without syncing."
