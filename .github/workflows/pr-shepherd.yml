name: PR-Shepherd

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  evaluate:
    name: Evaluate Safety Status
    permissions:
      contents: read
      pull-requests: read
      statuses: read
      checks: read
    # Run evaluation on standard PR events, but not when triggered by the act of labeling
    if: github.event.action != 'labeled'
    runs-on: ubuntu-latest
    steps:
      - name: Check out base branch (Secure Checkout)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install --require-hashes -r requirements.txt; fi

      - name: Run Shepherd Evaluation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_PROVIDER: "anthropic"
          GITHUB_REPOSITORY: ${{ github.repository }}
          SHEPHERD_DRY_RUN: "false"
          SHEPHERD_AUTO_MERGE: "false" # Only evaluate and comment, never merge
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -f pr_shepherd/main.py ]; then
            python pr_shepherd/main.py --pr-number "$EVENT_PR_NUMBER"
          else
            echo "PR-Shepherd engine not found on the base branch yet (pre-merge). Skipping execution."
          fi

  act:
    name: Act on Approved PR
    permissions:
      contents: write
      pull-requests: write
      statuses: read
      checks: read
    # Gated strictly to shepherd:merge labels applied by human Users
    if: |
      github.event.action == 'labeled' &&
      github.event.label.name == 'shepherd:merge' &&
      github.event.sender.type == 'User'
    runs-on: ubuntu-latest
    steps:
      - name: Check out base branch (Secure Checkout)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install --require-hashes -r requirements.txt; fi

      - name: Run Shepherd Merge Action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_PROVIDER: "anthropic"
          GITHUB_REPOSITORY: ${{ github.repository }}
          SHEPHERD_DRY_RUN: "false"
          SHEPHERD_AUTO_MERGE: "true" # Merge allowed under this privileged act workflow
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          ACTOR_USERNAME: ${{ github.event.sender.login }}
        run: |
          if [ -f pr_shepherd/main.py ]; then
            python pr_shepherd/main.py --pr-number "$EVENT_PR_NUMBER" --verify-actor "$ACTOR_USERNAME"
          else
            echo "PR-Shepherd engine not found on the base branch yet. Skipping."
          fi
