name: Refresh Lockfile

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: refresh-lockfile-master
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Refresh pnpm lockfile
        run: pnpm install --lockfile-only --ignore-scripts --no-frozen-lockfile

      - name: Fail on unexpected file changes
        run: |
          changed="$(git status --porcelain)"
          if [ -z "$changed" ]; then
            echo "Lockfile is already up to date."
            exit 0
          fi
          if printf '%s\n' "$changed" | grep -Fvq ' pnpm-lock.yaml'; then
            echo "Unexpected files changed during lockfile refresh:"
            echo "$changed"
            exit 1
          fi

      # Always publish the refreshed lockfile to the shared branch first, using
      # the default GITHUB_TOKEN (contents:write is allowed; only PR *create* is
      # blocked org-wide). This guarantees the branch exists for either the App
      # token path below or the out-of-band backstop routine (NEO-541), so a
      # refresh never silently evaporates.
      - name: Push refreshed lockfile branch
        id: push
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "Lockfile unchanged, nothing to do."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="chore/refresh-lockfile"
          git config user.name "lockfile-bot"
          git config user.email "lockfile-bot@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add pnpm-lock.yaml
          git commit -m "chore(lockfile): refresh pnpm-lock.yaml"
          git push --force origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # The org disables PR creation via the default GITHUB_TOKEN
      # ("GitHub Actions is not permitted to create or approve pull requests").
      # Mint a short-lived commitperclip App installation token instead — App
      # tokens are exempt from that restriction and the app already has
      # contents:write + pull_requests:write. A PR opened by an App token (unlike
      # GITHUB_TOKEN) also triggers the required PR checks, so auto-merge can
      # actually satisfy them. Uses the existing COMMITPERCLIP_KEY repo secret.
      # Non-fatal: if the secret is absent the branch is already pushed and the
      # backstop routine (NEO-541) opens the PR out-of-band, so CI stays green.
      - name: Generate commitperclip token
        id: token
        if: steps.push.outputs.pushed == 'true'
        continue-on-error: true
        run: |
          TOKEN=$(node .github/scripts/get-bot-token.mjs)
          echo "::add-mask::$TOKEN"
          echo "value=$TOKEN" >> "$GITHUB_OUTPUT"
        env:
          COMMITPERCLIP_KEY: ${{ secrets.COMMITPERCLIP_KEY }}

      - name: Create or update pull request
        id: upsert-pr
        if: steps.token.outputs.value != ''
        env:
          GH_TOKEN: ${{ steps.token.outputs.value }}
          REPO_OWNER: ${{ github.repository_owner }}
          BRANCH: ${{ steps.push.outputs.branch }}
        run: |
          # Only reuse an open PR from this repository owner, not a fork with the same branch name.
          pr_url="$(
            gh pr list --state open --head "$BRANCH" --json url,headRepositoryOwner \
              --jq ".[] | select(.headRepositoryOwner.login == \"$REPO_OWNER\") | .url" |
            head -n 1
          )"
          if [ -z "$pr_url" ]; then
            pr_url="$(gh pr create \
              --head "$BRANCH" \
              --title "chore(lockfile): refresh pnpm-lock.yaml" \
              --body "Auto-generated lockfile refresh after dependencies changed on master. This PR only updates pnpm-lock.yaml.")"
            echo "Created new PR: $pr_url"
          else
            echo "PR already exists: $pr_url"
          fi
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge for lockfile PR
        if: steps.upsert-pr.outputs.pr_url != ''
        env:
          GH_TOKEN: ${{ steps.token.outputs.value }}
        run: |
          gh pr merge --auto --squash --delete-branch "${{ steps.upsert-pr.outputs.pr_url }}"

      # If the branch was pushed but no App token was available (COMMITPERCLIP_KEY
      # unset), leave a loud, actionable trail. The Gene backstop routine (NEO-541)
      # opens/merges the PR out-of-band; this keeps the job green without hiding the
      # fact that CI-native PR creation is degraded until the secret is added.
      - name: Note out-of-band PR handoff
        if: steps.push.outputs.pushed == 'true' && steps.token.outputs.value == ''
        run: |
          echo "::warning title=Lockfile PR handed to backstop::Branch '${{ steps.push.outputs.branch }}' was pushed but no commitperclip App token was available (COMMITPERCLIP_KEY unset). The out-of-band backstop routine (NEO-541) will open/merge the PR. Add the COMMITPERCLIP_KEY repo secret to restore CI-native PR creation."
