name: Set HubSpot Env Vars on Hostinger VPS

on:
  workflow_dispatch:
    inputs:
      hubspot_access_token:
        description: "CREWBRIEF_HUBSPOT_ACCESS_TOKEN"
        required: false
        type: string
      hubspot_email_sending:
        description: "CREWBRIEF_HUBSPOT_EMAIL_SENDING"
        required: false
        default: "true"
        type: string

jobs:
  set-env-vars:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Set HubSpot env vars on VPS
        run: |
          TOKEN="${{ inputs.hubspot_access_token || secrets.CREWBRIEF_HUBSPOT_ACCESS_TOKEN }}"
          if [ -z "$TOKEN" ]; then
            echo "Error: No CREWBRIEF_HUBSPOT_ACCESS_TOKEN provided. Pass as input or set as GitHub secret."
            exit 1
          fi

          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << EOF
            cd /opt/paperclip
            if grep -q "^CREWBRIEF_HUBSPOT_ACCESS_TOKEN=" .env; then
              sed -i "s|^CREWBRIEF_HUBSPOT_ACCESS_TOKEN=.*|CREWBRIEF_HUBSPOT_ACCESS_TOKEN=$TOKEN|" .env
            else
              echo "CREWBRIEF_HUBSPOT_ACCESS_TOKEN=$TOKEN" >> .env
            fi
            if grep -q "^CREWBRIEF_HUBSPOT_EMAIL_SENDING=" .env; then
              sed -i "s|^CREWBRIEF_HUBSPOT_EMAIL_SENDING=.*|CREWBRIEF_HUBSPOT_EMAIL_SENDING=$SENDING|" .env
            else
              echo "CREWBRIEF_HUBSPOT_EMAIL_SENDING=$SENDING" >> .env
            fi
            docker compose -f docker/docker-compose.yml up -d server
          EOF
        env:
          TOKEN: ${{ inputs.hubspot_access_token || secrets.CREWBRIEF_HUBSPOT_ACCESS_TOKEN }}
          SENDING: ${{ inputs.hubspot_email_sending }}

      - name: Verify deployment
        run: |
          echo "HubSpot env vars set on Hostinger VPS. Server container restarted."
          echo "Next: verify by checking https://crewbrief.avva.aero/api/crewbrief/health"
