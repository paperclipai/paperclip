name: Deploy CrewBrief API

# NOTE: CrewBrief is deployed on the Hostinger VPS via nginx → Paperclip server (port 3100).
# This Railway workflow is NOT the active deployment path.
# The Railway service "crewbrief-api" has not been created in the Railway dashboard.
# Keep as workflow_dispatch-only in case Railway deployment is set up in the future.

on:
  workflow_dispatch:

concurrency:
  group: deploy-crewbrief-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service crewbrief-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
