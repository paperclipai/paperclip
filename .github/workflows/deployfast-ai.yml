name: DeployFast AI CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: The version to deploy (e.g., 2026.318.0)
        required: true
        type: string
      environment:
        description: The target environment (staging or production)
        required: true
        type: string
        default: staging

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Validate configuration
      run: npm run typecheck

  build-and-test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Run unit tests
      run: npm test

    - name: Run AI model validation tests
      run: npm test

    - name: Build Docker image
      run: docker build -t ghcr.io/${{ github.repository }}:${{ github.sha }} .

  deploy-staging:
    needs: build-and-test
    if: github.event.inputs.environment == 'staging' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push Docker image
      run: docker push ghcr.io/${{ github.repository }}:${{ github.sha }}

    - name: Deploy to Staging
      run: echo "Deploying ghcr.io/${{ github.repository }}:${{ github.sha }} to staging"
      # Placeholder for actual deployment commands to staging environment

    - name: Run smoke tests
      run: npm test

  deploy-production:
    needs: [build-and-test, deploy-staging]
    if: github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Tag production image
      run: |
        docker pull ghcr.io/${{ github.repository }}:${{ github.sha }}
        docker tag ghcr.io/${{ github.repository }}:${{ github.sha }} ghcr.io/${{ github.repository }}:v${{ github.event.inputs.version }}

    - name: Push production image
      run: docker push ghcr.io/${{ github.repository }}:v${{ github.event.inputs.version }}

    - name: Deploy to Production
      run: echo "Deploying ghcr.io/${{ github.repository }}:v${{ github.event.inputs.version }} to production"
      # Placeholder for actual deployment commands to production environment

    - name: Run production validation
      run: npm test

    - name: Notify team
      run: echo "Deployment to production completed successfully"
      # Placeholder for actual notification command (Slack/email/etc)