name: DeployFast AI CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: The version to deploy (e.g., 2026.318.0)
        required: true
        type: string
      environment:
        description: The target environment (staging or production)
        required: true
        type: string
        default: staging

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Validate configuration
      run: npm run typecheck

    - name: Run linting
      run: npm run lint

    - name: Run security audit
      run: npm audit --audit-level=high

  build-and-test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Run unit tests
      run: npm test:unit

    - name: Run integration tests
      run: npm test:integration

    - name: Run AI model validation tests
      run: npm test:model

    - name: Build Docker image
      run: docker build -t ghcr.io/${{ github.repository }}:${{ github.sha }} .

    - name: Scan Docker image
      run: docker scan --file Dockerfile --severity high

  deploy-staging:
    needs: build-and-test
    if: github.event.inputs.environment == 'staging' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push Docker image
      run: docker push ghcr.io/${{ github.repository }}:${{ github.sha }}

    - name: Create staging namespace
      run: kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy to Staging
      run: |
        echo "Deploying ghcr.io/${{ github.repository }}:${{ github.sha }} to staging"
        kubectl apply -f k8s/staging/deployment.yaml --record
        kubectl rollout status deployment/paperclip-staging -n staging

    - name: Verify staging deployment
      run: |
        kubectl get pods -n staging -l app=paperclip
        curl -sSf http://staging.paperclip.ai/api/health

    - name: Run smoke tests
      run: npm test

  deploy-production:
    needs: [build-and-test, deploy-staging]
    if: github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Tag production image
      run: |
        docker pull ghcr.io/${{ github.repository }}:${{ github.sha }}
        docker tag ghcr.io/${{ github.repository }}:${{ github.sha }} ghcr.io/${{ github.repository }}:v${{ github.event.inputs.version }}

    - name: Push production image
      run: docker push ghcr.io/${{ github.repository }}:v${{ github.event.inputs.version }}

    - name: Deploy canary
      run: |
        echo "Deploying canary (10% traffic) for v${{ github.event.inputs.version }}"
        kubectl apply -f k8s/production/canary.yaml --record
        kubectl rollout status deployment/paperclip-canary -n production
        sleep 60

    - name: Verify canary metrics
      run: |
        kubectl get pods -n production -l app=paperclip,track=canary
        curl -sSf http://canary.paperclip.ai/api/health

    - name: Full production rollout
      if: success()
      run: |
        echo "Rolling out v${{ github.event.inputs.version }} to 100% traffic"
        kubectl set image deployment/paperclip-production -n production paperclip=ghcr.io/${{ github.repository }}:v${{ github.event.inputs.version }} --record
        kubectl rollout status deployment/paperclip-production -n production

    - name: Rollback if needed
      if: failure()
      run: |
        echo "Rolling back due to canary failure"
        kubectl rollout undo deployment/paperclip-production -n production
        kubectl rollout status deployment/paperclip-production -n production
        exit 1

    - name: Run production validation
      run: npm test:production

    - name: Setup monitoring
      run: |
        kubectl apply -f k8s/production/monitoring.yaml
        curl -sSf http://monitoring.paperclip.ai/api/health

    - name: Notify team
      run: |
        echo "Deployment to production completed successfully"
        # Actual notification command (Slack/email/etc)
        curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"DeployFast AI v${{ github.event.inputs.version }} deployed to production"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}