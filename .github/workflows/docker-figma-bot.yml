name: Docker (figma-bot)

# Builds + pushes the paperclip-figma-bot image. Does NOT auto-deploy
# — the cluster yaml at onprem-k8s/paperclip/figma-designer-bot.yaml
# pins a specific sha-tag and updating it is a separate operator step.
#
# IMPORTANT: figma-bot's Dockerfile inherits FROM
# harbor.blockcast.net/paperclip-webflow-bot/webflow-bot:latest. The
# webflow-bot image MUST exist in Harbor before this workflow can
# succeed. PR 1 (BLO-6870) added the docker-webflow-bot.yml workflow
# that publishes that base image.
#
# Trigger: any change under packages/services/figma-bot/.
#
# - pull_request: runs ONLY the `test` job (ruff + pytest) so PRs get
#   gated before merge. Closes the gap that bit PR #173 on 2026-05-25:
#   PR-level CI did not include this workflow, so a ruff I001 violation
#   merged green but blocked the post-merge image rebuild in 1m3s.
#   build-and-push is gated on `github.event_name != pull_request`
#   so forks (which lack HARBOR_PASSWORD) cannot 401 attempting to push.
# - push to master or figma-bot-v* tags: runs both jobs.
# - workflow_dispatch: manually fires both jobs from any ref.
#
# Security: this workflow does NOT interpolate any untrusted event input
# (github.event.*, github.head_ref, etc.) into run: commands. The only
# secrets used are HARBOR_USERNAME/HARBOR_PASSWORD via env (build-and-push
# job only). Same posture as docker-webflow-bot.yml. Adding pull_request
# does NOT expose secrets to fork PRs because the `if:` gate on
# build-and-push prevents that job from running on pull_request events.

on:
  push:
    branches:
      - "master"
    paths:
      - "packages/services/figma-bot/**"
      - ".github/workflows/docker-figma-bot.yml"
    tags:
      - "figma-bot-v*"
  pull_request:
    paths:
      - "packages/services/figma-bot/**"
      - ".github/workflows/docker-figma-bot.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dev dependencies
        working-directory: packages/services/figma-bot
        run: |
          python -m pip install --upgrade pip
          # Install only dev/test deps; structural + cold-boot regression
          # tests run via AST and don't actually import camoufox / playwright.
          python -m pip install pytest pytest-cov ruff mypy

      - name: Run ruff lint
        working-directory: packages/services/figma-bot
        run: ruff check src/ tests/

      - name: Run pytest
        working-directory: packages/services/figma-bot
        run: pytest tests/ -v

  build-and-push:
    # Skip the push step on pull_request events. Forks don't have
    # HARBOR_PASSWORD, and even same-repo PRs shouldn't push transient
    # sha tags pre-merge — `test` is the PR gate; push fires post-merge
    # on the master push event.
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: self-hosted
    timeout-minutes: 30
    concurrency:
      group: docker-figma-bot-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean stale node_modules from runner workspace
        run: |
          find . -name node_modules -type d -prune -exec rm -rf {} + 2>/dev/null || true
          find . -name node_modules -type l -exec rm -f {} + 2>/dev/null || true

      - name: Login to Harbor
        uses: docker/login-action@v4
        with:
          registry: harbor.blockcast.net
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          cleanup: true

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            harbor.blockcast.net/paperclip-figma-bot/figma-bot
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/services/figma-bot/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          cache-from: type=registry,ref=harbor.blockcast.net/paperclip-figma-bot/figma-bot:buildcache-v1
          cache-to: type=registry,ref=harbor.blockcast.net/paperclip-figma-bot/figma-bot:buildcache-v1,mode=max,image-manifest=true,oci-mediatypes=true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
