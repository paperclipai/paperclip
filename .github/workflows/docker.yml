name: Docker

on:
  push:
    branches:
      - "master"
    tags:
      - "v*"
  workflow_call:
    inputs:
      ref:
        description: Git ref (tag or SHA) to build. Required for callers; push events use github.ref.
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: docker-${{ inputs.ref || github.ref }}
      cancel-in-progress: true
    steps:
      # Reusable-workflow callers supply an arbitrary `ref`. Only trusted refs
      # get built and pushed with `packages: write`, so refuse anything that is
      # not a stable `v*` tag or a full 40-char commit SHA before checkout.
      - name: Validate ref input
        if: inputs.ref != ''
        env:
          REF: ${{ inputs.ref }}
        run: |
          if [[ ! "$REF" =~ ^v[0-9] && ! "$REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Refusing to build from untrusted ref '$REF'. Expected a v* tag or a full commit SHA." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ inputs.ref == '' && github.ref_type == 'branch' }}
            type=raw,value=${{ inputs.ref }},enable=${{ inputs.ref != '' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
