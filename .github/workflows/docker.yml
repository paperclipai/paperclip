name: Docker

on:
  # Urgent path: manual dispatch deploys master tip immediately, bypassing
  # the 6h debounce below. Commit messages containing "[deploy]" do the
  # same on push.
  workflow_dispatch:
  push:
    branches:
      - "master"
    tags:
      - "v*"
  # Batched deploy window (BLO-12563): per-merge pushes only BUILD; the
  # deploy job debounces rollouts to at most one per 6h so the worker STS
  # stops churning and stranding in-flight agent runs (process_lost).
  # This cron is the catch-up that rolls out whatever master accumulated.
  schedule:
    - cron: "37 */6 * * *"

permissions:
  contents: read
  # Lets us use GITHUB_TOKEN as a ghcr.io pull credential below, which
  # bypasses the anonymous-pull rate limit ghcr.io enforces. Buildkit
  # only reads `FROM ghcr.io/...` lines (e.g. github-mcp-server), it
  # doesn't push anything, so read scope is enough.
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    # Push-only: schedule/workflow_dispatch runs deploy the per-commit tag a
    # prior push build already put in Harbor (the deploy job verifies it
    # exists before rolling).
    if: ${{ github.event_name == 'push' }}
    runs-on: arc-deploy
    timeout-minutes: 90
    concurrency:
      group: docker-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Self-hosted runner reuses its workspace across builds. A previous
      # build (or a developer session sharing the same checkout dir) may
      # leave packages/*/node_modules with pnpm symlinks pointing at
      # ../../../node_modules/.pnpm/...; `git clean -ffdx` in checkout
      # does not always clear them, and BuildKit's context walker follows
      # those symlinks before applying .dockerignore rules — failing with
      # `short read: unexpected EOF`. Pre-nuke any node_modules so the
      # Docker context is clean.
      - name: Clean stale node_modules from runner workspace
        run: |
          find . -name node_modules -type d -prune -exec rm -rf {} + 2>/dev/null || true
          find . -name node_modules -type l -exec rm -f {} + 2>/dev/null || true

      # Harbor is the push target. Configure via HARBOR_USERNAME +
      # HARBOR_PASSWORD secrets in the Blockcast org Settings (org-wide
      # visibility=all, backed by the pusher-cluster Harbor robot).
      # Cluster pulls exclusively from harbor.blockcast.net; ghcr.io
      # mirroring was removed because nothing in the deploy path consumes it.
      - name: Login to Harbor
        uses: docker/login-action@v4
        with:
          registry: harbor.blockcast.net
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # github-mcp-server is pulled from ghcr.io as part of the multi-stage
      # build (Dockerfile FROM ghcr.io/github/github-mcp-server:vX.Y.Z).
      # Anonymous ghcr.io pulls share a low rate limit pool that has been
      # tripping master builds with `failed to fetch oauth token: denied`.
      # Authenticated pulls use the per-repo limit which is high enough.
      - name: Login to ghcr.io for base-image pulls
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          # Tear the builder down at end-of-job so a corrupt content-store
          # blob can't survive into the next run. Commit 822ebd0 bumped
          # buildcache v2->v3 after the same `short read: expected
          # 29780174 bytes but got 0: unexpected EOF` symptom — that fix
          # held until v3 itself accumulated the same bad blob and master
          # builds started failing again with the identical byte count.
          # The persistent docker-container builder + registry cache
          # combination is what carries the corruption forward; an
          # ephemeral builder per run breaks the loop.
          cleanup: true

      # Tag scheme matches values.blockcast.yaml's expectation:
      #   - `sha-<7>-k8s-vendored` per-commit tag the deploy step pins to
      #   - `latest-k8s-vendored` floating tag for ad-hoc pulls
      # The `-k8s-vendored` suffix marks a kkroo-fork build (vendored
      # adapter tarballs + ccrotate kkroo patch baked in via the
      # Dockerfile's `COPY vendor/*` lines).
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            harbor.blockcast.net/paperclip/paperclip
          tags: |
            type=sha,prefix=sha-,suffix=-k8s-vendored,format=short
            type=raw,value=latest-k8s-vendored,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          # Skip SBOM + provenance attestations. v6 adds them by default,
          # which makes the registry serve an OCI image index with
          # attestation-manifest entries containing very small blobs (550–750
          # bytes). The blockcast cluster's containerd sometimes EOFs on
          # those (`short read: expected 750 bytes but got 0`), causing
          # ImagePullBackOff after a deploy. Plain image manifests pull
          # cleanly. Re-enable once the registry / containerd path can
          # reliably serve attestation manifests.
          provenance: false
          sbom: false
          # Registry-backed cache instead of GHA cache. The GHA backend
          # bottlenecked on a single ~675 s layer upload (full export 720+ s
          # vs. ~74 s for the actual build+push). Self-hosted runner has
          # LAN-speed access to the Blockcast registry, so storing the
          # buildcache image alongside the app image stays on-LAN, has no
          # GHA quota, and matches mode=max behavior. image-manifest=true +
          # oci-mediatypes=true keep the cache as a single OCI image
          # manifest, consistent with provenance/sbom=false above.
          # Bumping the cache ref one more time so the next build starts
          # from a clean slate. The corrupt blob in v3 (same 29780174-byte
          # short-read as v2) means cache-import fails before the build
          # context can even be hashed; v4 is empty until cache-to writes
          # to it, and the cleanup:true above ensures each run's local
          # builder starts fresh so the corruption can't be re-introduced.
          cache-from: type=registry,ref=harbor.blockcast.net/paperclip/paperclip:buildcache-v6
          cache-to: type=registry,ref=harbor.blockcast.net/paperclip/paperclip:buildcache-v6,mode=max,image-manifest=true,oci-mediatypes=true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            gh_token=${{ secrets.PAPERCLIP_BOARD_TOKEN }}

      - name: Compute short sha
        id: sha
        run: echo "short=$(git rev-parse --short=7 ${{ github.sha }})" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build-and-push
    runs-on: arc-deploy
    # !cancelled() lets this run when build-and-push was SKIPPED
    # (schedule/workflow_dispatch); the result check still blocks deploys
    # after a FAILED build.
    if: ${{ !cancelled() && vars.PAPERCLIP_CI_DEPLOY == 'true' && github.ref == 'refs/heads/master' && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') }}
    # Must exceed helm upgrade's --timeout 30m below, plus checkout/cleanup margin.
    timeout-minutes: 40
    concurrency:
      # Serialize deploys to the same target so a fast-followup push doesn't
      # race with an in-flight upgrade.
      group: deploy-${{ vars.PAPERCLIP_HELM_RELEASE || 'paperclip' }}-${{ vars.PAPERCLIP_NAMESPACE || 'paperclip' }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute short sha
        id: sha
        run: echo "short=$(git rev-parse --short=7 ${{ github.sha }})" >> "$GITHUB_OUTPUT"

      - name: Write kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PAPERCLIP_CI_DEPLOY }}
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/.kube"
          printf '%s' "$KUBECONFIG_DATA" > "$RUNNER_TEMP/.kube/config"
          chmod 600 "$RUNNER_TEMP/.kube/config"
          echo "KUBECONFIG=$RUNNER_TEMP/.kube/config" >> "$GITHUB_ENV"

      - name: Verify tooling + cluster reach
        env:
          NS: ${{ vars.PAPERCLIP_NAMESPACE || 'paperclip' }}
        run: |
          set -e
          which helm kubectl
          helm version --short
          kubectl auth whoami -o yaml
          kubectl -n "$NS" get statefulset paperclip -o jsonpath='{.spec.replicas}{"\n"}'

      # Debounce (BLO-12563): on plain push events, skip the rollout while
      # paperclip-0 is younger than 6h — per-merge deploys were recreating
      # the worker ~hourly and every roll strands whatever agent run is
      # mid-setup (process_lost). Scheduled/dispatch windows (and "[deploy]"
      # in the head commit message) bypass the debounce; debounced commits
      # are picked up by the next 6h window since deploy always targets tip.
      - name: Deploy gate (6h debounce on push)
        id: gate
        env:
          NS: ${{ vars.PAPERCLIP_NAMESPACE || 'paperclip' }}
        run: |
          set -e
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "batch window / manual dispatch — deploying"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git log -1 --pretty=%B | grep -qF "[deploy]"; then
            echo "head commit requests immediate deploy via [deploy]"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CREATED=$(kubectl -n "$NS" get pod paperclip-0 -o jsonpath='{.metadata.creationTimestamp}' 2>/dev/null || true)
          if [ -z "$CREATED" ]; then
            echo "paperclip-0 not found — deploying"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          AGE=$(( $(date +%s) - $(date -d "$CREATED" +%s) ))
          if [ "$AGE" -ge 21600 ]; then
            echo "paperclip-0 is ${AGE}s old (>=6h) — deploying"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "paperclip-0 is ${AGE}s old (<6h) — debounced; the next 6h window deploys this commit"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      # Schedule/dispatch runs deploy a tag built by an earlier push run.
      # Verify it actually exists in Harbor before helm rolls the STS —
      # protects against a window firing between a merge and its build
      # finishing.
      - name: Login to Harbor (tag check)
        if: ${{ steps.gate.outputs.proceed == 'true' && github.event_name != 'push' }}
        uses: docker/login-action@v4
        with:
          registry: harbor.blockcast.net
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Verify image tag exists
        if: ${{ steps.gate.outputs.proceed == 'true' && github.event_name != 'push' }}
        env:
          TAG: sha-${{ steps.sha.outputs.short }}-k8s-vendored
        run: |
          set -e
          for i in 1 2 3; do
            if docker manifest inspect "harbor.blockcast.net/paperclip/paperclip:${TAG}" >/dev/null 2>&1; then
              echo "tag ${TAG} present"
              exit 0
            fi
            echo "tag ${TAG} not found (attempt $i) — retrying in 60s (a push build may still be running)"
            sleep 60
          done
          echo "tag ${TAG} missing after retries; failing this window — the next one retries" >&2
          exit 1

      # Use --set image.tag so the deployed tag tracks the just-built image
      # without committing to values.blockcast.yaml. The committed values
      # file remains the source of truth for non-CI deploys; CI runs are
      # transparent in helm history (`helm get values paperclip` shows the
      # override). Adjust by editing values.blockcast.yaml when you want
      # the file to reflect the live tag.
      - name: helm upgrade
        if: ${{ steps.gate.outputs.proceed == 'true' }}
        env:
          NS: ${{ vars.PAPERCLIP_NAMESPACE || 'paperclip' }}
          RELEASE: ${{ vars.PAPERCLIP_HELM_RELEASE || 'paperclip' }}
          TAG: sha-${{ steps.sha.outputs.short }}-k8s-vendored
        run: |
          set -e
          echo "rolling out ${TAG} to ${NS}/${RELEASE}"
          # --timeout bumped 10m → 30m on 2026-05-23 after rev 316 + several
          # prior revs hit "context deadline exceeded" while the cluster was
          # in apiserver/kubelet-latency cascade (control-plane nodes at
          # 110/110 pods, multus FailedCreatePodSandBox storms). The
          # underlying StatefulSet/Deployment rollouts kept progressing
          # asynchronously and completed in the 15-30min window after helm
          # gave up at 10m. 30m absorbs that window without changing CI's
          # report-success semantics for healthy rollouts (which still
          # finish in ~30-90s). Investigate further if 30m proves too short.
          helm upgrade "${RELEASE}" ./deploy/helm/paperclip \
            -n "${NS}" \
            -f deploy/helm/paperclip/values.blockcast.yaml \
            --set image.tag="${TAG}" \
            --wait --timeout 30m
          helm -n "${NS}" list | head -3
          kubectl -n "${NS}" get pod -l app.kubernetes.io/name=paperclip \
            -o custom-columns=NAME:.metadata.name,IMAGE:.spec.containers[0].image,READY:.status.containerStatuses[0].ready,RESTARTS:.status.containerStatuses[0].restartCount
