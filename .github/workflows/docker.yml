name: Docker

on:
  push:
    branches:
      - "master"
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: self-hosted
    timeout-minutes: 30
    concurrency:
      group: docker-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Login to the kkroo private registry. Only attempted when the registry
      # host is configured via repo variable BLOCKCAST_REGISTRY_HOST + the
      # USERNAME/PASSWORD secrets are wired in repo Settings → Secrets. When
      # the variable is absent, this and the blockcast meta/push steps are
      # skipped and the workflow falls back to ghcr.io-only — preserves the
      # upstream-aligned default for forks that don't run a private registry.
      - name: Login to Blockcast registry
        if: ${{ vars.BLOCKCAST_REGISTRY_HOST != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.BLOCKCAST_REGISTRY_HOST }}
          username: ${{ secrets.BLOCKCAST_REGISTRY_USERNAME }}
          password: ${{ secrets.BLOCKCAST_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta (ghcr.io)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      # Mirror the same image to the blockcast registry under the kkroo-deploy
      # tag scheme `sha-<8>-k8s-vendored` so `values.blockcast.yaml` picks it
      # up directly. The `-k8s-vendored` suffix marks a kkroo-fork build
      # (vendored adapter tarballs + ccrotate kkroo patch baked in via the
      # Dockerfile's `COPY vendor/*` lines).
      - name: Docker meta (blockcast)
        id: meta_blockcast
        if: ${{ vars.BLOCKCAST_REGISTRY_HOST != '' }}
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.BLOCKCAST_REGISTRY_HOST }}/paperclip
          tags: |
            type=sha,prefix=sha-,suffix=-k8s-vendored,format=short
            type=raw,value=latest-k8s-vendored,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # When the blockcast vars/secrets are wired, push to BOTH registries
          # in one buildx invocation (single cache, single layer push,
          # multiple destination refs). When not wired, the second tag list
          # is empty and only ghcr.io tags are pushed.
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.meta_blockcast.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Compute short sha
        id: sha
        run: echo "short=$(git rev-parse --short=8 ${{ github.sha }})" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    if: ${{ vars.PAPERCLIP_CI_DEPLOY == 'true' && github.ref == 'refs/heads/master' && vars.BLOCKCAST_REGISTRY_HOST != '' }}
    timeout-minutes: 15
    concurrency:
      # Serialize deploys to the same target so a fast-followup push doesn't
      # race with an in-flight upgrade.
      group: deploy-${{ vars.PAPERCLIP_HELM_RELEASE || 'paperclip' }}-${{ vars.PAPERCLIP_NAMESPACE || 'paperclip' }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short sha
        id: sha
        run: echo "short=$(git rev-parse --short=8 ${{ github.sha }})" >> "$GITHUB_OUTPUT"

      - name: Write kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_KKROO }}
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/.kube"
          printf '%s' "$KUBECONFIG_DATA" > "$RUNNER_TEMP/.kube/config"
          chmod 600 "$RUNNER_TEMP/.kube/config"
          echo "KUBECONFIG=$RUNNER_TEMP/.kube/config" >> "$GITHUB_ENV"

      # The self-hosted runner is expected to ship with kubectl + helm. The
      # pve* runners are inside the same network as the cluster API — no
      # extra networking needed. The kubeconfig comes from secrets.KUBECONFIG_KKROO
      # (an SA token kubeconfig scoped to the paperclip namespace via a
      # RoleBinding to the admin ClusterRole). To opt out, unset
      # `vars.PAPERCLIP_CI_DEPLOY`.
      - name: Verify tooling + cluster reach
        env:
          NS: ${{ vars.PAPERCLIP_NAMESPACE || 'paperclip' }}
        run: |
          set -e
          which helm kubectl
          helm version --short
          kubectl -n "$NS" get statefulset paperclip -o jsonpath='{.spec.replicas}{"\n"}'

      # Use --set image.tag so the deployed tag tracks the just-built image
      # without committing to values.blockcast.yaml. The committed values
      # file remains the source of truth for non-CI deploys; CI runs are
      # transparent in helm history (`helm get values paperclip` shows the
      # override). Adjust by editing values.blockcast.yaml when you want
      # the file to reflect the live tag.
      - name: helm upgrade
        env:
          NS: ${{ vars.PAPERCLIP_NAMESPACE || 'paperclip' }}
          RELEASE: ${{ vars.PAPERCLIP_HELM_RELEASE || 'paperclip' }}
          TAG: sha-${{ steps.sha.outputs.short }}-k8s-vendored
        run: |
          set -e
          echo "rolling out ${TAG} to ${NS}/${RELEASE}"
          helm upgrade "${RELEASE}" ./deploy/helm/paperclip \
            -n "${NS}" \
            -f deploy/helm/paperclip/values.blockcast.yaml \
            --set image.tag="${TAG}" \
            --wait --timeout 10m
          helm -n "${NS}" list | head -3
          kubectl -n "${NS}" get pod -l app.kubernetes.io/name=paperclip \
            -o custom-columns=NAME:.metadata.name,IMAGE:.spec.containers[0].image,READY:.status.containerStatuses[0].ready,RESTARTS:.status.containerStatuses[0].restartCount
