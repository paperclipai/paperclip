version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "atlas"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps):"
      prefix-development: "chore(deps-dev):"
      include: "scope"

  # Enable security vulnerability updates
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "02:00"
    security-updates-only: true
    open-pull-requests-limit: 5
    reviewers:
      - "atlas"
    labels:
      - "security"
      - "critical"
    commit-message:
      prefix: "security(deps):"
